# Edge data plane for BOTH planes (lab). Composition is tenant-first (RFC C17):
# Filter order is load-bearing:
#   header_mutation (strip client x-workspace-*/x-user-*, RFC C3)
#   -> ext_proc:tenant-router (host -> workspace -> x-route-pool, reject unknown C18)
#   -> jwt_authn (verify + write claims to metadata)
#   -> ext_proc:identity (sidecar reads verified sub, injects x-user-*/x-workspace-id)
#   -> router (forwards to the pool the routing decision selected).
# Each plane is an independent resolution hook; the data plane enacts the result
# (it forwards — the planes never proxy). Tenant resolution runs first so that
# credential verification MAY later be scoped to the resolved tenant (a tenant
# bringing its own issuer); the lab keeps a single global issuer for simplicity.

admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: edge
                # Canonicalize :path BEFORE the tenant-router ext_proc, the auth gate
                # and routing all read it — otherwise an encoded/dot-segment path can
                # read as one route to the gate (public) and another to the backend
                # (protected): auth-gate path confusion. RFC 3986 dot-segment removal
                # + collapse duplicate slashes + unescape %2F so all stages agree.
                normalize_path: true
                merge_slashes: true
                path_with_escaped_slashes_action: UNESCAPE_AND_FORWARD
                # Trace-context integrity (N6/C3): Envoy makes its join-vs-root
                # tracing decision BEFORE the http_filters run, so the
                # header_mutation strip below is too late for the tracer — a
                # client-forged traceparent would be JOINED (client-rooted
                # trace). Early mutation runs before that decision, so the edge
                # always roots its own trace. The filter-level strip stays as
                # defense-in-depth for the backend-facing guarantee.
                early_header_mutation_extensions:
                  - name: envoy.http.early_header_mutation.header_mutation
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.http.early_header_mutation.header_mutation.v3.HeaderMutation
                      mutations:
                        - remove: "traceparent"
                        - remove: "tracestate"
                # Edge-rooted tracing (N6): the edge is the sole root of trace
                # context — it head-samples here and injects W3C traceparent
                # toward the box. Export is OTLP/gRPC to the OTel Collector
                # cluster (the SINGLE telemetry egress; only the collector
                # knows the trace store). Fail-open: the collector being down
                # never affects request handling.
                # random_sampling is the default; the runtime key
                # tracing.random_sampling (set env-driven via --config-yaml in
                # the compose command) overrides it without editing this file.
                tracing:
                  provider:
                    name: envoy.tracers.opentelemetry
                    typed_config:
                      "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
                      grpc_service:
                        envoy_grpc: { cluster_name: otel_collector }
                        timeout: 0.250s
                      service_name: nexus-edge
                  random_sampling: { value: 100 }
                  # Distinct child span for the upstream (backend) call, so the
                  # trace separates edge processing from backend time.
                  spawn_upstream_span: true
                  # PII hygiene (same rule as the access log): default span
                  # attributes only (method/path/status/flags/durations) plus
                  # the two explicitly-allowed routing tags below. NO
                  # Authorization, NO x-user-*, NO bodies — do not add tags
                  # outside the access-log-allowed set.
                  custom_tags:
                    - tag: nexus.route_pool
                      request_header: { name: x-route-pool }
                    - tag: nexus.workspace_id
                      request_header: { name: x-workspace-id }
                # JSON access log (audit trail): method/path/status/host/tenant and
                # the per-route gate decision. Deliberately NO Authorization header
                # and NO x-user-* (PII/secret hygiene). response_flags shows WHY a
                # request was rejected (e.g. jwt_authn 401).
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          start_time: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          duration_ms: "%DURATION%"
                          authority: "%REQ(:AUTHORITY)%"
                          upstream_host: "%UPSTREAM_HOST%"
                          route_pool: "%REQ(X-ROUTE-POOL)%"
                          workspace_id: "%REQ(X-WORKSPACE-ID)%"
                          auth_required: "%REQ(X-AUTH-REQUIRED)%"
                          user_agent: "%REQ(USER-AGENT)%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: edge
                      domains: ["*"]
                      # Routes match on x-route-pool, set by the tenant-router
                      # ext_proc from the resolved tenant's target pool (RFC
                      # C15/§3.12). An unknown host is rejected by that filter
                      # before routing (C18), so a request reaching here always
                      # carries a pool selector.
                      routes:
                        # C10: a degradable route — the lab's EXPLICIT non-enriched
                        # designation (identity-workspace-authz): identity ext_proc
                        # is disabled here (fail-open: served without x-user-* even
                        # if the sidecar is down) and the request reaches the
                        # backend unstamped BY DESIGN. Tenant routing + auth still
                        # apply. Fail-closed default: every route NOT listed with
                        # this per-route disable keeps enrichment.
                        - match: { prefix: "/public" }
                          route: { cluster: pool_application }
                          typed_per_filter_config:
                            envoy.filters.http.ext_proc:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                              disabled: true
                        - match:
                            prefix: "/"
                            headers:
                              [
                                {
                                  name: x-route-pool,
                                  string_match: { exact: api },
                                },
                              ]
                          route: { cluster: pool_api }
                        - match:
                            prefix: "/"
                            headers:
                              [
                                {
                                  name: x-route-pool,
                                  string_match: { exact: checkout },
                                },
                              ]
                          route: { cluster: pool_checkout }
                        - match:
                            prefix: "/"
                            headers:
                              [
                                {
                                  name: x-route-pool,
                                  string_match: { exact: assets },
                                },
                              ]
                          route: { cluster: pool_assets }
                        - match:
                            prefix: "/"
                            headers:
                              [
                                {
                                  name: x-route-pool,
                                  string_match: { exact: application },
                                },
                              ]
                          route: { cluster: pool_application }
                        # Safety fallback (unknown host already rejected upstream).
                        - match: { prefix: "/" }
                          route: { cluster: pool_application }
                http_filters:
                  # FIRST: strip any client-supplied trusted headers, before any
                  # resolution runs, so the plane-injected sets are authoritative
                  # and unforgeable (RFC C3 / §3.12). Covers BOTH planes' headers.
                  # Route-level removal would run at the router (after ext_proc)
                  # and wrongly strip the injected headers.
                  - name: envoy.filters.http.header_mutation
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                      mutations:
                        request_mutations:
                          - remove: "x-workspace-id"
                          - remove: "x-workspace-plan"
                          - remove: "x-workspace-features"
                          - remove: "x-route-pool"
                          - remove: "x-routed-by"
                          # Edge geo (x-geo-*) is normalized + injected by
                          # tenant-router from Cloudflare headers; strip any
                          # client-supplied copies so they are unforgeable (C3).
                          - remove: "x-geo-source"
                          - remove: "x-geo-country"
                          - remove: "x-geo-continent"
                          - remove: "x-geo-region"
                          - remove: "x-geo-city"
                          - remove: "x-geo-postal-code"
                          - remove: "x-geo-timezone"
                          - remove: "x-geo-latitude"
                          - remove: "x-geo-longitude"
                          - remove: "x-geo-client-ip"
                          # Request-context (locale/currency/privacy/device) is
                          # normalized + injected by tenant-router; strip client
                          # copies so they are unforgeable (C3).
                          - remove: "x-locale"
                          - remove: "x-lang"
                          - remove: "x-currency"
                          - remove: "x-privacy-gpc"
                          - remove: "x-privacy-dnt"
                          - remove: "x-device-type"
                          - remove: "x-user-id"
                          - remove: "x-user-org"
                          - remove: "x-user-roles"
                          - remove: "x-user-entitlements"
                          - remove: "x-user-suspended"
                          - remove: "x-user-enriched-by"
                          # Workspace-scoped acting identity (nexus-owned tenancy):
                          # authored authoritatively by the identity sidecar after a
                          # live membership check. Strip client copies so a client
                          # cannot self-assert an acting workspace/type/role (C3).
                          # `x-requested-workspace` is deliberately NOT stripped — it
                          # is an allowed non-authoritative hint only.
                          - remove: "x-user-type"
                          - remove: "x-user-role"
                          # Trusted auth-state set by the identity sidecar; strip
                          # client copies so is-anonymous is unforgeable (C3).
                          - remove: "x-auth-anonymous"
                          - remove: "x-auth-method"
                          # Per-route auth policy (RFC N4): the protection decision
                          # the tenant-router emits and jwt_authn branches on. Strip
                          # any client copy so a client can't self-declare a route
                          # public (C3) — tenant-router runs AFTER this filter, so
                          # its emit is authoritative.
                          - remove: "x-auth-required"
                          # Phase-2 requirement signals (N4): emitted by the
                          # tenant-router only when the resolved rule sets them and
                          # enforced (403) by the identity sidecar. Strip client
                          # copies so a client can neither add nor suppress a
                          # requirement (C3, same rule as x-auth-required).
                          - remove: "x-auth-requires-role"
                          - remove: "x-auth-requires-entitlement"
                          - remove: "x-auth-min-aal"
                          # Versioned edge->backend identity-contract stamp: authored
                          # by the identity sidecar as a DRIFT/version signal for the
                          # x-workspace-*/x-user-* header shape — NOT proof of edge
                          # origin (that guarantee is edge-origin-trust origin
                          # enforcement: the backends are reachable only via this
                          # edge). Strip any client copy so a version cannot be forged
                          # (C3, same rule as x-auth-required/x-workspace-id).
                          - remove: "x-identity-contract"
                          # W3C trace context (N6): the edge is the ONLY origin of
                          # trace context on the internal network. Boxes continue an
                          # arriving trace (fail-open contract), so a client-forged
                          # traceparent must never survive to be joined (C3).
                          - remove: "traceparent"
                          - remove: "tracestate"
                  # TENANT-FIRST (RFC C17): resolve host -> workspace -> pool before
                  # auth/enrichment. Sets x-workspace-* + x-route-pool, or rejects an
                  # unknown/unverified host with an immediate 404 (C18). A distinct
                  # filter name keeps it independent of the identity ext_proc, so
                  # one plane can fail without the other (failure_mode_allow:false
                  # — a routing failure must not silently default a route).
                  - name: tenant-router.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc: { cluster_name: tenant_router }
                      failure_mode_allow: false
                      message_timeout: 5s
                      processing_mode:
                        request_header_mode: SEND
                        response_header_mode: SKIP
                        request_body_mode: NONE
                        response_body_mode: NONE
                        request_trailer_mode: SKIP
                        response_trailer_mode: SKIP
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        # oidc-provider-independence: vendor-neutral provider name.
                        # ZITADEL is the currently deployed OIDC provider; any
                        # conformant provider works by setting issuer + remote_jwks.
                        oidc:
                          # D7 single source: this authority MUST equal the iss the
                          # OIDC provider mints, i.e. localhost:${ZITADEL_EXTERNALPORT}
                          # (default 8080 in docker-compose.yaml). Drift here is
                          # silent-but-fatal (every authenticated request 401s);
                          # scripts/helm-guards-test.sh asserts the two stay equal.
                          issuer: "http://localhost:8080"
                          remote_jwks:
                            # uri authority -> Host header (must match ZITADEL's
                            # external domain, which validates Host); cluster ->
                            # the actual in-network upstream (zitadel:8080).
                            # edge-trust-anchor-integrity: this lab fetches the
                            # trust anchor in plaintext ONLY because the path is
                            # the compose-internal hop to the lab's own ZITADEL —
                            # the explicitly asserted trusted path (the Helm charts
                            # call it oidc.jwksPlaintextTrustedPath). On any
                            # untrusted path this fails the spec: use HTTPS + give
                            # the oidc_jwks cluster a TLS transport_socket
                            # (trusted CA + SNI + SAN match — a plaintext JWKS lets
                            # a MITM swap keys → full auth bypass).
                            http_uri:
                              uri: "http://localhost:8080/oauth/v2/keys"
                              cluster: oidc_jwks
                              timeout: 5s
                            cache_duration: { seconds: 600 }
                          payload_in_metadata: verified
                          forward: true
                      # Per-route auth gate (RFC N4). jwt_authn runs AFTER the
                      # tenant-router ext_proc (RFC C17 tenant-first), so it can
                      # branch on the x-auth-required header that filter just set
                      # from the resolved (domain, path) policy. First match wins,
                      # INVERTED fail-safe polarity:
                      #  - x-auth-required: "false" -> allow_missing: a MISSING token
                      #    passes through anonymous; a PRESENT-but-invalid/expired one
                      #    still 401s (NOT allow_missing_or_failed). This opens the
                      #    public routes (public+private on one domain).
                      #  - "true" OR ABSENT -> the catch-all demands a verified
                      #    credential. Making the catch-all (not the "false" branch)
                      #    the fallthrough keeps the gate fail-CLOSED if the router's
                      #    signal is ever lost — the header_mutation strip above makes
                      #    x-auth-required unforgeable, which this relies on.
                      rules:
                        - match:
                            prefix: "/"
                            headers:
                              [
                                {
                                  name: x-auth-required,
                                  string_match: { exact: "false" },
                                },
                              ]
                          requires: { allow_missing: {} }
                        - match: { prefix: "/" }
                          requires: { provider_name: oidc }
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc: { cluster_name: identity_sidecar }
                      failure_mode_allow: false
                      message_timeout: 5s # allow an occasional KV miss-load
                      processing_mode:
                        request_header_mode: SEND
                        response_header_mode: SKIP
                        request_body_mode: NONE
                        response_body_mode: NONE
                        request_trailer_mode: SKIP
                        response_trailer_mode: SKIP
                      metadata_options:
                        forwarding_namespaces:
                          untyped: ["envoy.filters.http.jwt_authn"]
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Backend pools — the small, finite set the routing decision selects among
    # (RFC C15 / decision 13). In the lab they collapse onto two whoami
    # instances; the selection mechanism is what matters.
    - name: pool_application
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: pool_application
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend, port_value: 80 }

    - name: pool_checkout
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: pool_checkout
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend, port_value: 80 }

    - name: pool_assets
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: pool_assets
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend, port_value: 80 }

    - name: pool_api
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: pool_api
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: backend-api, port_value: 80 }

    - name: tenant_router
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: tenant_router
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      { address: tenant-router, port_value: 50052 }

    # oidc_jwks: upstream to the OIDC provider's JWKS endpoint. The socket address
    # is the provider's in-network service (the lab's ZITADEL); point it at your
    # provider to swap IdPs.
    - name: oidc_jwks
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: oidc_jwks
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: zitadel, port_value: 8080 }

    - name: identity_sidecar
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: identity_sidecar
        endpoints:
          - lb_endpoints:
              - endpoint:
                  # Points at the real Rust sidecar; the Python one (identity-sidecar)
                  # stays running as a reference but is no longer wired to Envoy.
                  address:
                    socket_address:
                      { address: identity-sidecar-rs, port_value: 50051 }

    # OTel Collector (N6): the edge's ONLY telemetry egress — trace export goes
    # here and nowhere else (the collector alone knows the trace store).
    # Deliberately NOT a startup dependency: export is fail-open, a missing/
    # down collector must never affect request handling.
    - name: otel_collector
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: otel_collector
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: otel-collector, port_value: 4317 }
