openapi: 3.1.0
info:
  title: nexus authz-admin API
  version: "1.0.0"
  description: |
    Identity-plane administration surface. Authors a subject's authorization
    (roles, entitlements, suspension) and issues/rotates/revokes customer API keys.

    Fail-closed: every data route requires a bearer credential that resolves to
    an INDIVIDUALLY IDENTIFIABLE admin token (`identity.admin_tokens`, minted
    via `POST /admin-tokens`; `ADMIN_TOKEN_PEPPER` keys verification). During
    the token migration only, the legacy shared `IDENTITY_ADMIN_TOKEN` is
    accepted iff `ADMIN_LEGACY_TOKEN_OK=true` (attributed `legacy-shared`,
    deprecation-warned). The process refuses to start without an explicit auth
    choice (`IDENTITY_ADMIN_AUTH_DISABLED=true` is the dev opt-out). There is
    no workspace header.

    Admin action audit (admin-action-audit): every mutating call records one
    audit event ATOMICALLY with the mutation — an unrecorded mutation does not
    commit — and rejected authentications are recorded as denial events. Every
    mutating endpoint accepts the optional `x-acting-operator` header (see the
    ActingOperator parameter): recorded verbatim, marked asserted, never used
    for authorization. The ledger is queryable at `/audit/events` and
    exportable at `/audit/events/export`.

    Prose reference: `docs/admin-apis.md`. Schemas mirror the handler structs in
    `identity-rs/authz-admin/src/main.rs`. This spec is a descriptive artifact of the
    live routes, not a source of truth for behavior.
servers:
  - url: http://localhost:9303
    description: local compose lab (host port; the container listens on :9300)
  - url: https://authz.internal:9300
    description: in-cluster
security:
  - bearerAuth: []
tags:
  - name: authz
    description: Subject authorization facts
  - name: api-keys
    description: Customer API-key lifecycle (requires APIKEY_HMAC_PEPPER)
  - name: audit
    description: Admin audit ledger (read-only; append-only by construction)
  - name: admin-tokens
    description: Named admin credentials (requires ADMIN_TOKEN_PEPPER)
  - name: health
paths:
  /authz/{sub}:
    get:
      tags: [authz]
      summary: Read a subject's effective authorization facts
      operationId: getAuthzFacts
      parameters:
        - $ref: '#/components/parameters/Sub'
      responses:
        '200':
          description: Effective facts. Deny-by-default — an unknown subject returns the zero value, never 404.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthzFacts' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /authz/{sub}/roles:
    put:
      tags: [authz]
      summary: Assign a role
      operationId: assignRole
      parameters:
        - $ref: '#/components/parameters/Sub'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RoleBody' }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /authz/{sub}/roles/{role}:
    delete:
      tags: [authz]
      summary: Revoke a role
      operationId: revokeRole
      parameters:
        - $ref: '#/components/parameters/Sub'
        - name: role
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /authz/{sub}/entitlements:
    put:
      tags: [authz]
      summary: Grant an entitlement
      operationId: grantEntitlement
      parameters:
        - $ref: '#/components/parameters/Sub'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntitlementBody' }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /authz/{sub}/entitlements/{entitlement}:
    delete:
      tags: [authz]
      summary: Revoke an entitlement
      operationId: revokeEntitlement
      parameters:
        - $ref: '#/components/parameters/Sub'
        - name: entitlement
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /authz/{sub}/suspend:
    post:
      tags: [authz]
      summary: Suspend a subject
      operationId: suspendSubject
      parameters:
        - $ref: '#/components/parameters/Sub'
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /authz/{sub}/reactivate:
    post:
      tags: [authz]
      summary: Reactivate a suspended subject
      operationId: reactivateSubject
      parameters:
        - $ref: '#/components/parameters/Sub'
      responses:
        '200': { $ref: '#/components/responses/Ok' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /apikeys:
    post:
      tags: [api-keys]
      summary: Issue a customer API key
      description: The plaintext secret is returned ONCE in `secret`. Requires APIKEY_HMAC_PEPPER (else 503).
      operationId: issueApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IssueKeyBody' }
      responses:
        '201':
          description: Key issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssuedKey' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/KeyMgmtUnconfigured' }
  /apikeys/{key_id}/rotate:
    post:
      tags: [api-keys]
      summary: Rotate a customer API key
      description: Issues a new secret, revokes the old, preserves scopes. No request body.
      operationId: rotateApiKey
      parameters:
        - $ref: '#/components/parameters/KeyId'
      responses:
        '201':
          description: Key rotated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssuedKey' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: No active key with that id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503': { $ref: '#/components/responses/KeyMgmtUnconfigured' }
  /apikeys/{key_id}/revoke:
    post:
      tags: [api-keys]
      summary: Revoke a customer API key
      description: Idempotent. No request body.
      operationId: revokeApiKey
      parameters:
        - $ref: '#/components/parameters/KeyId'
      responses:
        '200':
          description: Revoked (idempotent)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RevokeResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/KeyMgmtUnconfigured' }
  /audit/events:
    get:
      tags: [audit]
      summary: Query the admin audit ledger
      description: |
        Read-only, time-ordered (by `event_id` — `aev_<uuidv7>` sorts by event
        time), cursor-paginated. Filters compose (AND). No mutation endpoint
        over events exists anywhere (append-only ledger, admin-action-audit).
      operationId: listAuditEvents
      parameters:
        - { name: from, in: query, required: false, description: "Inclusive lower bound on occurred_at (RFC 3339)", schema: { type: string } }
        - { name: to, in: query, required: false, description: "Exclusive upper bound on occurred_at (RFC 3339)", schema: { type: string } }
        - { name: actor, in: query, required: false, description: "Exact acting credential id (or a reserved actor id)", schema: { type: string } }
        - { name: target, in: query, required: false, description: "Exact target resource id", schema: { type: string } }
        - { name: cursor, in: query, required: false, description: "Resume strictly after this event_id (previous page's next_cursor)", schema: { type: string } }
        - { name: limit, in: query, required: false, description: "Page size (clamped to 1..=1000; default 100)", schema: { type: integer } }
      responses:
        '200':
          description: One page of events; an empty `events` array means done.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditEventsPage' }
        '400':
          description: Malformed from/to bound
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /audit/events/export:
    get:
      tags: [audit]
      summary: Export audit events as NDJSON
      description: |
        Streams one JSON event per line for the time range (machine-readable
        evidence for external audit consumers). Read-only — the ledger is
        unchanged.
      operationId: exportAuditEvents
      parameters:
        - { name: from, in: query, required: false, description: "Inclusive lower bound on occurred_at (RFC 3339)", schema: { type: string } }
        - { name: to, in: query, required: false, description: "Exclusive upper bound on occurred_at (RFC 3339)", schema: { type: string } }
      responses:
        '200':
          description: NDJSON stream of AuditEvent lines
          content:
            application/x-ndjson:
              schema: { type: string }
        '400':
          description: Malformed from/to bound
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /admin-tokens:
    post:
      tags: [admin-tokens]
      summary: Issue a named admin token
      description: |
        Mints an individually identifiable admin credential for ONE caller
        (attribution, not authorization). The plaintext secret is returned ONCE
        and never persisted — only its peppered HMAC lands in
        `identity.admin_tokens`. Requires ADMIN_TOKEN_PEPPER (else 503). The
        issuance itself is audited (`admin_token.issue`). First-token
        chicken-and-egg: mint it while the legacy shared token
        (ADMIN_LEGACY_TOKEN_OK=true) still authenticates this call.
      operationId: issueAdminToken
      parameters:
        - { $ref: '#/components/parameters/ActingOperator' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IssueAdminTokenBody' }
      responses:
        '201':
          description: Token issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssuedAdminToken' }
        '400':
          description: Missing/empty name
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/AdminTokenMgmtUnconfigured' }
  /admin-tokens/{id}/rotate:
    post:
      tags: [admin-tokens]
      summary: Rotate a named admin token
      description: |
        Mints a NEW secret under the same name with lineage (`rotated_from`) and
        revokes the old credential — other callers' tokens are untouched.
        Audited (`admin_token.rotate`). No request body.
      operationId: rotateAdminToken
      parameters:
        - { $ref: '#/components/parameters/AdminTokenId' }
        - { $ref: '#/components/parameters/ActingOperator' }
      responses:
        '201':
          description: Token rotated; the NEW token_id + one-time secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssuedAdminToken' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: No active token with that id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503': { $ref: '#/components/responses/AdminTokenMgmtUnconfigured' }
  /admin-tokens/{id}/revoke:
    post:
      tags: [admin-tokens]
      summary: Revoke a named admin token
      description: |
        Status flip; the credential is rejected on subsequent calls while every
        other caller's keeps working. Idempotent (`revoked:false` when already
        revoked/unknown). Audited (`admin_token.revoke`). No request body.
      operationId: revokeAdminToken
      parameters:
        - { $ref: '#/components/parameters/AdminTokenId' }
        - { $ref: '#/components/parameters/ActingOperator' }
      responses:
        '200':
          description: Revoked (idempotent)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTokenRevokeResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503': { $ref: '#/components/responses/AdminTokenMgmtUnconfigured' }
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe (open, no auth)
      operationId: authzHealthz
      security: []
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: IDENTITY_ADMIN_TOKEN
  parameters:
    Sub:
      name: sub
      in: path
      required: true
      description: Subject identifier (the OIDC `sub`)
      schema: { type: string }
    KeyId:
      name: key_id
      in: path
      required: true
      schema: { type: string }
    AdminTokenId:
      name: id
      in: path
      required: true
      description: The admin token id (`atk_…`)
      schema: { type: string }
    ActingOperator:
      name: x-acting-operator
      in: header
      required: false
      description: |
        Optional caller-asserted human operator (accepted on EVERY mutating
        endpoint, not just where listed): recorded VERBATIM in the audit event's
        `asserted_operator` field, marked as asserted, and NEVER used for
        authentication or authorization. UTF-8, at most 256 bytes; longer or
        non-UTF-8 values are rejected (400) after authentication.
      schema: { type: string, maxLength: 256 }
  responses:
    Ok:
      description: Success
      content:
        application/json:
          schema: { $ref: '#/components/schemas/OkResult' }
    Unauthorized:
      description: Missing or invalid bearer token (a denial event is recorded)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    AdminTokenMgmtUnconfigured:
      description: Named admin-token management not configured (ADMIN_TOKEN_PEPPER unset)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Invalid request (e.g. missing creator_sub, or no scopes)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    KeyMgmtUnconfigured:
      description: API-key management not configured (APIKEY_HMAC_PEPPER unset)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    OkResult:
      type: object
      properties:
        result: { type: string, const: ok }
      required: [result]
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]
    AuthzFacts:
      type: object
      properties:
        sub: { type: string }
        roles:
          type: array
          items: { type: string }
        entitlements:
          type: array
          items: { type: string }
        is_suspended: { type: boolean }
      required: [sub, roles, entitlements, is_suspended]
    RoleBody:
      type: object
      properties:
        role: { type: string }
      required: [role]
    EntitlementBody:
      type: object
      properties:
        entitlement: { type: string }
      required: [entitlement]
    IssueKeyBody:
      type: object
      properties:
        creator_sub:
          type: string
          description: Required; the subject the key acts as.
        scopes:
          type: array
          description: Workspace ids the key may act on. Effectively required (empty → 400); each must be a workspace the creator is a live member of.
          items: { type: string }
        expires_in_seconds:
          type: [integer, "null"]
          description: Optional TTL; omit for a non-expiring key.
      required: [creator_sub]
    IssuedKey:
      type: object
      properties:
        key_id: { type: string }
        secret:
          type: string
          description: Plaintext key, returned only once.
        expires_at:
          type: [integer, "null"]
          description: Epoch seconds, or null when non-expiring.
      required: [key_id, secret]
    RevokeResult:
      type: object
      properties:
        result: { type: string, const: ok }
        revoked:
          type: boolean
          description: false if the key was already revoked or unknown.
      required: [result, revoked]
    AuditEventsPage:
      type: object
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/AuditEvent' }
        next_cursor:
          type: [string, "null"]
          description: Pass as `cursor` to resume; null only on an empty page.
      required: [events]
    AuditEvent:
      type: object
      description: |
        One admin audit ledger record — complete and self-describing (who did
        what, to what, where, when, with what outcome). Never carries secrets.
        Authz-admin actions: role.assign, role.revoke, entitlement.grant,
        entitlement.revoke, subject.suspend, subject.reactivate, apikey.issue,
        apikey.rotate, apikey.revoke, admin_token.issue, admin_token.rotate,
        admin_token.revoke, bootstrap.grant, auth.denied.
      properties:
        event_id:
          type: string
          description: Typed, time-ordered id (`aev_<uuidv7>`); lexicographic order IS time order.
        occurred_at: { type: string, description: RFC 3339 timestamp (DB clock) }
        surface: { type: string, const: authz-admin }
        action: { type: string, description: Action name from the closed vocabulary }
        actor_token_id:
          type: string
          description: The acting credential's token id, or a reserved actor id (`legacy-shared`, `auth-disabled`, `unauthenticated`, system actors).
        asserted_operator:
          type: [string, "null"]
          description: Caller-asserted human operator, verbatim; confers nothing.
        target_kind: { type: [string, "null"] }
        target_id: { type: [string, "null"] }
        outcome:
          type: string
          description: "`ok`, `replay` (idempotency-key replay), `denied`, or an error class."
        detail:
          type: object
          description: Request semantics minus secrets.
        trace_id: { type: [string, "null"] }
        source_ip: { type: [string, "null"] }
        idempotency_key: { type: [string, "null"] }
      required: [event_id, occurred_at, surface, action, actor_token_id, outcome, detail]
    IssueAdminTokenBody:
      type: object
      description: No unknown fields accepted.
      properties:
        name:
          type: string
          description: The named caller this credential identifies (e.g. signup-broker, ops-cli, ci).
      required: [name]
    IssuedAdminToken:
      type: object
      properties:
        token_id:
          type: string
          description: The public attribution handle (`atk_…`) audit events carry.
        secret:
          type: string
          description: Plaintext bearer secret (`nexus_admin_…`), returned only once.
      required: [token_id, secret]
    AdminTokenRevokeResult:
      type: object
      properties:
        result: { type: string, const: ok }
        revoked:
          type: boolean
          description: false if the token was already revoked or unknown.
      required: [result, revoked]
