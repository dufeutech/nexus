# Production docker-compose topology — FIRST-PARTY SERVICES ONLY.
#
# This stack runs ONLY what this repo owns: the two Rust resolution planes and
# the Envoy edge. Every stateful dependency is EXTERNAL and lives outside this
# project — you point at it via .env:
#
#   PostgreSQL            (routing store; AND identity store + LISTEN/NOTIFY feed)
#   Redis                 (OPTIONAL routing L2 cache)
#   ZITADEL               (the IdP) + the protected backend pools
#
# This is the topology twin of the Helm charts in ../helm (same images, same
# env-var contract). The lab in ../../docker-compose.yaml is the all-in-one test
# harness that bundles the stateful deps; THIS one deliberately does not.
#
# Copy .env.example -> .env and fill it in. The Envoy upstreams for ZITADEL and
# the backend pools are edited in ./envoy/envoy.yaml (a mounted file compose
# cannot template). Then: docker compose up -d --build

name: edge-platform

services:
  # --- Routing plane -------------------------------------------------------- #
  # The routing hot path (ext_proc). Reads the EXTERNAL Postgres routing store;
  # optional EXTERNAL Redis L2. Rejects unknown/unverified hosts at the edge (C18).
  tenant-router:
    image: ${ROUTING_REPO:-routing}/tenant-router:${IMAGE_TAG:-0.1.0}
    build: { context: ../../routing-rs, target: tenant-router }
    restart: unless-stopped
    environment:
      # Direct/session URL: used by the LISTEN/NOTIFY invalidation feed. MUST NOT
      # be a transaction-mode pooler (see deploy/README "External Postgres").
      ROUTING_PG_URL: ${ROUTING_PG_URL:?set ROUTING_PG_URL to your external Postgres}
      # OPTIONAL pooled endpoint for cache-miss reads only (e.g. a txn-mode
      # PgBouncer). Empty => read over the direct URL. The feed ignores this.
      ROUTING_PG_READ_URL: ${ROUTING_PG_READ_URL:-}
      REDIS_URL: ${REDIS_URL:-}                     # empty => L1-only (still correct)
      ROUTING_CACHE_CAPACITY: ${ROUTING_CACHE_CAPACITY:-200000}
      ROUTING_CACHE_TTL: ${ROUTING_CACHE_TTL:-600}
      ROUTING_L2_TTL: ${ROUTING_L2_TTL:-600}
      RUST_LOG: ${RUST_LOG:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # first-party-telemetry: OTLP collector endpoint. Unset (the default) =>
      # telemetry export off, logs to stdout exactly as before (fail-open opt-in).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9300/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  # Admin API (RFC C16). NOT on the hot path; owns the routing schema. Keep it on
  # an administrative boundary — do NOT publish 9400 to the public internet.
  control-plane:
    image: ${ROUTING_REPO:-routing}/control-plane:${IMAGE_TAG:-0.1.0}
    build: { context: ../../routing-rs, target: control-plane }
    restart: unless-stopped
    environment:
      ROUTING_PG_URL: ${ROUTING_PG_URL:?set ROUTING_PG_URL to your external Postgres}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # first-party-telemetry: OTLP collector endpoint. Unset (the default) =>
      # telemetry export off, logs to stdout exactly as before (fail-open opt-in).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Pool allow-list (RFC C15). Empty -> the control plane's built-in default
      # (application, api, checkout, assets), which matches the pool_* clusters in
      # ./envoy/envoy.yaml. Set ROUTING_POOLS in .env to add a pool WITHOUT a
      # recompile — and add the matching pool_* cluster + route in envoy.yaml.
      ROUTING_POOLS: ${ROUTING_POOLS:-}
      # Admin-token gate (RFC C16): the data endpoints mutate the authoritative
      # routing store, so they require this bearer token. Fail-closed — the
      # container refuses to start unless CONTROL_AUTH_TOKEN is set OR
      # CONTROL_AUTH_DISABLED=true (trusted network/dev). Set a strong value in .env.
      CONTROL_AUTH_TOKEN: ${CONTROL_AUTH_TOKEN:-}
      CONTROL_AUTH_DISABLED: ${CONTROL_AUTH_DISABLED:-}
    ports:
      - "127.0.0.1:9400:9400"   # bound to loopback: admin boundary only
      # Ops (/metrics + /healthz) is on :9401 — kept OFF the admin port so a scraper
      # can't reach the admin API. Reach it in-network; publish only if you scrape
      # from the host, e.g.:  - "127.0.0.1:9401:9401"

  # --- Identity plane ------------------------------------------------------- #
  # The enrichment hot path (ext_proc). Reads the EXTERNAL Postgres identity store
  # and keeps a bounded cache fresh via a seq-cursor feed over LISTEN/NOTIFY (C4).
  identity-sidecar:
    image: ${IDENTITY_REPO:-identity}/identity-sidecar-rs:${IMAGE_TAG:-0.1.0}
    build: { context: ../../identity-rs, target: sidecar }
    restart: unless-stopped
    environment:
      PROFILE_PG_URL: ${PROFILE_PG_URL:?set PROFILE_PG_URL to your external Postgres (session connection, not a txn-mode pooler)}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-43200}
      READINESS_DELAY_SECONDS: ${READINESS_DELAY_SECONDS:-0}
      RUST_LOG: ${RUST_LOG:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # first-party-telemetry: OTLP collector endpoint. Unset (the default) =>
      # telemetry export off, logs to stdout exactly as before (fail-open opt-in).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9200/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s

  # Nexus-native authorization authoring surface (nexus-native-authorization). The
  # SINGLE source of record for roles/entitlements/suspension: it authors them into
  # the identity Profile store via the AuthzAuthoring port, and the sidecar picks the
  # change up over the identity change feed within seconds. The OIDC provider is NEVER
  # an authorization source. Keep it on an administrative boundary — do NOT publish
  # 9300 publicly. Auth-gated by IDENTITY_ADMIN_TOKEN (fail-closed, like the
  # control-plane's CONTROL_AUTH_TOKEN).
  authz-admin:
    image: ${IDENTITY_REPO:-identity}/identity-authz-admin:${IMAGE_TAG:-0.1.0}
    build: { context: ../../identity-rs, target: authz-admin }
    restart: unless-stopped
    environment:
      PROFILE_PG_URL: ${PROFILE_PG_URL:?set PROFILE_PG_URL to your external Postgres (session connection, not a txn-mode pooler)}
      # Admin-token gate: the authoring endpoints mutate authorization state, so they
      # require this bearer token. Fail-closed — the container refuses to start unless
      # IDENTITY_ADMIN_TOKEN is set OR IDENTITY_ADMIN_AUTH_DISABLED=true (dev only).
      IDENTITY_ADMIN_TOKEN: ${IDENTITY_ADMIN_TOKEN:-}
      IDENTITY_ADMIN_AUTH_DISABLED: ${IDENTITY_ADMIN_AUTH_DISABLED:-}
      # Bootstrap the first administrator from an empty store (idempotent break-glass).
      # Empty => no seed; author the first grants via the admin API.
      AUTHZ_ADMIN_ROLE: ${AUTHZ_ADMIN_ROLE:-admin}
      AUTHZ_BOOTSTRAP_ADMIN_SUB: ${AUTHZ_BOOTSTRAP_ADMIN_SUB:-}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # first-party-telemetry: OTLP collector endpoint. Unset (the default) =>
      # telemetry export off, logs to stdout exactly as before (fail-open opt-in).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:9300:9300"   # bound to loopback: admin boundary only

  # Membership projection worker (membership-projection-sync). LISTENs on the routing
  # plane's `routing_membership_changes` NOTIFY channel and read-merge-writes the
  # subject's memberships into the identity Profile; a periodic backstop heals a missed
  # signal and backfills on first run. This is what makes the sidecar's acting-workspace
  # scope (x-workspace-id/x-user-type/x-user-role) resolve — WITHOUT it, memberships
  # never land in the Profile and the acting scope is never emitted. Holds a READ-ONLY
  # routing connection (least privilege: SELECT routing.memberships + LISTEN), a
  # SEPARATE database from PROFILE_PG in production.
  membership-sync:
    image: ${IDENTITY_REPO:-identity}/identity-membership-sync:${IMAGE_TAG:-0.1.0}
    build: { context: ../../identity-rs, target: membership-sync }
    restart: unless-stopped
    environment:
      PROFILE_PG_URL: ${PROFILE_PG_URL:?set PROFILE_PG_URL to your external Postgres (session connection, not a txn-mode pooler)}
      # Read-only routing connection: LISTEN routing_membership_changes + SELECT
      # routing.memberships. MUST be a direct/session URL — a transaction-mode pooler
      # silently swallows LISTEN. Grant least privilege (SELECT + LISTEN, no write).
      ROUTING_PG_RO_URL: ${ROUTING_PG_RO_URL:?set ROUTING_PG_RO_URL to a read-only routing DB connection (session, not a txn-mode pooler)}
      MEMBERSHIP_BACKSTOP_INTERVAL: ${MEMBERSHIP_BACKSTOP_INTERVAL:-600}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # first-party-telemetry: OTLP collector endpoint. Unset (the default) =>
      # telemetry export off, logs to stdout exactly as before (fail-open opt-in).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}

  # --- Edge (data plane) ---------------------------------------------------- #
  # Envoy runs the tenant-first chain and forwards. The combined config lives in
  # ./envoy/envoy.yaml — edit its zitadel_jwks + pool_* upstreams for your infra.
  envoy:
    # v1.34 confirmed for N6 tracing: the native OTel tracer
    # (envoy.tracers.opentelemetry), early_header_mutation_extensions, and
    # tracing.spawn_upstream_span are all stable in this line. Bump minor
    # versions deliberately — re-verify span export (the OTel tracer is still
    # flagged work-in-progress upstream; see edge-rooted-tracing design.md).
    image: envoyproxy/envoy:${ENVOY_VERSION:-v1.34.14@sha256:cfc0678bc03cca19cbb031688acb31d510bff501ff97e163026a375fe0515d69}
    restart: unless-stopped
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --log-level
      - info
      # N6 head-sampling knob, env-driven without templating the mounted
      # config: the runtime key tracing.random_sampling overrides the
      # stanza's random_sampling default. Whole percent, 0-100 (an integer
      # runtime value uses legacy percent semantics — verified empirically:
      # 50 => ~50% sampled). Set TRACE_SAMPLING_PCT in .env for production.
      - --config-yaml
      - '{"layered_runtime":{"layers":[{"name":"tracing-env","static_layer":{"tracing":{"random_sampling":${TRACE_SAMPLING_PCT:-100}}}}]}}'
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "${EDGE_PORT:-10000}:10000"   # the only public listener
    depends_on:
      tenant-router:
        condition: service_healthy
      identity-sidecar:
        condition: service_healthy
