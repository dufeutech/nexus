# Combined TENANT-FIRST edge (RFC C17) for the docker-compose production stack.
#
# This is the data plane. The two resolution planes are separate containers on
# the compose network (NOT loopback as in the per-pod k8s topology), so the
# ext_proc clusters below dial them by their compose service DNS names.
#
# Filter order is load-bearing (see ../../INFO.md §2):
#   header_mutation  strip client x-workspace-* / x-user-* / x-geo-* / ...  (C3)
#     tenant-router ext_proc   host -> workspace -> x-route-pool; reject unknown (C18)
#     jwt_authn                verify the bearer credential vs ZITADEL JWKS  (C1)
#     identity ext_proc        inject x-user-*/x-workspace-id from verified sub (C2)
#     router                   forward to the pool the routing decision chose
#
# EXTERNAL upstreams you MUST point at your own infrastructure (this project does
# not run them): the `oidc_jwks` cluster and every `pool_*` cluster at the
# bottom. The in-stack clusters (tenant_router, identity_sidecar) need no edits.
admin:
  # Bound to the container for health/inspection. NOT published in compose.
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: edge
                # Canonicalize :path BEFORE the tenant-router ext_proc, the auth gate
                # and routing all read it — otherwise an encoded/dot-segment path can
                # read as one route to the gate (public) and another to the backend
                # (protected): auth-gate path confusion. RFC 3986 dot-segment removal
                # + collapse duplicate slashes + unescape %2F so all stages agree.
                normalize_path: true
                merge_slashes: true
                path_with_escaped_slashes_action: UNESCAPE_AND_FORWARD
                # Trace-context integrity (N6/C3): Envoy makes its join-vs-root
                # tracing decision BEFORE the http_filters run, so the
                # header_mutation strip below is too late for the tracer — a
                # client-forged traceparent would be JOINED (client-rooted
                # trace). Early mutation runs before that decision, so the edge
                # always roots its own trace. The filter-level strip stays as
                # defense-in-depth for the backend-facing guarantee.
                early_header_mutation_extensions:
                  - name: envoy.http.early_header_mutation.header_mutation
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.http.early_header_mutation.header_mutation.v3.HeaderMutation
                      mutations:
                        - remove: "traceparent"
                        - remove: "tracestate"
                # Edge-rooted tracing (N6): the edge is the sole root of trace
                # context — it head-samples here and injects W3C traceparent
                # toward the box. Export is OTLP/gRPC to the OTel Collector
                # cluster (the SINGLE telemetry egress; only the collector
                # knows the trace store). Fail-open: the collector being down
                # never affects request handling.
                # random_sampling is the default; the runtime key
                # tracing.random_sampling (set env-driven via --config-yaml in
                # the compose command) overrides it without editing this file.
                tracing:
                  provider:
                    name: envoy.tracers.opentelemetry
                    typed_config:
                      "@type": type.googleapis.com/envoy.config.trace.v3.OpenTelemetryConfig
                      grpc_service:
                        envoy_grpc: { cluster_name: otel_collector }
                        timeout: 0.250s
                      service_name: nexus-edge
                  random_sampling: { value: 100 }
                  # Distinct child span for the upstream (backend) call, so the
                  # trace separates edge processing from backend time.
                  spawn_upstream_span: true
                  # PII hygiene (same rule as the access log): default span
                  # attributes only (method/path/status/flags/durations) plus
                  # the two explicitly-allowed routing tags below. NO
                  # Authorization, NO x-user-*, NO bodies — do not add tags
                  # outside the access-log-allowed set.
                  custom_tags:
                    - tag: nexus.route_pool
                      request_header: { name: x-route-pool }
                    - tag: nexus.workspace_id
                      request_header: { name: x-workspace-id }
                # JSON access log (audit trail): method/path/status/host/tenant and
                # the per-route gate decision. Deliberately NO Authorization header
                # and NO x-user-* (PII/secret hygiene). response_flags shows WHY a
                # request was rejected (e.g. jwt_authn 401).
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          start_time: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          duration_ms: "%DURATION%"
                          authority: "%REQ(:AUTHORITY)%"
                          upstream_host: "%UPSTREAM_HOST%"
                          route_pool: "%REQ(X-ROUTE-POOL)%"
                          workspace_id: "%REQ(X-WORKSPACE-ID)%"
                          auth_required: "%REQ(X-AUTH-REQUIRED)%"
                          user_agent: "%REQ(USER-AGENT)%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: edge
                      domains: ["*"]
                      routes:
                        # Route by the pool the tenant-router chose. Add a header
                        # match per pool you serve; default falls through to
                        # application.
                        - match:
                            prefix: "/"
                            headers: [{ name: x-route-pool, string_match: { exact: "application" } }]
                          route: { cluster: pool_application }
                        - match:
                            prefix: "/"
                            headers: [{ name: x-route-pool, string_match: { exact: "api" } }]
                          route: { cluster: pool_api }
                        - match:
                            prefix: "/"
                            headers: [{ name: x-route-pool, string_match: { exact: "checkout" } }]
                          route: { cluster: pool_checkout }
                        - match:
                            prefix: "/"
                            headers: [{ name: x-route-pool, string_match: { exact: "assets" } }]
                          route: { cluster: pool_assets }
                        # Default: no/unknown x-route-pool -> application pool.
                        - match: { prefix: "/" }
                          route: { cluster: pool_application }
                http_filters:
                  # COARSE DEFENSE-IN-DEPTH (edge-trusted-header-strip, design D2):
                  # a first-pass exact-name strip. The AUTHORITATIVE default-drop of
                  # the trusted family is a single-sourced PREFIX drop in the
                  # tenant-router ext_proc, so this list is not a maintenance invariant
                  # (a new trusted header is safe without being added here).
                  - name: envoy.filters.http.header_mutation
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                      mutations:
                        request_mutations:
                          - remove: "x-workspace-id"
                          - remove: "x-workspace-plan"
                          - remove: "x-workspace-features"
                          - remove: "x-route-pool"
                          - remove: "x-routed-by"
                          - remove: "x-geo-source"
                          - remove: "x-geo-country"
                          - remove: "x-geo-continent"
                          - remove: "x-geo-region"
                          - remove: "x-geo-city"
                          - remove: "x-geo-postal-code"
                          - remove: "x-geo-timezone"
                          - remove: "x-geo-latitude"
                          - remove: "x-geo-longitude"
                          - remove: "x-geo-client-ip"
                          - remove: "x-locale"
                          - remove: "x-lang"
                          - remove: "x-currency"
                          - remove: "x-privacy-gpc"
                          - remove: "x-privacy-dnt"
                          - remove: "x-device-type"
                          - remove: "x-user-id"
                          - remove: "x-user-org"
                          - remove: "x-user-roles"
                          - remove: "x-user-entitlements"
                          - remove: "x-user-suspended"
                          - remove: "x-user-enriched-by"
                          # Workspace-scoped acting identity (nexus-owned tenancy):
                          # authored authoritatively by the identity sidecar after a
                          # live membership check — strip client copies (C3).
                          # `x-requested-workspace` stays an allowed non-auth hint.
                          - remove: "x-user-type"
                          - remove: "x-user-role"
                          - remove: "x-auth-anonymous"
                          - remove: "x-auth-method"
                          # The per-route auth gate (RFC N4): the tenant-router
                          # emits it and jwt_authn branches on it, so a client
                          # copy must never survive to forge the gate (C3).
                          - remove: "x-auth-required"
                          # Phase-2 requirement signals (N4): emitted by the
                          # tenant-router only when the resolved rule sets them and
                          # enforced (403) by the identity sidecar. Strip client
                          # copies so a client can neither add nor suppress a
                          # requirement (C3, same rule as x-auth-required).
                          - remove: "x-auth-requires-role"
                          - remove: "x-auth-requires-entitlement"
                          - remove: "x-auth-min-aal"
                          # identity-existence-hiding: account-scoped route marker
                          # (tenant-router → identity sidecar's membership-404 gate).
                          # Strip client copies so a client can't self-exempt (C3);
                          # absence = workspace-scoped (fail-closed).
                          - remove: "x-auth-account-scoped"
                          # Versioned identity-contract stamp: the identity sidecar
                          # authors it as a DRIFT/version signal for the
                          # x-workspace-*/x-user-* header shape — NOT proof of edge
                          # origin (that guarantee is edge-origin-trust origin
                          # enforcement). Strip any client copy so a version cannot be
                          # forged (C3, same rule as x-auth-required/x-workspace-id).
                          - remove: "x-identity-contract"
                          # W3C trace context (N6): the edge is the ONLY origin of
                          # trace context on the internal network. Boxes continue an
                          # arriving trace (fail-open contract), so a client-forged
                          # traceparent must never survive to be joined (C3).
                          - remove: "traceparent"
                          - remove: "tracestate"
                  # Tenant routing (C14/C15/C18) — BEFORE auth so verification may
                  # be tenant-scoped (C17). fail-closed: a routing failure must not
                  # silently default a route.
                  - name: tenant-router.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc: { cluster_name: tenant_router }
                      failure_mode_allow: false
                      message_timeout: 5s
                      processing_mode:
                        request_header_mode: SEND
                        response_header_mode: SKIP
                        request_body_mode: NONE
                        response_body_mode: NONE
                        request_trailer_mode: SKIP
                        response_trailer_mode: SKIP
                  # Verify the bearer credential against the ZITADEL JWKS (C1).
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        # oidc-provider-independence: vendor-neutral provider name.
                        # Any conformant OIDC provider works by setting issuer +
                        # remote_jwks; ZITADEL is the currently deployed provider.
                        oidc:
                          # Must equal the `iss` your OIDC provider mints (RFC §6.6).
                          issuer: "https://auth.example.com"
                          # AUDIENCE PINNING — intentionally NOT enabled (normalized-principal
                          # ADR-5a). An `aud` check only matters when one issuer serves MULTIPLE
                          # audiences; here the edge is ZITADEL's sole relying party (boxes verify
                          # the nexus contract, not the raw token), so the `iss` pin already fully
                          # scopes tokens and this is redundant. Enable only if a second first-party
                          # audience appears — define an edge audience + configure ZITADEL to mint
                          # it, then uncomment. See ADR-5a.
                          # audiences: ["<edge-audience>"]
                          remote_jwks:
                            http_uri:
                              # The Host header sent on the JWKS fetch must equal
                              # the issuer authority; the `cluster` is the in-
                              # cluster in-cluster OIDC provider upstream (oidc_jwks
                              # below).
                              # edge-trust-anchor-integrity: fetch the JWKS over HTTPS
                              # with cert validation on any untrusted path. Plaintext
                              # JWKS lets a network MITM substitute signing keys →
                              # full auth bypass. Changing the scheme here is NOT
                              # enough — Envoy uses TLS only if the `oidc_jwks`
                              # CLUSTER has a `transport_socket` (UpstreamTlsContext
                              # with validation_context + SNI + SAN match; see the
                              # Helm charts' oidc.jwksTls for the reference
                              # wiring). This dev/compose config keeps plaintext ONLY
                              # under the explicitly asserted trusted path (the
                              # compose-internal hop to its bundled provider — the
                              # charts call it oidc.jwksPlaintextTrustedPath); on
                              # any other topology this configuration fails the spec.
                              uri: "http://auth.example.com/oauth/v2/keys"
                              cluster: oidc_jwks
                              timeout: 5s
                            cache_duration: { seconds: 600 }
                          payload_in_metadata: verified
                          forward: true
                        # SECOND provider (normalized-principal task 3.1): infra-trust
                        # identity for a CORE PLATFORM SERVICE — NOT the human IdP
                        # (ADR-5/6). In PRODUCTION point `remote_jwks` at the cluster's
                        # OIDC discovery JWKS (a K8s projected ServiceAccount token) and
                        # set `issuer` to the cluster issuer — verification reuses this
                        # exact path with ZERO new code. In COMPOSE-DEV this is a STUB
                        # (task 3.3): a `local_jwks` + a dev issuer. ONLY the issuer/JWKS
                        # source differs from prod; the verification mechanism is
                        # identical. (Kept in sync with edge/envoy.yaml.)
                        service_account:
                          issuer: "https://sa.nexus.local"
                          audiences: ["nexus-edge"]
                          local_jwks:
                            inline_string: |
                              {"keys":[{"kty":"EC","crv":"P-256","alg":"ES256","use":"sig","kid":"test-key-1","x":"lxP_9XLIHt9Tn9gt7cFBkRpc5jBny782LcAej_ImMyY","y":"EKTNsYnArpXYqLRQt2lkgJ1j-zEoKVA9wEXjHwVHPBo"}]}
                          payload_in_metadata: verified_service
                          forward: true
                      # Per-route auth gate (RFC N4). jwt_authn runs AFTER the
                      # tenant-router ext_proc (C17 tenant-first), so it branches on
                      # the x-auth-required the router set from the (domain, path)
                      # policy. First match wins, INVERTED fail-safe polarity:
                      #  - x-auth-required: "false" -> allow_missing: a MISSING token
                      #    passes anonymous; a PRESENT-but-invalid one still 401s
                      #    (NOT allow_missing_or_failed). This opens public routes.
                      #  - "true" OR ABSENT -> the catch-all demands a verified
                      #    credential. Absence is unreachable today (failure_mode_
                      #    allow:false + the router always emits), but the catch-all
                      #    keeps the gate fail-CLOSED if that ever changes.
                      # The header_mutation strip above makes x-auth-required
                      # unforgeable, which this catch-all relies on.
                      rules:
                        - match:
                            prefix: "/"
                            headers: [{ name: x-auth-required, string_match: { exact: "false" } }]
                          requires: { allow_missing: {} }
                        - match: { prefix: "/" }
                          # EITHER trust boundary satisfies the gate (task 3.1): a human
                          # OIDC token OR a core-service infra-trust token. Envoy picks
                          # the provider whose issuer matches the token's `iss`.
                          requires:
                            requires_any:
                              requirements:
                                - { provider_name: oidc }
                                - { provider_name: service_account }
                  # Enrich from the verified subject (C2).
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc: { cluster_name: identity_sidecar }
                      failure_mode_allow: false
                      message_timeout: 5s
                      processing_mode:
                        request_header_mode: SEND
                        response_header_mode: SKIP
                        request_body_mode: NONE
                        response_body_mode: NONE
                        request_trailer_mode: SKIP
                        response_trailer_mode: SKIP
                      metadata_options:
                        forwarding_namespaces:
                          untyped: ["envoy.filters.http.jwt_authn"]
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ---- In-stack resolution planes (no edits needed) -----------------------
    - name: tenant_router
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: tenant_router
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: tenant-router, port_value: 50052 }

    - name: identity_sidecar
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: identity_sidecar
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: identity-sidecar, port_value: 50051 }

    # ---- EXTERNAL upstreams — EDIT to point at YOUR infrastructure ----------
    # OTel Collector (N6): the edge's ONLY telemetry egress — trace export goes
    # here and nowhere else (the collector alone knows the trace store). This
    # production stack bundles NO monitoring; point this at your collector's
    # OTLP/gRPC endpoint. Fail-open: an unreachable collector never affects
    # request handling (deliberately NOT a startup dependency).
    - name: otel_collector
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: otel_collector
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: otel-collector, port_value: 4317 }

    # OIDC provider (the IdP) — for the JWKS fetch. Address = the in-cluster/host
    # endpoint Envoy can reach; the Host header above stays the issuer authority.
    - name: oidc_jwks
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: oidc_jwks
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: auth.example.com, port_value: 80 }

    # Backend pools — the finite set the routing decision selects among (RFC
    # C15). Point each at your own backend. `application` is the default target.
    - name: pool_application
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: pool_application
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: app-backend.example.com, port_value: 80 }
    - name: pool_api
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: pool_api
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: api-backend.example.com, port_value: 80 }
    - name: pool_checkout
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: pool_checkout
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: checkout-backend.example.com, port_value: 80 }
    - name: pool_assets
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: pool_assets
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: assets-backend.example.com, port_value: 80 }
