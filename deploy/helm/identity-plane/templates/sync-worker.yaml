{{- $fullName := include "identity-plane.fullname" . -}}
{{- $selfUrl := .Values.syncWorker.selfUrl | default (printf "http://%s-sync-worker.%s.svc.cluster.local:8080/webhook" $fullName .Release.Namespace) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-sync-worker
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
    {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "sync-worker") | nindent 4 }}
spec:
  # Single owner: the worker registers ITS OWN webhook signing key on startup.
  # Running >1 means each replica owns a different key and only one matches the
  # active execution — keep at 1 (the reconciler is the redundancy, RFC C8).
  replicas: {{ .Values.syncWorker.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "sync-worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "identity-plane.labels" . | nindent 8 }}
        {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "sync-worker") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: sync-worker
          image: {{ include "identity-plane.image" (dict "repo" .Values.images.syncWorker.repository "tag" .Values.images.syncWorker.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.images.syncWorker.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: MONGO_URL
              value: {{ include "identity-plane.mongoUri" . | quote }}
            - name: MONGO_DB
              value: {{ .Values.mongo.db | quote }}
            - name: MONGO_COLLECTION
              value: {{ .Values.mongo.collection | quote }}
            - name: ZITADEL_INTERNAL_URL
              value: {{ .Values.zitadel.internalUrl | quote }}
            - name: ZITADEL_HOST
              value: {{ include "identity-plane.jwksHost" . | quote }}
            - name: WEBHOOK_SELF_URL
              value: {{ $selfUrl | quote }}
            - name: PAT_FILE
              value: "/secrets/zitadel-admin-sa.pat"
            - name: LOG_FORMAT
              value: {{ .Values.syncWorker.logFormat | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.syncWorker.logLevel | quote }}
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources: {{- toYaml .Values.syncWorker.resources | nindent 12 }}
          volumeMounts:
            - { name: pat, mountPath: /secrets, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: pat
          secret:
            secretName: {{ include "identity-plane.patSecretName" . }}
            items:
              - key: {{ .Values.zitadel.patSecret.key }}
                path: zitadel-admin-sa.pat
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-sync-worker
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
    {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "sync-worker") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "sync-worker") | nindent 4 }}
  ports:
    # Carries the webhook (ZITADEL -> here), /metrics, and /healthz.
    - { name: http, port: 8080, targetPort: http, protocol: TCP }
