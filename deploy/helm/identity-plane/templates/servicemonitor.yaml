{{- if .Values.metrics.serviceMonitor.enabled -}}
{{- $fullName := include "identity-plane.fullname" . -}}
{{- $labels := .Values.metrics.serviceMonitor.labels -}}
{{- $interval := .Values.metrics.serviceMonitor.interval -}}
# first-party-telemetry (Change B): the identity-plane Rust services (sidecar,
# sync-worker, reconciler, membership-sync) NO LONGER expose scrape endpoints — they
# PUSH OTLP metrics to the collector (one endpoint env; see deploy/README.md
# "Telemetry"). Their ServiceMonitors and the sidecar PodMonitor scrape target were
# retired. Only Envoy's own admin stats (:9901), outside the box telemetry contract,
# remain scrape-based.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ $fullName }}-edge
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
    {{- with $labels }}{{- toYaml . | nindent 4 }}{{- end }}
spec:
  selector:
    matchLabels:
      {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 6 }}
  podMetricsEndpoints:
    - { port: admin, path: /stats/prometheus, interval: {{ $interval | quote }} }
{{- end }}
