{{- if and .Values.membershipSync.enabled (eq (include "identity-plane.ownsRoutingPgSecret" .) "true") -}}
# Chart-managed Secret wrapping the inline read-only routing DB URL the
# membership-sync worker uses to LISTEN on routing_membership_changes and SELECT
# routing.memberships. When routingPg.existingSecret is set, the chart uses THAT
# instead and renders nothing here — prefer that (or an ExternalSecret /
# SealedSecret) so the credential never lives in values. Grant this credential
# least privilege: SELECT on routing.memberships + LISTEN, no write.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "identity-plane.fullname" . }}-routing-ro
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "identity-plane.routingPgUrl" . | quote }}
{{- end }}
