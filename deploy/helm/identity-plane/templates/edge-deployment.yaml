{{- if .Values.edge.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "identity-plane.fullname" . }}-edge
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
    {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
spec:
  {{- if not .Values.edge.autoscaling.enabled }}
  replicas: {{ .Values.edge.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "identity-plane.labels" . | nindent 8 }}
        {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 8 }}
      annotations:
        # Roll pods when the Envoy config changes.
        checksum/envoy-config: {{ include (print $.Template.BasePath "/edge-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        # ---- Identity sidecar (per-pod): ext_proc :50051, profile/health :9200,
        #      metrics :9202. Reached by Envoy over 127.0.0.1. ----
        - name: sidecar
          image: {{ include "identity-plane.image" (dict "repo" .Values.images.sidecar.repository "tag" .Values.images.sidecar.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.images.sidecar.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: PROFILE_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "identity-plane.pgSecretName" . }}
                  key: {{ include "identity-plane.pgSecretKey" . }}
            - name: CACHE_TTL_SECONDS
              value: {{ .Values.sidecar.cacheTtlSeconds | quote }}
            - name: READINESS_DELAY_SECONDS
              value: {{ .Values.sidecar.readinessDelaySeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.sidecar.rustLog | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.sidecar.logFormat | quote }}
            {{- with .Values.sidecar.apiKeyResolveCache }}
            {{- if .enabled }}
            # apikey-resolve-cache: opt-in bounded working-set cache for the api-key resolve
            # SELECT. Targeted eviction on the api_key_changes feed keeps revoke/rotate live
            # within seconds; ttlSeconds is the staleness ceiling for a dropped NOTIFY.
            - { name: APIKEY_RESOLVE_CACHE_ENABLED, value: "true" }
            - { name: APIKEY_RESOLVE_CACHE_TTL_SECONDS, value: {{ .ttlSeconds | quote }} }
            - { name: APIKEY_RESOLVE_CACHE_MAX_CAPACITY, value: {{ .maxCapacity | quote }} }
            - { name: APIKEY_RESOLVE_CACHE_POLL_SECONDS, value: {{ .pollSeconds | quote }} }
            {{- end }}
            {{- end }}
            {{- $otlp := include "identity-plane.otlpEndpoint" . }}
            {{- if $otlp }}
            # first-party-telemetry: PUSH traces/metrics/logs via OTLP/gRPC to the
            # collector (chart-local or umbrella global). Unset => export off.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $otlp | quote }}
            # first-party-telemetry: deployment.environment.name is a REQUIRED invariant
            # when export is on (per-environment SLOs); render fails closed if unset.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "identity-plane.otelResourceAttributes" . | quote }}
            {{- end }}
            {{- if .Values.sidecar.signing.enabled }}
            {{- $s := .Values.sidecar.signing }}
            # identity-contract-signing: mint x-identity-contract (ES256) + publish the
            # public keys on :9210. `aud` is derived from x-route-pool, not configured.
            - { name: SIGNING_ISSUER, value: {{ $s.issuer | quote }} }
            - { name: CONTRACT_TOKEN_TTL_SECONDS, value: {{ $s.tokenTtlSeconds | quote }} }
            - { name: JWKS_LISTEN, value: {{ $s.jwksListen | quote }} }
            {{- if $s.transit.enabled }}
            # automate-signing-key-rotation: managed custody + AUTOMATED rotation via
            # OpenBao Transit (Mode B local signing). The sidecar pulls versioned keys,
            # GENERATES the JWKS from Transit's public keys, and rotates on schedule /
            # on demand. If Bao is unreachable at startup it falls back to the break-glass
            # PEM below (when provided) rather than running unsigned.
            - { name: SIGNING_TRANSIT_KEY, value: {{ required "sidecar.signing.transit.keyName is required when transit is enabled" $s.transit.keyName | quote }} }
            - { name: SIGNING_TRANSIT_MOUNT, value: {{ $s.transit.mount | quote }} }
            - { name: BAO_ADDR, value: {{ required "sidecar.signing.transit.address is required when transit is enabled" $s.transit.address | quote }} }
            - name: BAO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $s.transit.tokenExistingSecret | default (printf "%s-bao-token" (include "identity-plane.fullname" .)) }}
                  key: token
            - { name: SIGNING_KEY_POLL_SECONDS, value: {{ $s.transit.pollSeconds | quote }} }
            - { name: CONTRACT_MAX_CLOCK_SKEW_SECONDS, value: {{ $s.transit.maxClockSkewSeconds | quote }} }
            {{- with $s.transit.rotationPeriodSeconds }}
            - { name: SIGNING_ROTATION_PERIOD_SECONDS, value: {{ . | quote }} }
            {{- end }}
            {{- end }}
            {{- if $s.kid }}
            # Break-glass MANUAL key (the pre-rotation path; also the Transit startup
            # fallback). Present whenever manual key material is configured.
            - { name: SIGNING_KEY_PATH, value: /etc/nexus/signing-key/key.pem }
            - { name: SIGNING_KID, value: {{ $s.kid | quote }} }
            - { name: JWKS_FILE, value: /etc/nexus/signing-jwks/jwks.json }
            {{- end }}
            {{- end }}
          ports:
            - { name: ext-proc, containerPort: 50051 }
            - { name: profile, containerPort: 9200 }
            - { name: metrics, containerPort: 9202 }
            {{- if .Values.sidecar.signing.enabled }}
            - { name: jwks, containerPort: 9210 }
            {{- end }}
          {{- if and .Values.sidecar.signing.enabled .Values.sidecar.signing.kid }}
          # Break-glass key material only: pure-Transit mode mounts nothing here (the key
          # lives in OpenBao and the JWKS is generated).
          volumeMounts:
            - { name: signing-key, mountPath: /etc/nexus/signing-key, readOnly: true }
            - { name: signing-jwks, mountPath: /etc/nexus/signing-jwks, readOnly: true }
          {{- end }}
          # /healthz returns 503 until the initial KV replay completes (RFC C6),
          # so readiness gates the pod out of rotation until the cache is warm.
          readinessProbe:
            httpGet: { path: /healthz, port: profile }
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket: { port: ext-proc }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.edge.resources.sidecar | nindent 12 }}
        # ---- Envoy edge ----
        - name: envoy
          image: {{ include "identity-plane.image" (dict "repo" .Values.images.envoy.repository "tag" .Values.images.envoy.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.images.envoy.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
          ports:
            - { name: http, containerPort: 10000 }
            - { name: admin, containerPort: 9901 }
          readinessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.edge.resources.envoy | nindent 12 }}
          volumeMounts:
            - { name: envoy-config, mountPath: /etc/envoy, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "identity-plane.fullname" . }}-edge-envoy
        - name: tmp
          emptyDir: {}
        {{- if and .Values.sidecar.signing.enabled .Values.sidecar.signing.kid }}
        # Break-glass manual key material only (pure-Transit mode has none): the private
        # key (Secret) + the public JWKS (ConfigMap). In Transit mode the key stays in
        # OpenBao and the JWKS is generated, so these volumes are omitted.
        - name: signing-key
          secret:
            secretName: {{ .Values.sidecar.signing.existingSecret | default (printf "%s-signing-key" (include "identity-plane.fullname" .)) }}
        - name: signing-jwks
          configMap:
            name: {{ include "identity-plane.fullname" . }}-signing-jwks
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
