{{- if .Values.edge.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "identity-plane.fullname" . }}-edge
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
    {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
spec:
  {{- if not .Values.edge.autoscaling.enabled }}
  replicas: {{ .Values.edge.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "identity-plane.labels" . | nindent 8 }}
        {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 8 }}
      annotations:
        # Roll pods when the Envoy config changes.
        checksum/envoy-config: {{ include (print $.Template.BasePath "/edge-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        # ---- Identity sidecar (per-pod): ext_proc :50051, profile/health :9200,
        #      metrics :9202. Reached by Envoy over 127.0.0.1. ----
        - name: sidecar
          image: {{ include "identity-plane.image" (dict "repo" .Values.images.sidecar.repository "tag" .Values.images.sidecar.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.images.sidecar.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: PROFILE_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "identity-plane.pgSecretName" . }}
                  key: {{ include "identity-plane.pgSecretKey" . }}
            - name: CACHE_TTL_SECONDS
              value: {{ .Values.sidecar.cacheTtlSeconds | quote }}
            - name: READINESS_DELAY_SECONDS
              value: {{ .Values.sidecar.readinessDelaySeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.sidecar.rustLog | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.sidecar.logFormat | quote }}
            {{- $otlp := include "identity-plane.otlpEndpoint" . }}
            {{- if $otlp }}
            # first-party-telemetry: PUSH traces/metrics/logs via OTLP/gRPC to the
            # collector (chart-local or umbrella global). Unset => export off.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $otlp | quote }}
            {{- end }}
            {{- if .Values.sidecar.signing.enabled }}
            # identity-contract-signing: sign x-identity-contract (ES256) + publish the
            # public keys on :9210. `aud` is derived from x-route-pool, not configured.
            - { name: SIGNING_KEY_PATH, value: /etc/nexus/signing-key/key.pem }
            - { name: SIGNING_KID, value: {{ required "sidecar.signing.kid is required when signing is enabled" .Values.sidecar.signing.kid | quote }} }
            - { name: SIGNING_ISSUER, value: {{ .Values.sidecar.signing.issuer | quote }} }
            - { name: CONTRACT_TOKEN_TTL_SECONDS, value: {{ .Values.sidecar.signing.tokenTtlSeconds | quote }} }
            - { name: JWKS_FILE, value: /etc/nexus/signing-jwks/jwks.json }
            - { name: JWKS_LISTEN, value: {{ .Values.sidecar.signing.jwksListen | quote }} }
            {{- end }}
          ports:
            - { name: ext-proc, containerPort: 50051 }
            - { name: profile, containerPort: 9200 }
            - { name: metrics, containerPort: 9202 }
            {{- if .Values.sidecar.signing.enabled }}
            - { name: jwks, containerPort: 9210 }
            {{- end }}
          {{- if .Values.sidecar.signing.enabled }}
          volumeMounts:
            - { name: signing-key, mountPath: /etc/nexus/signing-key, readOnly: true }
            - { name: signing-jwks, mountPath: /etc/nexus/signing-jwks, readOnly: true }
          {{- end }}
          # /healthz returns 503 until the initial KV replay completes (RFC C6),
          # so readiness gates the pod out of rotation until the cache is warm.
          readinessProbe:
            httpGet: { path: /healthz, port: profile }
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket: { port: ext-proc }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.edge.resources.sidecar | nindent 12 }}
        # ---- Envoy edge ----
        - name: envoy
          image: {{ include "identity-plane.image" (dict "repo" .Values.images.envoy.repository "tag" .Values.images.envoy.tag "ctx" .) }}
          imagePullPolicy: {{ .Values.images.envoy.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
          ports:
            - { name: http, containerPort: 10000 }
            - { name: admin, containerPort: 9901 }
          readinessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.edge.resources.envoy | nindent 12 }}
          volumeMounts:
            - { name: envoy-config, mountPath: /etc/envoy, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "identity-plane.fullname" . }}-edge-envoy
        - name: tmp
          emptyDir: {}
        {{- if .Values.sidecar.signing.enabled }}
        # identity-contract-signing: private key (Secret) + public JWKS (ConfigMap).
        - name: signing-key
          secret:
            secretName: {{ .Values.sidecar.signing.existingSecret | default (printf "%s-signing-key" (include "identity-plane.fullname" .)) }}
        - name: signing-jwks
          configMap:
            name: {{ include "identity-plane.fullname" . }}-signing-jwks
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
