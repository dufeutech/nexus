{{- if eq (include "identity-plane.ownsAuthzAdminSecret" .) "true" -}}
# Created only when authzAdmin.existingSecret is empty AND auth is not disabled.
# PREFER an existing Secret (or an ExternalSecret / SealedSecret) so the admin token
# never lives in values or the rendered release manifest. This bearer token gates the
# authorization AUTHORING surface (grant/revoke/suspend) — treat it as high-privilege.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "identity-plane.authzAdminSecretName" . }}
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "Set authzAdmin.adminToken, authzAdmin.existingSecret, or authzAdmin.authDisabled=true" .Values.authzAdmin.adminToken | quote }}
{{- end }}
