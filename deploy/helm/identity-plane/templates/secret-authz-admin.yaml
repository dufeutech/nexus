{{- if eq (include "identity-plane.ownsAuthzAdminSecret" .) "true" -}}
# Chart-managed Secret holding the authz-admin legacy bearer token (posture 2).
# Rendered only for an inline authzAdmin.adminToken with no existingSecret. PREFER an
# existing Secret (or an ExternalSecret / SealedSecret) so the token never lives in
# values or the rendered manifest. This bearer token gates the authorization AUTHORING
# surface (grant/revoke/suspend) — treat it as high-privilege.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "identity-plane.authzAdminSecretName" . }}
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.authzAdmin.adminToken | quote }}
{{- end }}
{{- if eq (include "identity-plane.ownsAuthzAdminPepperSecret" .) "true" }}
---
# Chart-managed Secret holding the authz-admin admin-token PEPPER (posture 1, named
# tokens). Rendered only for an inline authzAdmin.tokenPepper.value with no
# existingSecret. DEV ONLY — the pepper is HMAC key material; in production seed it into
# a Secret (ESO/OpenBao) and reference it via tokenPepper.existingSecret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "identity-plane.authzAdminPepperSecretName" . }}
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  pepper: {{ .Values.authzAdmin.tokenPepper.value | quote }}
{{- end }}
