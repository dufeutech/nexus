{{- if not .Values.oidc.patSecret.existingSecret -}}
# Created only when oidc.patSecret.existingSecret is empty. PREFER an existing
# Secret (or an ExternalSecret / SealedSecret) so the PAT never lives in values
# or the rendered release manifest. This admin PAT is a high-privilege credential
# (it can register webhooks and list every user) — treat it accordingly.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "identity-plane.patSecretName" . }}
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.oidc.patSecret.key }}: {{ required "Set oidc.patSecret.value or oidc.patSecret.existingSecret" .Values.oidc.patSecret.value | quote }}
{{- end }}
