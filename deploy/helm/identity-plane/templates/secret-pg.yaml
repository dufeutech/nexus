{{- if eq (include "identity-plane.ownsPgSecret" .) "true" -}}
# Chart-managed Postgres Secret wrapping the inline external PROFILE_PG_URL the
# sidecar, sync-worker and reconciler read. When postgres.existingSecret is set,
# the chart uses THAT instead and renders nothing here — prefer that (or an
# ExternalSecret / SealedSecret) so the credential never lives in values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "identity-plane.fullname" . }}-pg
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "identity-plane.pgUrl" . | quote }}
{{- end }}
