{{- /*
Envoy edge config, parameterized from values. Mirrors the lab's
../../../zitadel-lab/edge/envoy.yaml but with issuer/JWKS/clusters driven by
config and the sidecar reached over loopback (per-pod topology).

Filter order is load-bearing: header_mutation (strip client x-user-*, RFC C3)
-> jwt_authn (verify + claims to metadata, C1) -> ext_proc (sidecar enriches,
C2) -> router.
*/ -}}
{{- $u := .Values.zitadel.internalUrl | trimPrefix "http://" | trimPrefix "https://" | trimSuffix "/" -}}
{{- $zHost := $u -}}
{{- $zPort := "8080" -}}
{{- if contains ":" $u -}}
{{- $zHost = first (splitList ":" $u) -}}
{{- $zPort = last (splitList ":" $u) -}}
{{- end -}}
{{- $sc := .Values.edge.sidecarCluster -}}
{{- $scHost := first (splitList ":" $sc) -}}
{{- $scPort := last (splitList ":" $sc) -}}
{{- if .Values.edge.enabled -}}
{{- /* edge-trust-anchor-integrity: the JWKS fetch is the root of ALL token
verification — refuse to render an edge whose trust anchor would travel an
unprotected channel nobody has vouched for (fail closed, not silently open). */ -}}
{{- if and (not .Values.zitadel.jwksTls.enabled) (not .Values.zitadel.jwksPlaintextTrustedPath) -}}
{{- fail "the edge fetches its JWT trust anchor (JWKS) but no transport-integrity choice is set — an on-path attacker substituting signing keys is a FULL auth bypass (edge-trust-anchor-integrity). Set zitadel.jwksTls.enabled=true to fetch over TLS with server-cert verification (preferred), or zitadel.jwksPlaintextTrustedPath=true to explicitly assert the edge→ZITADEL path is trusted (loopback / assessed in-cluster hop). Rendering without either would silently trust unauthenticated keys." -}}
{{- end -}}
{{- $jwksScheme := ternary "https" "http" .Values.zitadel.jwksTls.enabled -}}
{{- $jwksSni := .Values.zitadel.jwksTls.sni | default $zHost -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "identity-plane.fullname" . }}-edge-envoy
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
    {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      # Bound to the pod so the kubelet can probe /ready. NOT exposed via the
      # Service, so it stays off the data path (no /stats or /quitquitquit reachable
      # through the ingress).
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }

    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address: { address: 0.0.0.0, port_value: 10000 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: edge
                    # Canonicalize :path BEFORE the auth gate / enrichment read it,
                    # so an encoded/dot-segment path can't read as one route to the
                    # gate and another to the backend (auth-gate path confusion).
                    # RFC 3986 dot removal + merge slashes + unescape %2F.
                    normalize_path: true
                    merge_slashes: true
                    path_with_escaped_slashes_action: UNESCAPE_AND_FORWARD
                    # Trace-context integrity (N6/C3): strip client
                    # traceparent/tracestate BEFORE Envoy's tracing decision.
                    # This standalone edge configures no tracer today, but the
                    # early strip keeps the integrity rule uniform across every
                    # edge (a later tracer addition cannot silently join a
                    # client-rooted trace). The filter-level strip below stays
                    # as defense-in-depth for the backend-facing guarantee.
                    early_header_mutation_extensions:
                      - name: envoy.http.early_header_mutation.header_mutation
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.http.early_header_mutation.header_mutation.v3.HeaderMutation
                          mutations:
                            - remove: "traceparent"
                            - remove: "tracestate"
                    # JSON access log (audit trail): method/path/status/host and the
                    # auth outcome. Deliberately NO Authorization header and NO
                    # x-user-* (PII/secret hygiene). response_flags shows WHY a
                    # request was rejected (e.g. jwt_authn 401).
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              start_time: "%START_TIME%"
                              method: "%REQ(:METHOD)%"
                              path: "%REQ(:PATH)%"
                              protocol: "%PROTOCOL%"
                              response_code: "%RESPONSE_CODE%"
                              response_flags: "%RESPONSE_FLAGS%"
                              duration_ms: "%DURATION%"
                              authority: "%REQ(:AUTHORITY)%"
                              upstream_host: "%UPSTREAM_HOST%"
                              auth_required: "%REQ(X-AUTH-REQUIRED)%"
                              user_agent: "%REQ(USER-AGENT)%"
                              request_id: "%REQ(X-REQUEST-ID)%"
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            {{- range .Values.edge.publicPaths }}
                            # C10: EXPLICITLY designated non-enriched route
                            # (identity-workspace-authz): ext_proc disabled, so it
                            # is served (fail-open) even if the sidecar is down and
                            # reaches the backend unstamped BY DESIGN. Auth is still
                            # enforced by jwt_authn below. Rendered from the ONE
                            # edge.publicPaths allowlist, so designation and edge
                            # behavior cannot drift.
                            - match: { prefix: {{ . | quote }} }
                              route: { cluster: backend }
                              typed_per_filter_config:
                                envoy.filters.http.ext_proc:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                                  disabled: true
                            {{- end }}
                            # Fail-closed default: every route NOT on the explicit
                            # publicPaths allowlist requires enrichment.
                            - match: { prefix: "/" }
                              route: { cluster: backend }
                    http_filters:
                      # FIRST: strip client-supplied identity headers before
                      # enrichment so the injected set is authoritative (RFC C3).
                      - name: envoy.filters.http.header_mutation
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                          mutations:
                            request_mutations:
                              - remove: "x-user-id"
                              - remove: "x-user-org"
                              - remove: "x-user-roles"
                              - remove: "x-user-roles-source"
                              - remove: "x-user-entitlements"
                              - remove: "x-user-suspended"
                              - remove: "x-user-enriched-by"
                              # Workspace-scoped acting identity (nexus-owned tenancy):
                              # authored authoritatively by the identity sidecar after a
                              # live membership check — strip client copies so a client
                              # cannot self-assert an acting workspace/type/role (C3).
                              # (This plane has no tenant-router, so the acting workspace
                              # is only present when an upstream stage sets it.)
                              - remove: "x-workspace-id"
                              - remove: "x-user-type"
                              - remove: "x-user-role"
                              # Trusted auth-state from the identity sidecar; strip
                              # client copies so is-anonymous is unforgeable (C3).
                              - remove: "x-auth-anonymous"
                              - remove: "x-auth-method"
                              # x-auth-required (RFC N4 per-route gate): this plane
                              # has NO tenant-router and does NOT consume it (jwt_authn
                              # below hard-requires a credential). Stripped purely as
                              # C3 hygiene so no client copy leaks to the backend. The
                              # per-route gate lives in the combined edge; adopting it
                              # here is a separate trust-boundary design (see the
                              # combined-edge-per-route-auth-gate change, design.md).
                              - remove: "x-auth-required"
                              # Versioned identity-contract stamp: authored by THIS
                              # plane's identity sidecar as a DRIFT/version signal for
                              # the x-workspace-*/x-user-* header shape — NOT proof of
                              # edge origin (that guarantee is edge-origin-trust's
                              # origin enforcement). Strip client copies so a client
                              # cannot forge a version (C3, same rule as
                              # x-workspace-id).
                              - remove: "x-identity-contract"
                              # W3C trace context (N6): the edge is the ONLY origin of
                              # trace context on the internal network. Boxes continue
                              # an arriving trace (fail-open contract), so a client-
                              # forged traceparent must never survive to be joined (C3).
                              - remove: "traceparent"
                              - remove: "tracestate"
                      - name: envoy.filters.http.jwt_authn
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                          providers:
                            zitadel:
                              issuer: {{ .Values.zitadel.issuer | quote }}
                              remote_jwks:
                                # uri authority -> Host header (must equal the
                                # issuer's external domain, which ZITADEL checks);
                                # cluster -> the in-cluster ZITADEL upstream.
                                # SECURITY: the JWKS gates ALL token verification —
                                # a MITM substituting keys is a full auth bypass
                                # (edge-trust-anchor-integrity). The scheme follows
                                # zitadel.jwksTls; the actual protection is the
                                # `transport_socket` on the `zitadel_jwks` cluster
                                # below (trusted CA + SNI + SAN match). A render
                                # guard refuses plaintext without an explicit
                                # trusted-path assertion.
                                http_uri:
                                  uri: "{{ $jwksScheme }}://{{ include "identity-plane.jwksHost" . }}{{ .Values.zitadel.jwksPath }}"
                                  cluster: zitadel_jwks
                                  timeout: 5s
                                cache_duration: { seconds: {{ .Values.zitadel.jwksCacheSeconds }} }
                              payload_in_metadata: verified
                              forward: true
                          rules:
                            - match: { prefix: "/" }
                              requires: { provider_name: zitadel }
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc: { cluster_name: identity_sidecar }
                          failure_mode_allow: {{ .Values.edge.failureModeAllow }}
                          message_timeout: {{ .Values.edge.extProcTimeout }}
                          processing_mode:
                            request_header_mode: SEND
                            response_header_mode: SKIP
                            request_body_mode: NONE
                            response_body_mode: NONE
                            request_trailer_mode: SKIP
                            response_trailer_mode: SKIP
                          metadata_options:
                            forwarding_namespaces:
                              untyped: ["envoy.filters.http.jwt_authn"]
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: backend
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: {{ .Values.backend.host | quote }}, port_value: {{ .Values.backend.port }} }

        - name: zitadel_jwks
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: zitadel_jwks
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: {{ $zHost | quote }}, port_value: {{ $zPort }} }
          {{- if .Values.zitadel.jwksTls.enabled }}
          # edge-trust-anchor-integrity: authenticate the key source and protect
          # the JWKS response against on-path substitution — verify the server
          # chain against the trusted CA AND pin the presented SAN, so a valid
          # cert for the wrong host cannot serve keys either.
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ $jwksSni | quote }}
              common_tls_context:
                validation_context:
                  trusted_ca:
                    filename: {{ .Values.zitadel.jwksTls.caFile | quote }}
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher: { exact: {{ $jwksSni | quote }} }
          {{- end }}

        - name: identity_sidecar
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: identity_sidecar
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        # Per-pod sidecar: loopback. For a shared sidecar
                        # Deployment, set edge.sidecarCluster to its Service DNS.
                        socket_address: { address: {{ $scHost | quote }}, port_value: {{ $scPort }} }
{{- end }}
