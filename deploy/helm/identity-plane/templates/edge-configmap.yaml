{{- /*
Envoy edge config, parameterized from values. Mirrors the lab's
../../../zitadel-lab/edge/envoy.yaml but with issuer/JWKS/clusters driven by
config and the sidecar reached over loopback (per-pod topology).

Filter order is load-bearing: header_mutation (strip client x-user-*, RFC C3)
-> jwt_authn (verify + claims to metadata, C1) -> ext_proc (sidecar enriches,
C2) -> router.
*/ -}}
{{- $u := .Values.zitadel.internalUrl | trimPrefix "http://" | trimPrefix "https://" | trimSuffix "/" -}}
{{- $zHost := $u -}}
{{- $zPort := "8080" -}}
{{- if contains ":" $u -}}
{{- $zHost = first (splitList ":" $u) -}}
{{- $zPort = last (splitList ":" $u) -}}
{{- end -}}
{{- $sc := .Values.edge.sidecarCluster -}}
{{- $scHost := first (splitList ":" $sc) -}}
{{- $scPort := last (splitList ":" $sc) -}}
{{- if .Values.edge.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "identity-plane.fullname" . }}-edge-envoy
  labels:
    {{- include "identity-plane.labels" . | nindent 4 }}
    {{- include "identity-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      # Bound to the pod so the kubelet can probe /ready. NOT exposed via the
      # Service, so it stays off the data path (no /stats or /quitquitquit reachable
      # through the ingress).
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }

    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address: { address: 0.0.0.0, port_value: 10000 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: edge
                    # Canonicalize :path BEFORE the auth gate / enrichment read it,
                    # so an encoded/dot-segment path can't read as one route to the
                    # gate and another to the backend (auth-gate path confusion).
                    # RFC 3986 dot removal + merge slashes + unescape %2F.
                    normalize_path: true
                    merge_slashes: true
                    path_with_escaped_slashes_action: UNESCAPE_AND_FORWARD
                    # JSON access log (audit trail): method/path/status/host and the
                    # auth outcome. Deliberately NO Authorization header and NO
                    # x-user-* (PII/secret hygiene). response_flags shows WHY a
                    # request was rejected (e.g. jwt_authn 401).
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              start_time: "%START_TIME%"
                              method: "%REQ(:METHOD)%"
                              path: "%REQ(:PATH)%"
                              protocol: "%PROTOCOL%"
                              response_code: "%RESPONSE_CODE%"
                              response_flags: "%RESPONSE_FLAGS%"
                              duration_ms: "%DURATION%"
                              authority: "%REQ(:AUTHORITY)%"
                              upstream_host: "%UPSTREAM_HOST%"
                              auth_required: "%REQ(X-AUTH-REQUIRED)%"
                              user_agent: "%REQ(USER-AGENT)%"
                              request_id: "%REQ(X-REQUEST-ID)%"
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: backend
                          domains: ["*"]
                          routes:
                            # C10: degradable route — ext_proc disabled, so it is
                            # served (fail-open) even if the sidecar is down. Auth
                            # is still enforced by jwt_authn below.
                            - match: { prefix: "/public" }
                              route: { cluster: backend }
                              typed_per_filter_config:
                                envoy.filters.http.ext_proc:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                                  disabled: true
                            # Default route requires enrichment: fail-closed.
                            - match: { prefix: "/" }
                              route: { cluster: backend }
                    http_filters:
                      # FIRST: strip client-supplied identity headers before
                      # enrichment so the injected set is authoritative (RFC C3).
                      - name: envoy.filters.http.header_mutation
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                          mutations:
                            request_mutations:
                              - remove: "x-user-id"
                              - remove: "x-user-org"
                              - remove: "x-user-roles"
                              - remove: "x-user-roles-source"
                              - remove: "x-user-entitlements"
                              - remove: "x-user-suspended"
                              - remove: "x-user-enriched-by"
                              # Workspace-scoped acting identity (nexus-owned tenancy):
                              # authored authoritatively by the identity sidecar after a
                              # live membership check — strip client copies so a client
                              # cannot self-assert an acting workspace/type/role (C3).
                              # (This plane has no tenant-router, so the acting workspace
                              # is only present when an upstream stage sets it.)
                              - remove: "x-workspace-id"
                              - remove: "x-user-type"
                              - remove: "x-user-role"
                              # Trusted auth-state from the identity sidecar; strip
                              # client copies so is-anonymous is unforgeable (C3).
                              - remove: "x-auth-anonymous"
                              - remove: "x-auth-method"
                              # x-auth-required (RFC N4 per-route gate): this plane
                              # has NO tenant-router and does NOT consume it (jwt_authn
                              # below hard-requires a credential). Stripped purely as
                              # C3 hygiene so no client copy leaks to the backend. The
                              # per-route gate lives in the combined edge; adopting it
                              # here is a separate trust-boundary design (see the
                              # combined-edge-per-route-auth-gate change, design.md).
                              - remove: "x-auth-required"
                              # Versioned identity-contract stamp: authored by THIS
                              # plane's identity sidecar so the backend can prove the
                              # identity headers are edge-produced. Strip client copies
                              # so a client can neither forge a version nor mask a
                              # bypass (C3, same rule as x-workspace-id).
                              - remove: "x-identity-contract"
                      - name: envoy.filters.http.jwt_authn
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                          providers:
                            zitadel:
                              issuer: {{ .Values.zitadel.issuer | quote }}
                              remote_jwks:
                                # uri authority -> Host header (must equal the
                                # issuer's external domain, which ZITADEL checks);
                                # cluster -> the in-cluster ZITADEL upstream.
                                # SECURITY (production): the JWKS gates ALL token
                                # verification — a MITM substituting keys is a full
                                # auth bypass. Over an untrusted network, fetch via
                                # HTTPS with cert validation. Scheme alone is not
                                # enough — Envoy uses TLS only if the `zitadel_jwks`
                                # cluster has a `transport_socket` (validation_context
                                # + SNI). TODO(hardening): gate behind zitadel.jwksTls.
                                http_uri:
                                  uri: "http://{{ include "identity-plane.jwksHost" . }}{{ .Values.zitadel.jwksPath }}"
                                  cluster: zitadel_jwks
                                  timeout: 5s
                                cache_duration: { seconds: {{ .Values.zitadel.jwksCacheSeconds }} }
                              payload_in_metadata: verified
                              forward: true
                          rules:
                            - match: { prefix: "/" }
                              requires: { provider_name: zitadel }
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc: { cluster_name: identity_sidecar }
                          failure_mode_allow: {{ .Values.edge.failureModeAllow }}
                          message_timeout: {{ .Values.edge.extProcTimeout }}
                          processing_mode:
                            request_header_mode: SEND
                            response_header_mode: SKIP
                            request_body_mode: NONE
                            response_body_mode: NONE
                            request_trailer_mode: SKIP
                            response_trailer_mode: SKIP
                          metadata_options:
                            forwarding_namespaces:
                              untyped: ["envoy.filters.http.jwt_authn"]
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: backend
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: backend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: {{ .Values.backend.host | quote }}, port_value: {{ .Values.backend.port }} }

        - name: zitadel_jwks
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: zitadel_jwks
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: {{ $zHost | quote }}, port_value: {{ $zPort }} }

        - name: identity_sidecar
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: identity_sidecar
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        # Per-pod sidecar: loopback. For a shared sidecar
                        # Deployment, set edge.sidecarCluster to its Service DNS.
                        socket_address: { address: {{ $scHost | quote }}, port_value: {{ $scPort }} }
{{- end }}
