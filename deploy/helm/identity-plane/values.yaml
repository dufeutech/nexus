# Identity Enrichment Plane — Helm values.
#
# This chart deploys the components THIS repo owns: the edge (Envoy + the Rust
# identity sidecar, co-located for hot-path latency), the authz-admin authorization
# authoring surface, and the membership-sync projection worker. The durable store
# (Postgres — source of truth + seq-cursor change feed over LISTEN/NOTIFY, RFC C4) is
# EXTERNAL, wired in via `postgres:` below.
#
# It treats the OIDC provider, its Postgres, and the protected backend as EXTERNAL
# dependencies you point at via config (see `oidc:` and `backend:` below). The
# provider answers ONLY "who am I" (authentication + basic profile); nexus authors
# ALL authorization itself (nexus-native-authorization). Run the provider (e.g.
# ZITADEL's official Helm chart, or a managed instance) separately and wire its
# issuer/JWKS in here — no admin PAT or directory integration is needed.

# -------------------------------------------------------------------------- #
# Images. The lab builds these from source (`build:` in docker-compose); for
# k8s you MUST build and push them to a registry you control, then set the refs
# here. There is no public image for the sidecar/authz-admin/membership-sync.
# -------------------------------------------------------------------------- #
images:
  # ONE tag for all first-party images below (they build together from one workspace,
  # so they share a release tag). Set this instead of overriding every per-image tag.
  # A per-image `tag` still wins; empty here falls back to the umbrella
  # `global.image.tag`, then the chart appVersion.
  tag: ""
  # All three are built from the one ../../identity-rs workspace (shared `core`
  # crate), selected by Docker build target:
  #   docker build --target sidecar         -t REGISTRY/identity-sidecar-rs:0.1.0      ../../identity-rs
  #   docker build --target authz-admin     -t REGISTRY/identity-authz-admin:0.1.0     ../../identity-rs
  #   docker build --target membership-sync -t REGISTRY/identity-membership-sync:0.1.0 ../../identity-rs
  sidecar:
    repository: REGISTRY/identity-sidecar-rs
    tag: ""            # defaults to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  authzAdmin:
    repository: REGISTRY/identity-authz-admin
    tag: ""
    pullPolicy: IfNotPresent
  membershipSync:
    repository: REGISTRY/identity-membership-sync
    tag: ""
    pullPolicy: IfNotPresent
  # Stock upstream edge proxy, pinned to a concrete patch version + immutable
  # digest (the rolling `v1.34-latest` tag must never reach production). The
  # digest is what `v1.34.14` resolved to on 2026-07-06; re-resolve on bump with
  #   docker buildx imagetools inspect envoyproxy/envoy:<tag> | grep Digest
  envoy:
    repository: envoyproxy/envoy
    tag: v1.34.14@sha256:cfc0678bc03cca19cbb031688acb31d510bff501ff97e163026a375fe0515d69
    pullPolicy: IfNotPresent

imagePullSecrets: []

# -------------------------------------------------------------------------- #
# OIDC provider (external IdP). oidc-provider-independence: nexus verifies tokens
# against ANY conformant OIDC provider selected by this config — ZITADEL is the
# currently deployed one. The "verify, don't guess" facts (RFC §6.6) were settled
# against the lab instance; re-confirm issuer/JWKS against YOUR provider.
# -------------------------------------------------------------------------- #
oidc:
  # Public issuer exactly as the provider mints it into the `iss` claim. Envoy's
  # jwt_authn rejects any token whose issuer differs. e.g. https://auth.example.com
  issuer: "https://auth.example.com"
  # In-cluster endpoint Envoy actually dials for the JWKS. The JWKS is fetched here
  # while the `Host` header is set to the issuer's authority, so we avoid egress TLS
  # and the provider's external-domain Host check still passes (the load-bearing
  # trick from the lab's envoy.yaml). This is the ONLY thing nexus dials the provider
  # for — token verification. There is NO directory integration (no admin PAT, no
  # Management API): authorization is nexus-authored (nexus-native-authorization).
  jwksInternalUrl: "http://zitadel.zitadel.svc.cluster.local:8080"
  # Host header value sent on the JWKS fetch — must equal the issuer authority.
  # Defaults to the issuer's host:port when empty.
  jwksHost: ""
  # JWKS path on the OIDC provider.
  jwksPath: "/oauth/v2/keys"
  jwksCacheSeconds: 600
  # ---- Trust-anchor transport integrity (edge-trust-anchor-integrity) ------ #
  # The JWKS fetch is the root of ALL token verification: an on-path attacker
  # who substitutes signing keys owns every "verified" identity. The edge
  # therefore REQUIRES an explicit transport choice — rendering an edge with
  # neither option below set FAILS (fail closed), it does not silently ship a
  # plaintext fetch.
  #
  # BREAKING (vs. earlier chart versions, which rendered plaintext silently):
  # existing deployments must either enable jwksTls (preferred) or explicitly
  # assert the plaintext path is trusted via jwksPlaintextTrustedPath.
  jwksTls:
    # Fetch the JWKS over TLS with server-certificate verification (Envoy
    # UpstreamTlsContext on the oidc_jwks cluster: trusted CA + SNI + SAN
    # match). oidc.jwksInternalUrl must then point at a TLS port.
    enabled: false
    # SNI + certificate SAN the server must present. Defaults to the dialed
    # host (oidc.jwksInternalUrl authority) when empty; set it when the cert is
    # issued for a different name (e.g. the public issuer host).
    sni: ""
    # CA bundle (inside the Envoy container) used to verify the server chain.
    # The stock Envoy image ships the Debian system bundle at this path; mount
    # your own Secret/ConfigMap and point here for a private CA.
    caFile: "/etc/ssl/certs/ca-certificates.crt"
  # Explicit assertion that the network path between the edge and ZITADEL is
  # trusted (same host/loopback, or an in-cluster hop you have assessed), so a
  # plaintext JWKS fetch is acceptable. This is an ACKNOWLEDGMENT, not a
  # control — prefer jwksTls. One of the two must be set or rendering fails.
  jwksPlaintextTrustedPath: false

# -------------------------------------------------------------------------- #
# Backend — the protected upstream Envoy routes to after enrichment (your app).
# -------------------------------------------------------------------------- #
backend:
  host: "backend.default.svc.cluster.local"
  port: 80

# -------------------------------------------------------------------------- #
# Origin enforcement (edge-origin-trust). The x-workspace-*/x-user-*/
# x-identity-contract header family is unforgeable ONLY because the backend is
# reachable exclusively through the edge that emits it — the stamp itself is an
# unsigned drift signal, NOT an authentication boundary. A topology that renders
# identity enrichment MUST therefore make an explicit origin-enforcement choice;
# rendering with neither option set FAILS (fail closed) instead of shipping open.
#
# BREAKING (vs. earlier chart versions, which rendered without any origin
# control): set exactly one of the two options below.
# -------------------------------------------------------------------------- #
originEnforcement:
  networkPolicy:
    # Ship a NetworkPolicy (same pattern as the routing-plane control-plane
    # policy) restricting the backend pods' ingress to this chart's edge pods.
    # Requires the backend to run in THIS namespace and the cluster CNI to
    # enforce NetworkPolicy — the direct-to-backend e2e probe verifies it does.
    enabled: false
    # matchLabels of the tenant backend pods the policy protects. REQUIRED when
    # enabled (an empty selector would select every pod in the namespace).
    backendSelector: {}
    # Backend ports the edge is allowed to reach.
    backendPorts: [80]
    # Additional ingress peers (e.g. kubelet probe CIDRs on CNIs that police
    # node-origin traffic — see the control-plane allowProbesFrom note).
    extraAllowFrom: []
  # Explicit assertion that the invariant is enforced OUTSIDE this chart (the
  # backend lives in another namespace/cluster/network you police, e.g. via
  # your own NetworkPolicy, mesh authorization, or firewall). This is an
  # ACKNOWLEDGMENT the chart records, not a control it ships — the absence of
  # any origin control is a misconfiguration, never a default-safe state.
  external: false

# -------------------------------------------------------------------------- #
# Edge: Envoy + the identity sidecar. Topology (RFC rules §1.4):
#   perPod  — sidecar is a container in the Envoy pod, reached on 127.0.0.1
#             (default; lowest latency, per-replica warm cache, isolated blast
#             radius). Memory cost = profile-population × replicas.
#   shared  — NOT templated here; for million-scale populations, split the
#             sidecar into its own Deployment+Service and set
#             edge.sidecarCluster to that Service. See deploy/README.md.
# -------------------------------------------------------------------------- #
edge:
  # Deploy this chart's identity-only edge. Set false when composing with the
  # routing plane via the ../edge-platform umbrella, which owns the single
  # combined tenant-first edge instead (the data-plane components below still
  # deploy). Default true: this chart is usable standalone.
  enabled: true
  replicas: 2
  # ext_proc behaviour on the default (protected) route: fail-closed (RFC §6.1).
  failureModeAllow: false
  extProcTimeout: "5s"
  # The EXPLICIT non-enriched allowlist (identity-workspace-authz): path
  # prefixes that intentionally skip identity enrichment (public/degradable
  # routes, C10) and so reach the backend unstamped BY DESIGN. This list is the
  # single source the per-route ext_proc config is rendered from, so the
  # designation and the edge behavior cannot drift. Fail-closed default: any
  # route NOT listed here gets enrichment and the backend's "reject an absent
  # stamp" rule — omission never silently downgrades a route to anonymous.
  publicPaths:
    - "/public"
  # Sidecar upstream Envoy's ext_proc dials. Per-pod default = loopback.
  sidecarCluster: "127.0.0.1:50051"
  resources:
    envoy:
      requests: { cpu: "100m", memory: "128Mi" }
      limits: { cpu: "1", memory: "256Mi" }
    sidecar:
      requests: { cpu: "100m", memory: "256Mi" }
      # Size memory to the resident profile population (cache is fully resident,
      # RFC §6.3). Raise for large populations.
      limits: { cpu: "1", memory: "1Gi" }
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: "nginx"          # or "traefik"
    # TLS is terminated HERE by the ingress controller — that is why this chart
    # carries no in-app TLS. cert-manager issues the cert via this annotation.
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    host: "api.example.com"
    tls:
      enabled: true
      secretName: "identity-plane-edge-tls"

# Sidecar runtime config (applies wherever the sidecar runs).
sidecar:
  # 12h TTL safety net (RFC §6.5) — a backstop, not a freshness mechanism.
  cacheTtlSeconds: 43200
  # Readiness fail-closed warm gate (C6). Keep 0 in prod; it is a demo knob.
  readinessDelaySeconds: 0
  logFormat: "json"             # json | text
  rustLog: "info"
  # apikey-resolve-cache: OPT-IN (default OFF) bounded in-process working-set cache for the
  # api-key resolve SELECT. Off => a fail-closed live resolve per request (revoke effective
  # next request) — byte-for-byte the status quo. On => repeat requests for one key skip the
  # DB; revoke/rotate stay live within seconds via the api_key_changes feed, with `ttlSeconds`
  # as the staleness ceiling if a NOTIFY is dropped. Requires api-key auth to be configured.
  apiKeyResolveCache:
    enabled: false
    ttlSeconds: 5             # staleness ceiling (single-digit seconds ~ "within seconds")
    maxCapacity: 100000       # working-set bound; scales with active traffic, not keyspace
    pollSeconds: 30           # change-feed self-heal poll
  # identity-contract-signing: ES256 signing of the x-identity-contract token (the ONLY
  # form of the contract — there is no plain-string fallback) + the public JWKS listener
  # (:9210) boxes verify against. Any real deployment MUST provision this.
  #   enabled: true  -> the sidecar signs; a missing/broken key makes it FAIL FAST at
  #                     startup (never silently unsigned), so provide a valid key + JWKS.
  #   enabled: false -> signing off (dev/eval). Anonymous traffic is served normally;
  #                     authenticated requests carry no contract, so a verifying box fails
  #                     closed. Defaults false only so the chart renders without key
  #                     material in tests.
  # See docs/runbook-contract-signing-keys.md.
  signing:
    enabled: false
    issuer: "https://identity.nexus"   # the `iss` claim; boxes pin this exact string
    tokenTtlSeconds: 60
    jwksListen: "0.0.0.0:9210"
    # automate-signing-key-rotation: managed key custody + AUTOMATED rotation via OpenBao
    # Transit (Mode B — the plane exports key material and signs LOCALLY, so the hot path
    # never hops to Bao). When `transit.enabled`, the sidecar pulls versioned keys from
    # Transit, GENERATES the JWKS from Transit's exportable public keys (no hand-synced
    # ConfigMap), and rotates on a schedule / on demand — no manual runbook. The break-glass
    # `kid`/`privateKeyPem`/`jwks` below stay a SUPPORTED fallback: if Bao is unreachable at
    # startup the plane boots on the manual PEM instead of running unsigned (fail loud).
    # See docs/runbook-contract-signing-keys.md.
    transit:
      enabled: false
      address: "http://openbao.openbao:8200"    # the OpenBao API URL
      mount: "transit"                            # the Transit engine mount path
      keyName: "identity-contract-signing"        # the ecdsa-p256 key; each version is a kid
      # The plane's OpenBao token. Production: bind a Kubernetes-auth role to a least-
      # privilege policy (export public/signing key + rotate on this one key), create the
      # token Secret out-of-band, and set `tokenExistingSecret` (key `token`); leave `token`
      # empty. Dev only: paste a token into `token` and the chart creates the Secret.
      tokenExistingSecret: ""
      token: ""
      # Plane-driven scheduled rotation period (seconds). Empty ⇒ the plane only mirrors
      # rotations triggered at the source (Transit auto-rotate, or an operator on suspected
      # compromise) — it never initiates one itself.
      rotationPeriodSeconds: ""
      pollSeconds: 30           # how fast an out-of-band / on-demand rotation is adopted
      maxClockSkewSeconds: 60   # overlap window = tokenTtlSeconds + this (no in-flight reject)
    # Break-glass MANUAL key material (the pre-rotation path; also the Transit-mode startup
    # fallback). `kid` MUST equal the JWKS entry's kid. Leave all three empty to run pure
    # Transit with no manual fallback.
    kid: ""
    # PRIVATE key (ES256 PKCS#8 PEM). Production: create a Secret out-of-band and set
    # `existingSecret` (key `key.pem`); leave `privateKeyPem` empty. Dev only: paste the
    # PEM into `privateKeyPem` and the chart creates the Secret. NEVER commit a real key.
    existingSecret: ""
    privateKeyPem: ""
    # PUBLIC JWKS document, served verbatim on the break-glass path (not secret). Its `kid`
    # MUST match `kid`. Unused in Transit mode (the JWKS is generated).
    jwks: ""

# -------------------------------------------------------------------------- #
# authz-admin — the nexus-native authorization authoring surface
# (nexus-native-authorization). The SINGLE source of record for
# roles/entitlements/suspension; it writes them into the identity Profile store and
# the sidecar picks them up over the change feed within seconds. The OIDC provider is
# NEVER an authorization source. Keep it on an administrative boundary.
# -------------------------------------------------------------------------- #
authzAdmin:
  # Set false to skip the authoring surface (e.g. if authorization is provisioned
  # out-of-band via your own AuthzAuthoring adapter). Default true.
  enabled: true
  replicas: 1                   # not on the hot path; idempotent writes
  logFormat: "json"
  logLevel: "INFO"
  # Admin-auth gate, fail-closed (mirrors the routing control-plane). The 0.0.7
  # authz-admin binary REFUSES TO START unless exactly one posture below is selected;
  # this chart renders that choice and FAILS at `helm template` if none is set, so a
  # misconfig is caught before the pod CrashLoops.
  #
  # Pick ONE posture (pepper and legacy MAY be combined for the bootstrap migration):
  #   1. PRODUCTION — named tokens:  set tokenPepper.* . The pepper is the HMAC key the
  #      plane verifies caller tokens (identity.admin_tokens) against; the named tokens
  #      themselves are minted post-startup via the admin API.
  #   2. MIGRATION — legacy shared token: set legacyTokenOk=true AND a legacy token
  #      (adminToken or existingSecret). Honored with a per-use deprecation warning.
  #      This is ALSO the bootstrap path for posture 1: a fresh admin_tokens store has
  #      no token to authenticate the first token-minting call, so deploy pepper +
  #      legacy together, mint named tokens, then drop the legacy token and set
  #      legacyTokenOk=false to land on pepper-only. (bootstrapAdminSub below seeds the
  #      authz GRANT, which is orthogonal — it does not mint a token.)
  #   3. DEV/TRUSTED-NETWORK — unauthenticated: set authDisabled=true.
  #
  # BREAKING (0.0.7): a plain legacy token now ALSO requires legacyTokenOk=true. A
  # token-only config that worked before will now fail render with a message naming
  # the fix — it can no longer silently run in the deprecated shared-token mode.
  #
  # --- posture 2: legacy shared token ---
  existingSecret: ""            # Secret holding the token; key below
  existingSecretKey: "token"
  # Inline token — used only when existingSecret is empty. PREFER existingSecret.
  adminToken: ""
  # Honor the legacy shared token (migration/bootstrap). REQUIRES a legacy token above;
  # render fails if set without one (mirrors the binary's refusal).
  legacyTokenOk: false
  # --- posture 1: named-token pepper (HMAC key material, NOT a bearer token) ---
  tokenPepper:
    # Secret holding the pepper; the prod path (ESO/OpenBao-seeded). Key below.
    existingSecret: ""
    existingSecretKey: "pepper"
    # Inline pepper — used only when existingSecret is empty; the chart wraps it in a
    # managed Secret. DEV ONLY; prefer existingSecret so it never lives in values.
    value: ""
  # --- posture 3: unauthenticated ---
  # Set true ONLY on a trusted network / dev to run the surface UNAUTHENTICATED.
  authDisabled: false
  # Bootstrap the first administrator (nexus-native-authorization R4): the subject
  # `sub` granted `adminRole` at startup IFF no administrator exists yet (idempotent
  # break-glass). Empty bootstrapAdminSub => no seed; author the first grants via the
  # admin API. Rotate/disable the bootstrap after a real admin is authored.
  adminRole: "admin"
  bootstrapAdminSub: ""
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "500m", memory: "128Mi" }

# -------------------------------------------------------------------------- #
# Membership-sync — projects routing-plane membership changes into the identity
# Profile store. LISTENs on the routing `routing_membership_changes` NOTIFY channel
# (real-time) and runs a periodic backstop that re-derives every subject's
# memberships from the routing source of record (heals a missed signal; backfills
# on first run). Needs the read-only routing connection in `routingPg:` below.
# -------------------------------------------------------------------------- #
membershipSync:
  # Set false to skip the worker (and its required routingPg connection) — e.g. if
  # memberships are projected out-of-band. Default true: live authz needs it.
  enabled: true
  replicas: 1                   # singleton; idempotent but avoids redundant writes
  backstopIntervalSeconds: 600
  logFormat: "json"
  logLevel: "INFO"
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "500m", memory: "128Mi" }

# -------------------------------------------------------------------------- #
# Postgres — the single Durable State Store AND change feed (RFC §3.5 + C4 via a
# seq-cursor feed over LISTEN/NOTIFY). EXTERNAL by design: this chart does not run
# a database. Point it at a managed service or an HA operator cluster. The app
# creates its own `identity` schema inside whatever database the URL points at.
#
# Provide the connection URL one of two ways (existingSecret preferred):
#   - postgres.existingSecret — name of a Secret you create holding the URL.
#   - postgres.url            — inline URL the chart wraps in a managed Secret.
# This is the DIRECT/session URL: the sidecar's LISTEN/NOTIFY change feed (channel
# `identity_changes`) and the writers use it. It MUST NOT be a transaction-mode
# pooler (PgBouncer/RDS-Proxy txn mode), which silently swallows LISTEN — see the
# deploy README "External Postgres requirements". No read split: the binaries read
# only this one URL.
# -------------------------------------------------------------------------- #
postgres:
  # Preferred: a Secret you manage (works with ExternalSecrets / SealedSecrets).
  existingSecret: ""            # Secret name; key below
  existingSecretKey: "url"
  # Inline fallback (discouraged — ends up in a chart-managed Secret). Must reach
  # a database the app can create its `identity` schema in.
  # ENCRYPTION IN TRANSIT: append `?sslmode=verify-full` in production (encrypt +
  # verify the server cert; profile rows are PII). `require` only encrypts.
  url: ""                       # e.g. postgres://user:pass@host:5432/identitydb?sslmode=verify-full

# -------------------------------------------------------------------------- #
# Routing-plane membership store — a READ-ONLY connection the membership-sync
# worker holds to the ROUTING database (a SEPARATE database from `postgres:` above
# in production). It only LISTENs on `routing_membership_changes` and SELECTs
# routing.memberships — grant the credential least privilege (SELECT + LISTEN, no
# write). Like the identity store, this MUST be a DIRECT/session URL (a
# transaction-mode pooler swallows LISTEN). Provide via existingSecret (preferred)
# or an inline URL the chart wraps in a managed Secret.
# -------------------------------------------------------------------------- #
routingPg:
  existingSecret: ""            # Secret name; key below
  existingSecretKey: "url"
  # Inline fallback (discouraged). Read-only routing DB URL.
  url: ""                       # e.g. postgres://ro_user:pass@routing-host:5432/routingdb?sslmode=verify-full

# -------------------------------------------------------------------------- #
# Telemetry (first-party-telemetry) — the PRIMARY signal path. The Rust services
# (sidecar, authz-admin, membership-sync) PUSH traces + metrics + logs via OTLP/gRPC
# to your OTel Collector (the SINGLE telemetry egress; only the collector's config
# knows the trace/metric/log stores). This is the Rust-plane twin of the edge's own
# trace export — set it to light up metrics in your TSDB, logs in your log store, and
# the metrics<->trace exemplar jump. UNSET (default "") = export OFF, stdout logs only
# (fail-open opt-in). Running a real deployment WITHOUT this is an observability gap,
# not a supported variant: a plane that can push telemetry, should.
# -------------------------------------------------------------------------- #
telemetry:
  # OTLP/gRPC endpoint of your OTel Collector, e.g.
  # http://otel-collector.monitoring.svc.cluster.local:4317. Empty => export off.
  otlpEndpoint: ""
  # deployment.environment.name every first-party signal is stamped with (first-
  # party-telemetry). REQUIRED once otlpEndpoint is set: per-environment SLOs are
  # undefined without it, so a telemetry-on render FAILS CLOSED when this is empty
  # (the Rust services enforce the same invariant at startup). Inherits the umbrella
  # global.telemetry.environment when unset here. e.g. "production".
  environment: ""

# -------------------------------------------------------------------------- #
# Monitoring artifact delivery (portable-monitoring-delivery). ONE selector picks HOW
# nexus's SLO rules + dashboards reach the cluster; the query CONTENT is the same
# portable PromQL either way. Metrics themselves ALWAYS travel by OTLP push
# (box-telemetry-contract) — this only governs rules + dashboards.
#   files    -> operator-INDEPENDENT (DEFAULT): a rule-file ConfigMap (loaded by a
#               standalone evaluator such as vmalert) + dashboard ConfigMaps for a
#               file provider. Works with NO Prometheus/VictoriaMetrics operator
#               (this is infra-v1's world).
#   operator -> Prometheus-Operator CRs: PrometheusRule + PodMonitor (Envoy admin
#               scrape) + sidecar-discovered dashboard ConfigMaps. Requires that operator.
#   otlp-only-> render NEITHER rules nor dashboards; metrics reach the store by OTLP push.
# The one remaining scrape target either way is Envoy's own admin stats (:9901); the
# Rust services push OTLP and are not scraped.
# -------------------------------------------------------------------------- #
monitoring:
  delivery: files

  # Alert thresholds — the "> X" in each hand-authored rule; tune to your SLOs. Used by
  # both the files and operator forms. The `result`/`op` rules additionally require your
  # OTel collector to KEEP those metric attributes (nexus's lab collector does; a
  # stripping collector makes them under-fire).
  thresholds:
    edge5xxRatio: 0.02              # edge 5xx / all responses over 5m (Envoy, scraped)
    edgeP99Milliseconds: 500        # edge downstream request p99 (Envoy rq_time is ms)
    enrichP99Seconds: 0.05          # sidecar ext_proc p99
    forbiddenPerSecond: 5           # authz gate 403 policy-denials/s (needs `result`)
    failClosedPerSecond: 0.1        # sidecar fail-closed 503/s — should be ~0 (needs `result`)
    membershipErrorsPerSecond: 0.5  # membership-sync errors/s
    unauthorizedPerSecond: 1        # authz-admin 401/s (needs `op`)

  # operator form ONLY: extra labels so your operator's ruleSelector / PodMonitor
  # selector matches (e.g. release: kube-prom-stack), and the Envoy admin scrape interval.
  operator:
    labels: {}
    scrapeInterval: "15s"

  # Dashboards (nexus-authored Grafana JSON, shipped as ConfigMaps under the "Nexus"
  # folder). The dashboards use a `datasource` template variable, so they bind to
  # whatever Prometheus-typed datasource (Prometheus or VictoriaMetrics) you pick.
  dashboards:
    # operator form: the label + value a Grafana sidecar watches (kube-prometheus-stack
    # default), and an OPTIONAL folder annotation the sidecar reads.
    sidecarLabel: grafana_dashboard
    sidecarLabelValue: "1"
    folderAnnotation: ""
    # both forms: the Grafana folder these dashboards belong to.
    folder: "Nexus"

# Common pod hardening defaults, applied to every workload.
podSecurityContext:
  runAsNonRoot: true
  # Matches the non-root UID baked into the images (Dockerfile `USER 10001`), so
  # the kubelet can verify runAsNonRoot and the pod is admitted.
  runAsUser: 10001
  runAsGroup: 10001
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
