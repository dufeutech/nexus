{{- /*
ROUTING-ONLY Envoy edge config, parameterized from values. Mirrors
../../kind/routing-plane/manifests/edge.yaml but with the backend pools and the
router cluster driven by config, and the router reached over loopback (per-pod).

Filter order is load-bearing (RFC C14/C17/C18):
  header_mutation (strip client x-workspace-* and x-route-pool, RFC C3)
    -> tenant-router ext_proc (host -> workspace -> x-route-pool; reject unknown, C18)
    -> router (forward to the pool the decision chose)

This Envoy has NO jwt_authn and NO identity ext_proc. For the tenant-first
composition (routing -> auth -> enrichment) use the ../edge-platform umbrella.

The pool set is the finite RFC C15 set; clusters/routes are rendered from
.Values.pools (sorted by key for a deterministic, diff-stable config). The
default route (no/unknown x-route-pool) falls through to the `application` pool.
*/ -}}
{{- if .Values.edge.enabled -}}
{{- $rc := .Values.edge.routerCluster -}}
{{- $rcHost := first (splitList ":" $rc) -}}
{{- $rcPort := last (splitList ":" $rc) -}}
{{- if not (hasKey .Values.pools "application") -}}
{{- fail "pools.application is required: it is the default route target." -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "routing-plane.fullname" . }}-edge-envoy
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
    {{- include "routing-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      # Bound to the pod for kubelet probes; NOT exposed via the Service.
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }

    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address: { address: 0.0.0.0, port_value: 10000 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: edge
                    # Canonicalize :path BEFORE the tenant-router ext_proc + routing
                    # read it, so an encoded/dot-segment path resolves consistently
                    # across the gate (in the umbrella) and the backend. RFC 3986
                    # dot removal + merge slashes + unescape %2F.
                    normalize_path: true
                    merge_slashes: true
                    path_with_escaped_slashes_action: UNESCAPE_AND_FORWARD
                    # Trace-context integrity (N6/C3): strip client
                    # traceparent/tracestate BEFORE Envoy's tracing decision.
                    # This standalone edge configures no tracer today, but the
                    # early strip keeps the integrity rule uniform across every
                    # edge (a later tracer addition cannot silently join a
                    # client-rooted trace). The filter-level strip below stays
                    # as defense-in-depth for the backend-facing guarantee.
                    early_header_mutation_extensions:
                      - name: envoy.http.early_header_mutation.header_mutation
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.http.early_header_mutation.header_mutation.v3.HeaderMutation
                          mutations:
                            - remove: "traceparent"
                            - remove: "tracestate"
                    # JSON access log (audit trail): method/path/status/host, the
                    # resolved tenant and chosen pool. Routing-only plane (no auth
                    # here). response_flags shows rejections (e.g. no-tenant 404).
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              start_time: "%START_TIME%"
                              method: "%REQ(:METHOD)%"
                              path: "%REQ(:PATH)%"
                              protocol: "%PROTOCOL%"
                              response_code: "%RESPONSE_CODE%"
                              response_flags: "%RESPONSE_FLAGS%"
                              duration_ms: "%DURATION%"
                              authority: "%REQ(:AUTHORITY)%"
                              upstream_host: "%UPSTREAM_HOST%"
                              route_pool: "%REQ(X-ROUTE-POOL)%"
                              workspace_id: "%REQ(X-WORKSPACE-ID)%"
                              user_agent: "%REQ(USER-AGENT)%"
                              request_id: "%REQ(X-REQUEST-ID)%"
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: edge
                          domains: ["*"]
                          routes:
                            {{- range $name, $pool := .Values.pools }}
                            - match:
                                prefix: "/"
                                headers: [{ name: x-route-pool, string_match: { exact: {{ $name | quote }} } }]
                              route: { cluster: pool_{{ $name }} }
                            {{- end }}
                            # Default: no/unknown x-route-pool -> application pool.
                            - match: { prefix: "/" }
                              route: { cluster: pool_application }
                    http_filters:
                      # FIRST: strip client-supplied trusted headers before
                      # resolution so the injected set is authoritative (RFC C3).
                      - name: envoy.filters.http.header_mutation
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                          mutations:
                            request_mutations:
                              - remove: "x-workspace-id"
                              - remove: "x-workspace-plan"
                              - remove: "x-workspace-features"
                              - remove: "x-route-pool"
                              - remove: "x-routed-by"
                              # Edge geo (x-geo-*) normalized + injected by
                              # tenant-router; strip client copies (C3).
                              - remove: "x-geo-source"
                              - remove: "x-geo-country"
                              - remove: "x-geo-continent"
                              - remove: "x-geo-region"
                              - remove: "x-geo-city"
                              - remove: "x-geo-postal-code"
                              - remove: "x-geo-timezone"
                              - remove: "x-geo-latitude"
                              - remove: "x-geo-longitude"
                              - remove: "x-geo-client-ip"
                              # Request-context normalized + injected by
                              # tenant-router; strip client copies (C3).
                              - remove: "x-locale"
                              - remove: "x-lang"
                              - remove: "x-currency"
                              - remove: "x-privacy-gpc"
                              - remove: "x-privacy-dnt"
                              - remove: "x-device-type"
                              # Identity/auth family (RFC C3 defense-in-depth).
                              # This plane has NO jwt_authn/identity ext_proc, so it
                              # never legitimately injects these; strip any client
                              # copies so routing-plane is safe even if exposed
                              # standalone (without the edge-platform umbrella in
                              # front). The umbrella's edge strips them too.
                              - remove: "x-user-id"
                              - remove: "x-user-org"
                              - remove: "x-user-roles"
                              - remove: "x-user-entitlements"
                              - remove: "x-user-suspended"
                              - remove: "x-user-enriched-by"
                              # Workspace-scoped acting identity (nexus-owned tenancy);
                              # authored by the identity sidecar in the full stack.
                              # Stripped here too (defense-in-depth) so a client copy
                              # never survives even if this plane is exposed standalone.
                              - remove: "x-user-type"
                              - remove: "x-user-role"
                              - remove: "x-auth-anonymous"
                              - remove: "x-auth-method"
                              - remove: "x-auth-required"
                              # Versioned identity-contract stamp (authored by the
                              # identity sidecar in the full stack) — a drift/version
                              # signal, NOT proof of edge origin (edge-origin-trust
                              # owns that); strip client copies so a version cannot
                              # be forged (C3, same rule as x-auth-required).
                              - remove: "x-identity-contract"
                              # W3C trace context (N6): the edge is the ONLY origin of
                              # trace context on the internal network. Boxes continue
                              # an arriving trace (fail-open contract), so a client-
                              # forged traceparent must never survive to be joined (C3).
                              - remove: "traceparent"
                              - remove: "tracestate"
                      # Tenant routing (C14/C15/C18). fail-closed: a routing failure
                      # must not silently default a route.
                      - name: tenant-router.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc: { cluster_name: tenant_router }
                          failure_mode_allow: {{ .Values.edge.failureModeAllow }}
                          message_timeout: {{ .Values.edge.extProcTimeout }}
                          processing_mode:
                            request_header_mode: SEND
                            response_header_mode: SKIP
                            request_body_mode: NONE
                            response_body_mode: NONE
                            request_trailer_mode: SKIP
                            response_trailer_mode: SKIP
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: tenant_router
          type: STATIC
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: tenant_router
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: {{ $rcHost | quote }}, port_value: {{ $rcPort }} }
        {{- range $name, $pool := .Values.pools }}
        - name: pool_{{ $name }}
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: pool_{{ $name }}
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: {{ $pool.host | quote }}, port_value: {{ $pool.port }} }
        {{- end }}
{{- end }}
