{{- if .Values.metrics.prometheusRule.enabled -}}
# Sloth-GENERATED multi-window burn-rate SLO rules (change: slo-burn-rate-policy).
# The rule bodies are compiled from monitoring/slo/tenant-router.slo.yaml by Sloth and
# staged into files/slo/ by monitoring/slo/generate.sh — DO NOT hand-edit the embedded
# rules; regenerate instead. This template only wraps them in a PrometheusRule CR so the
# SAME rules a clean checkout evaluates locally also ship to production. Gated by the same
# metrics.prometheusRule.enabled flag as the hand-authored threshold alerts; the rules key
# on the `result` attribute + the promoted deployment.environment.name label (per-env SLOs).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "routing-plane.fullname" . }}-slo-burn-rate
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- .Files.Get "files/slo/tenant-router.rules.yaml" | fromYaml | toYaml | nindent 2 }}
{{- end }}
