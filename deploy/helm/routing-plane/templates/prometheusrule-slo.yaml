{{- if eq .Values.monitoring.delivery "operator" -}}
# operator-form delivery: Sloth-GENERATED multi-window burn-rate SLO rules
# (change: slo-burn-rate-policy) wrapped in a PrometheusRule CR. The rule bodies are
# compiled from monitoring/slo/tenant-router.slo.yaml by Sloth and staged into
# files/slo/ by monitoring/slo/generate.sh — DO NOT hand-edit; regenerate instead. The
# files-form ConfigMap (monitoring-rules-files.yaml) embeds the SAME file, so both
# delivery forms evaluate identical burn-rate rules. The rules key on the `result`
# attribute + the promoted deployment.environment.name label (per-env SLOs).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "routing-plane.fullname" . }}-slo-burn-rate
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
    {{- with .Values.monitoring.operator.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- .Files.Get "files/slo/tenant-router.rules.yaml" | fromYaml | toYaml | nindent 2 }}
{{- end }}
