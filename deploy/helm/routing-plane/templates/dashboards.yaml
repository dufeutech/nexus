{{- if eq .Values.monitoring.delivery "operator" }}
# operator-form delivery: nexus-authored Grafana dashboards shipped as ConfigMaps that a
# Grafana SIDECAR (kube-prometheus-stack / grafana chart) auto-discovers by the watched
# label and loads. One ConfigMap per dashboards/*.json. The operator-independent twin
# (monitoring.delivery=files) ships the same JSON via monitoring-dashboards-files.yaml
# for a file-provider Grafana instead.
{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "routing-plane.fullname" $ }}-dash-{{ base $path | trimSuffix ".json" }}
  labels:
    {{ $.Values.monitoring.dashboards.sidecarLabel }}: {{ $.Values.monitoring.dashboards.sidecarLabelValue | quote }}
    {{- include "routing-plane.labels" $ | nindent 4 }}
  {{- with $.Values.monitoring.dashboards.folderAnnotation }}
  annotations:
    {{ . }}: {{ $.Values.monitoring.dashboards.folder | quote }}
  {{- end }}
data:
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
