{{- if .Values.edge.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "routing-plane.fullname" . }}-edge
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
    {{- include "routing-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
spec:
  type: {{ .Values.edge.service.type }}
  selector:
    {{- include "routing-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
  ports:
    # Only the data-plane listener is exposed. Admin (9901), the router debug API
    # (9300, RFC §3.13 local-only), and metrics (9302) are deliberately NOT here.
    - name: http
      port: {{ .Values.edge.service.port }}
      targetPort: http
      protocol: TCP
{{- if .Values.edge.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "routing-plane.fullname" . }}-edge
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
    {{- include "routing-plane.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "routing-plane.fullname" . }}-edge
  minReplicas: {{ .Values.edge.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.edge.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.edge.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
