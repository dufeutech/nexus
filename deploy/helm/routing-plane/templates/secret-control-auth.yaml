{{- if .Values.controlPlane.auth.enabled }}
{{- if eq (include "routing-plane.ownsControlAuthSecret" .) "true" }}
# Chart-managed Secret holding the control-plane admin bearer token (RFC C16).
# When controlPlane.auth.existingSecret is set, the chart uses THAT instead and
# renders nothing here — prefer that (or an ExternalSecret / SealedSecret) so the
# token never lives in values. `required` makes a token-less auth.enabled install
# fail fast rather than render an empty (insecure) Secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "routing-plane.controlAuthSecretName" . }}
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "controlPlane.auth.token is required when controlPlane.auth.enabled and no existingSecret is set (or set controlPlane.auth.enabled=false to run without auth)" .Values.controlPlane.auth.token | quote }}
{{- end }}
{{- end }}
