{{- if .Values.controlPlane.auth.enabled }}
{{- if eq (include "routing-plane.ownsControlAuthSecret" .) "true" }}
# Chart-managed Secret holding the control-plane legacy admin bearer token (RFC C16,
# posture 2). Rendered only for an inline controlPlane.auth.token with no existingSecret.
# Prefer an existingSecret (or ExternalSecret / SealedSecret) so the token never lives
# in values or the rendered manifest.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "routing-plane.controlAuthSecretName" . }}
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.controlPlane.auth.token | quote }}
{{- end }}
{{- if eq (include "routing-plane.ownsControlPepperSecret" .) "true" }}
---
# Chart-managed Secret holding the control-plane admin-token PEPPER (posture 1, named
# tokens). Rendered only for an inline controlPlane.auth.tokenPepper.value with no
# existingSecret. DEV ONLY — the pepper is HMAC key material; in production seed it into
# a Secret (ESO/OpenBao) and reference it via tokenPepper.existingSecret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "routing-plane.controlPepperSecretName" . }}
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  pepper: {{ .Values.controlPlane.auth.tokenPepper.value | quote }}
{{- end }}
{{- end }}
