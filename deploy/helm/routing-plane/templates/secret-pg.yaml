{{- if eq (include "routing-plane.ownsPgSecret" .) "true" -}}
# Chart-managed Postgres Secret wrapping the inline external ROUTING_PG_URL the
# router and control plane read. When postgres.existingSecret is set, the chart
# uses THAT instead and renders nothing here — prefer that (or an ExternalSecret /
# SealedSecret) so the credential never lives in values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "routing-plane.fullname" . }}-pg
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ include "routing-plane.pgUrl" . | quote }}
{{- end }}
{{- if eq (include "routing-plane.ownsPgReadSecret" .) "true" }}
---
# Chart-managed Secret wrapping the inline pooled read URL (ROUTING_PG_READ_URL)
# for the tenant-router. When postgres.readExistingSecret is set, the chart uses
# THAT instead and renders nothing here.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "routing-plane.fullname" . }}-pg-read
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ .Values.postgres.readUrl | quote }}
{{- end }}
