{{- if eq .Values.monitoring.delivery "operator" -}}
# operator-form delivery (monitoring.delivery=operator): nexus-authored application-SLO
# alert rules as a PrometheusRule CR, consumed by the Prometheus Operator OR the
# VictoriaMetrics operator/vmalert. The rule bodies come from the shared
# "routing-plane.appSloGroups" helper, so the files-form ConfigMap
# (monitoring-rules-files.yaml) ships byte-identical content. The `result`/`op` rules need
# your OTel collector to KEEP those attributes (see the identity-plane note); the edge
# rule uses Envoy's SCRAPED admin stats and is collector-independent. Requires that operator's CRD.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "routing-plane.fullname" . }}-app-slo
  labels:
    {{- include "routing-plane.labels" . | nindent 4 }}
    {{- with .Values.monitoring.operator.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- include "routing-plane.appSloGroups" . | nindent 2 }}
{{- end }}
