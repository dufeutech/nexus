# Tenant Routing Plane — Helm values.
#
# This chart deploys the components THIS repo owns for the routing plane:
#   - edge        : Envoy + the Rust tenant-router ext_proc, co-located per-pod
#                   (loopback). ROUTING-ONLY Envoy: host -> tenant -> x-route-pool
#                   -> forward to the selected pool, or reject an unknown/unverified
#                   host at the edge (RFC C18). No jwt_authn here — for the
#                   tenant-first composition with the identity plane, use the
#                   ../edge-platform umbrella chart instead.
#   - control-plane : the admin API (RFC C16) — owns the routing schema; NOT on the
#                     request hot path; exposed on an administrative boundary only.
#
# The authoritative routing store (Postgres) and the OPTIONAL L2 (Redis, RFC
# decision 9) are EXTERNAL — operated outside this chart and wired in via
# `postgres:` / `redis:` below.
#
# It treats the backend pools as EXTERNAL Services you point at via `pools:` —
# the routing decision selects ONE of a small, finite set (RFC C15 / decision 13);
# configuration never introduces a new destination at request time.

# -------------------------------------------------------------------------- #
# Images. Build the two first-party images from the routing-rs workspace and push
# them to a registry you control; there is no public image. Both come from the one
# ../../routing-rs Dockerfile, selected by build target.
#   docker build --target tenant-router -t REGISTRY/tenant-router:0.1.0  ../../routing-rs
#   docker build --target control-plane -t REGISTRY/control-plane:0.1.0  ../../routing-rs
# -------------------------------------------------------------------------- #
images:
  # ONE tag for all first-party images below (they build together from one workspace).
  # A per-image `tag` still wins; empty here falls back to the umbrella
  # `global.image.tag`, then the chart appVersion.
  tag: ""
  tenantRouter:
    repository: REGISTRY/tenant-router
    tag: ""            # defaults to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  controlPlane:
    repository: REGISTRY/control-plane
    tag: ""
    pullPolicy: IfNotPresent
  # Stock upstream edge proxy, pinned to a concrete patch version + immutable
  # digest (the rolling `v1.34-latest` tag must never reach production). The
  # digest is what `v1.34.14` resolved to on 2026-07-06; re-resolve on bump with
  #   docker buildx imagetools inspect envoyproxy/envoy:<tag> | grep Digest
  # This value also governs the combined edge in the edge-platform umbrella
  # (its edge-deployment reads routing-plane.images.envoy).
  envoy:
    repository: envoyproxy/envoy
    tag: v1.34.14@sha256:cfc0678bc03cca19cbb031688acb31d510bff501ff97e163026a375fe0515d69
    pullPolicy: IfNotPresent

imagePullSecrets: []

# -------------------------------------------------------------------------- #
# Backend pools — the small, finite set the routing decision selects among (RFC
# C15 / decision 13). Each maps to one of the `Pool` values the router emits in
# `x-route-pool`. In production these are your own Services. The default route
# (no/unknown x-route-pool) falls through to `application`.
# -------------------------------------------------------------------------- #
pools:
  application:
    host: "app-backend.default.svc.cluster.local"
    port: 80
  api:
    host: "api-backend.default.svc.cluster.local"
    port: 80
  checkout:
    host: "checkout-backend.default.svc.cluster.local"
    port: 80
  assets:
    host: "assets-backend.default.svc.cluster.local"
    port: 80

# -------------------------------------------------------------------------- #
# Edge: Envoy + the tenant-router. Topology (RFC rules §1.4):
#   perPod (default) — the router is a container in the Envoy pod, reached on
#                      127.0.0.1:50052. Lowest latency (routing is on EVERY
#                      request — the heavier read load, RFC §5), per-replica warm
#                      L1, isolated blast radius. Cost = L1 working set × replicas.
#   shared           — NOT templated here; for very large domain populations split
#                      the router into its own Deployment+Service and set
#                      edge.routerCluster to that Service. See deploy/README.md.
# -------------------------------------------------------------------------- #
edge:
  # Deploy this chart's routing-only edge. Set false when composing with the
  # identity plane via the ../edge-platform umbrella, which owns the single
  # combined tenant-first edge instead (the data-plane components below still
  # deploy). Default true: this chart is usable standalone.
  enabled: true
  replicas: 2
  # ext_proc behaviour: fail-closed (RFC C18 — a routing failure must NOT silently
  # default a route; the router itself returns 503 until ready / 404 for unknown).
  failureModeAllow: false
  extProcTimeout: "5s"
  # The tenant-router ext_proc address Envoy dials. Per-pod default = loopback.
  routerCluster: "127.0.0.1:50052"
  resources:
    envoy:
      requests: { cpu: "100m", memory: "128Mi" }
      limits: { cpu: "1", memory: "256Mi" }
    router:
      requests: { cpu: "100m", memory: "128Mi" }
      # Size memory to the L1 working set (router.cacheCapacity entries), NOT the
      # full domain population (RFC §6.3 / decision 3). Raise with the working set.
      limits: { cpu: "1", memory: "512Mi" }
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 20            # routing carries the heavier per-request load (§5)
    targetCPUUtilizationPercentage: 70
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: "nginx"          # or "traefik"
    # TLS terminated HERE by the ingress controller — that is why this chart
    # carries no in-app TLS. cert-manager issues the cert via this annotation.
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Routing keys on the request host, so the ingress must pass through ALL hosts
    # you serve (or a wildcard). Set the host(s) your tenants resolve under.
    hosts:
      - "*.example.com"
    tls:
      enabled: true
      secretName: "routing-plane-edge-tls"

# tenant-router runtime config (RFC C14/C15/C18).
router:
  # L1 working-set bound (entries), NOT the full domain population (RFC §6.3).
  cacheCapacity: 200000
  # L1 staleness backstop; a missed invalidation self-heals within this (RFC §3.10).
  cacheTtlSeconds: 600
  # L2 (shared) TTL when Redis is enabled.
  l2TtlSeconds: 600
  logFormat: "json"             # json | text
  rustLog: "info"

# -------------------------------------------------------------------------- #
# Control plane (RFC C16) — admin API; owns the idempotent routing schema; NOT on
# the request hot path. Keep it OFF the public ingress (administrative boundary).
# -------------------------------------------------------------------------- #
controlPlane:
  replicas: 1
  logFormat: "json"
  logLevel: "info"
  # Admin-token gate (RFC C16 admin boundary). The data endpoints mutate the
  # authoritative routing store, so they require an `Authorization: Bearer <token>`.
  # Fail-closed: with auth.enabled the chart REQUIRES a token (inline or via an
  # existing Secret) and the container refuses to start without it. Set
  # auth.enabled=false ONLY to run unauthenticated on a trusted network.
  auth:
    enabled: true
    # Provide the token inline (chart wraps it in a managed Secret) OR reference
    # an existing Secret holding it (preferred in production — keep it out of values).
    token: ""
    existingSecret: ""
    existingSecretKey: "token"
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "500m", memory: "128Mi" }
  # Optional Ingress for the admin API. OFF by default — reach it via
  # `kubectl port-forward` or an internal-only ingress. If you enable it, put an
  # auth annotation in front; this API mutates the authoritative routing store.
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
    host: "routing-admin.internal.example.com"
    tls:
      enabled: false
      secretName: "routing-plane-admin-tls"
  # NetworkPolicy enforcing broker-only reachability of the admin API (:9400).
  # The control plane is broker-only (RFC C16): tenants NEVER call it directly, so
  # the shared admin token authenticates the broker and tenant_id is trusted. Enable
  # this and set allowFrom to your broker's peer selector to ENFORCE that at the
  # network layer, so a leaked token alone can't reach the port. Ingress-only —
  # egress (Postgres / DNS) is unaffected. Requires a CNI that enforces
  # NetworkPolicy.
  #
  # /metrics and /healthz are served on a SEPARATE ops port (:9401), NOT :9400, so
  # scrapers and kubelet probes are allowed onto ops WITHOUT being granted the
  # broker-only admin API. The chart fails closed: if you enable a ServiceMonitor
  # or the admin Ingress without the matching allow-list below, render is refused
  # rather than silently dropping scrapes / locking out the admin Ingress.
  networkPolicy:
    enabled: false
    # REQUIRED when enabled: standard NetworkPolicyPeer entries (podSelector /
    # namespaceSelector / ipBlock) identifying the broker(s) allowed to reach the
    # admin API on :9400. Empty while enabled => the chart refuses to render (so you
    # can't silently lock the broker out). Example:
    #   - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: brokers } }
    #     podSelector: { matchLabels: { app: domain-broker } }
    allowFrom: []
    # REQUIRED when metrics.serviceMonitor.enabled: peers allowed to scrape /metrics
    # on the ops port :9401 (e.g. your Prometheus). Empty WHILE a ServiceMonitor is
    # enabled => the chart refuses to render (so scrapes can't be silently dropped).
    # Leaving the ServiceMonitor disabled keeps this optional.
    allowMetricsFrom: []
    # REQUIRED when controlPlane.ingress.enabled: the ingress-controller peer
    # allowed to reach the admin API on :9400 (it proxies the admin Ingress through
    # to the pod). Empty WHILE the admin Ingress is enabled => the chart refuses to
    # render (so the broker-only rule can't silently deny the Ingress). Example:
    #   - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
    #     podSelector: { matchLabels: { app.kubernetes.io/name: ingress-nginx } }
    allowIngressControllerFrom: []
    # OPTIONAL: node/kubelet source allowed to reach health probes on the ops port
    # :9401. Most CNIs exempt node-origin traffic from NetworkPolicy, so this is
    # empty by default. On CNIs that DO police node traffic (e.g. Cilium host
    # firewall, some Calico configs) probes would be dropped — set your node CIDR to
    # keep liveness/readiness working. Example:
    #   - ipBlock: { cidr: 10.0.0.0/16 }
    allowProbesFrom: []

# -------------------------------------------------------------------------- #
# Postgres — the authoritative routing store (control-plane-written, cache
# invalidation on change via LISTEN/NOTIFY; RFC decision 14). EXTERNAL by design:
# this chart does not run a database. Point it at a managed service or an HA
# operator cluster. The control plane creates its own `routing` schema on start.
# Routing has no per-second revocation need, so a brief store outage only blocks
# cold-domain miss-loads; hot domains keep serving from L1 (RFC §3.10).
#
# Provide the connection URL one of two ways (existingSecret preferred):
#   - postgres.existingSecret — name of a Secret you create holding the URL.
#   - postgres.url            — inline URL the chart wraps in a managed Secret.
# This is the DIRECT/session URL: the tenant-router's LISTEN/NOTIFY invalidation
# feed and the control plane use it. It MUST NOT be a transaction-mode pooler
# (PgBouncer/RDS-Proxy txn mode), which silently swallows LISTEN — see deploy
# README "External Postgres requirements".
#
# OPTIONAL read split: the tenant-router's cache-miss point reads can use a
# SEPARATE pooled endpoint (e.g. a transaction-mode PgBouncer) via `postgres.read*`
# below. Leave it empty to read over the direct URL too. The LISTEN feed and the
# control plane ALWAYS use the direct URL above regardless.
# -------------------------------------------------------------------------- #
postgres:
  db: "routing"
  # Preferred: a Secret you manage (works with ExternalSecrets / SealedSecrets).
  existingSecret: ""            # Secret name; key below
  existingSecretKey: "url"
  # Inline fallback (discouraged — ends up in a chart-managed Secret). Must reach
  # a database the control plane can create its `routing` schema in.
  # ENCRYPTION IN TRANSIT: append `?sslmode=verify-full` in production (encrypt +
  # verify the server cert). `require` only encrypts; `disable` is dev-only.
  url: ""                       # e.g. postgres://user:pass@host:5432/routing?sslmode=verify-full
  # OPTIONAL pooled read endpoint for the tenant-router (cache-miss reads only).
  # Same two-way choice as above; empty => read over the direct URL.
  readExistingSecret: ""        # Secret name holding the pooled URL; key below
  readExistingSecretKey: "url"
  readUrl: ""                   # inline pooled URL, e.g. postgres://user:pass@pgbouncer:6432/routing

# -------------------------------------------------------------------------- #
# Redis — the OPTIONAL shared L2 cache tier (RFC decision 9). EXTERNAL and
# OPTIONAL: it MUST remain a performance optimization — a connect/op failure
# degrades to L1-only, never a correctness dependency. Disabled => the plane is
# still correct (L1-only). When enabled, point it at a Redis you operate.
# -------------------------------------------------------------------------- #
redis:
  enabled: false
  # Required when enabled. If it needs auth, embed credentials in the URL
  # (e.g. redis://:pass@host:6379) — it is a cache, not a source of truth.
  url: ""                       # e.g. redis://redis.cache.svc.cluster.local:6379

# -------------------------------------------------------------------------- #
# NATS — the OPTIONAL cross-region invalidation transport (track D). Enabling it
# routes routing invalidations over NATS instead of pg_notify, which is delivered
# only within a single Postgres server (physical replicas do not forward NOTIFY),
# so a router in another region would otherwise serve stale routes until the L1
# TTL (router.cacheTtlSeconds) expires. Core NATS (fire-and-forget): a dropped
# signal self-heals within that same TTL — it is NOT a correctness dependency.
# Disabled => the router stays on pg_notify and single-region deploys are
# unaffected. When enabled, the URL MUST be reachable from EVERY router region
# (a supercluster/gateway topology or a regional NATS with gateways).
# -------------------------------------------------------------------------- #
nats:
  enabled: false
  # Required when enabled. Point it at a NATS you operate that spans your router
  # regions (e.g. a gateway-connected supercluster). Auth creds go in the URL.
  url: ""                       # e.g. nats://nats.msg.svc.cluster.local:4222

# -------------------------------------------------------------------------- #
# Telemetry (first-party-telemetry) — the PRIMARY signal path. The Rust services
# (tenant-router, control-plane) PUSH traces + metrics + logs via OTLP/gRPC to your
# OTel Collector (the SINGLE telemetry egress). Set it to light up metrics in your
# TSDB, logs in your log store, and the metrics<->trace exemplar jump. UNSET
# (default "") = export OFF, stdout logs only (fail-open opt-in). Running a real
# deployment WITHOUT this is an observability gap, not a supported variant.
# -------------------------------------------------------------------------- #
telemetry:
  # OTLP/gRPC endpoint of your OTel Collector, e.g.
  # http://otel-collector.monitoring.svc.cluster.local:4317. Empty => export off.
  otlpEndpoint: ""
  # deployment.environment.name every first-party signal is stamped with (first-
  # party-telemetry). REQUIRED once otlpEndpoint is set: per-environment SLOs are
  # undefined without it, so a telemetry-on render FAILS CLOSED when this is empty
  # (the Rust services enforce the same invariant at startup). Inherits the umbrella
  # global.telemetry.environment when unset here. e.g. "production".
  environment: ""

# -------------------------------------------------------------------------- #
# Observability — emit a ServiceMonitor/PodMonitor per component if you run the
# Prometheus Operator. The tenant-router latency histogram is classic-bucket
# (aggregatable across instances), served on :9302.
# -------------------------------------------------------------------------- #
metrics:
  serviceMonitor:
    enabled: false
    labels: {}
    interval: "15s"
  # Nexus-authored app-SLO alert rules as a PrometheusRule CR (twin of serviceMonitor)
  # — consumed by the Prometheus Operator OR the VictoriaMetrics operator/vmalert.
  # nexus AUTHORS, your engine EVALUATES. Requires that operator's CRD.
  prometheusRule:
    enabled: false
    # Extra labels so your operator's ruleSelector matches (e.g. release: kube-prom-stack).
    labels: {}
    # Alert thresholds — the "> Y" in each rule; tune to your SLOs. The `result`/`op`
    # rules require your OTel collector to KEEP those metric attributes.
    thresholds:
      edge5xxRatio: 0.02            # edge 5xx / all responses over 5m (Envoy, scraped)
      edgeP99Milliseconds: 500      # edge downstream request p99 (Envoy rq_time is ms)
      routingP99Seconds: 0.05       # tenant-router decision p99
      rejectPerSecond: 10           # unknown-host rejects (404)/s (needs `result`)
      unauthorizedPerSecond: 1      # control-plane 401/s (needs `op`)

# -------------------------------------------------------------------------- #
# Dashboards — nexus-authored Grafana dashboards shipped as ConfigMaps (twin of the
# PrometheusRule above). The Grafana SIDECAR auto-discovers ConfigMaps carrying the
# watched label and loads the JSON. Requires the sidecar (kube-prometheus-stack /
# grafana chart). The dashboards use a `datasource` template variable.
# -------------------------------------------------------------------------- #
dashboards:
  enabled: false
  label: grafana_dashboard
  labelValue: "1"
  folderAnnotation: ""
  folder: "Nexus"

# Common pod hardening defaults, applied to the first-party workloads (router,
# control-plane). All workloads here are stateless; the stores are external.
podSecurityContext:
  runAsNonRoot: true
  # Matches the non-root UID baked into the images (Dockerfile `USER 10001`), so
  # the kubelet can verify runAsNonRoot and the pod is admitted.
  runAsUser: 10001
  runAsGroup: 10001
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
