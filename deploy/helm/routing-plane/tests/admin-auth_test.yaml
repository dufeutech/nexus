suite: control-plane fail-closed admin-auth postures
# Locks the admin-plane-authorization deployment contract for the control-plane against
# drift from routing-rs/control-plane/src/main.rs:144-203. Scoped to the control-plane
# templates so unrelated edge/networkpolicy guards don't interfere.
templates:
  - templates/control-plane.yaml
  - templates/secret-control-auth.yaml
set:
  postgres.existingSecret: pg
tests:
  - it: posture 1 (pepper via existingSecret) renders ADMIN_TOKEN_PEPPER and no legacy env
    template: templates/control-plane.yaml
    documentIndex: 0
    set:
      controlPlane.auth.tokenPepper.existingSecret: pepper-sec
      controlPlane.auth.tokenPepper.existingSecretKey: pepper
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: ADMIN_TOKEN_PEPPER
            valueFrom:
              secretKeyRef:
                name: pepper-sec
                key: pepper
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: CONTROL_AUTH_TOKEN }
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: ADMIN_LEGACY_TOKEN_OK }

  - it: posture 2 (legacy migration) renders CONTROL_AUTH_TOKEN + ADMIN_LEGACY_TOKEN_OK, no pepper
    template: templates/control-plane.yaml
    documentIndex: 0
    set:
      controlPlane.auth.existingSecret: tok-sec
      controlPlane.auth.legacyTokenOk: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: ADMIN_LEGACY_TOKEN_OK, value: "true" }
      - contains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: CONTROL_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: tok-sec
                key: token
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: ADMIN_TOKEN_PEPPER }

  - it: bootstrap combo (pepper + legacy together) renders both, for first-token minting
    template: templates/control-plane.yaml
    documentIndex: 0
    set:
      controlPlane.auth.tokenPepper.existingSecret: pepper-sec
      controlPlane.auth.existingSecret: tok-sec
      controlPlane.auth.legacyTokenOk: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: ADMIN_TOKEN_PEPPER }
      - contains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: CONTROL_AUTH_TOKEN }
      - contains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: ADMIN_LEGACY_TOKEN_OK, value: "true" }

  - it: posture 3 (disabled) renders CONTROL_AUTH_DISABLED and no credential env
    template: templates/control-plane.yaml
    documentIndex: 0
    set:
      controlPlane.auth.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: CONTROL_AUTH_DISABLED, value: "true" }
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: ADMIN_TOKEN_PEPPER }
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content: { name: CONTROL_AUTH_TOKEN }

  - it: inline pepper value renders a chart-managed pepper Secret
    template: templates/secret-control-auth.yaml
    documentIndex: 0
    set:
      controlPlane.auth.tokenPepper.value: devpepper
    asserts:
      - isKind: { of: Secret }
      - equal: { path: metadata.name, value: RELEASE-NAME-routing-plane-control-pepper }
      - equal: { path: stringData.pepper, value: devpepper }

  - it: guard — no posture selected fails render (mirrors the binary refusal)
    template: templates/control-plane.yaml
    documentIndex: 0
    asserts:
      - failedTemplate:
          errorMessage: "no admin auth posture selected for control-plane. Set controlPlane.auth.tokenPepper.* (named tokens), or controlPlane.auth.legacyTokenOk=true with a legacy token (migration), or controlPlane.auth.enabled=false (trusted-network/dev only)."

  - it: guard — legacyTokenOk without a legacy token fails render
    template: templates/control-plane.yaml
    documentIndex: 0
    set:
      controlPlane.auth.legacyTokenOk: true
    asserts:
      - failedTemplate:
          errorMessage: "controlPlane.auth.legacyTokenOk=true but no legacy token is set — set controlPlane.auth.token or controlPlane.auth.existingSecret (mirrors control-plane's 'missing CONTROL_AUTH_TOKEN for legacy mode' refusal)."
