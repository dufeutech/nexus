# Edge Resolution Platform — composition (umbrella) values.
#
# This chart owns the SINGLE combined tenant-first edge (Envoy + tenant-router +
# identity sidecar). The two subcharts below deploy their DATA planes only — their
# own edges are turned off here so there is exactly one edge.
#
# Configure each plane in its own subchart block (images, stores, ZITADEL, pools,
# cache sizing). The combined edge reuses those values; the `edge:` block here only
# sets edge-level concerns (replicas, resources, ingress, autoscaling).

# -------------------------------------------------------------------------- #
# Global values propagate to BOTH subcharts and the combined edge (first-party-
# telemetry). Set global.telemetry.otlpEndpoint ONCE here and every Rust component
# (combined edge's tenant-router + sidecar, plus authz-admin / membership-sync /
# control-plane in the subcharts) pushes traces + metrics + logs via OTLP/gRPC to it —
# lighting up metrics in your TSDB, logs in your log store, and the metrics<->trace
# exemplar jump. A subchart's own telemetry.otlpEndpoint overrides this for that plane.
# Empty (default) => export off (stdout logs only, fail-open). This is separate from
# `edge.tracing` below, which wires ONLY Envoy's trace export.
# -------------------------------------------------------------------------- #
global:
  # ONE image tag for the whole platform — the combined edge AND both subcharts'
  # components. The first-party images are built together, so they share a release
  # tag; set it here once instead of overriding every per-image tag. A per-image or
  # per-subchart `images.tag` still overrides this. Empty => each chart's appVersion.
  image:
    tag: ""
  telemetry:
    # OTLP/gRPC endpoint of your OTel Collector, e.g.
    # http://otel-collector.monitoring.svc.cluster.local:4317. Empty => export off.
    otlpEndpoint: ""
    # deployment.environment.name every first-party signal is stamped with (first-
    # party-telemetry). REQUIRED once otlpEndpoint is set: per-environment SLOs are
    # undefined without it, so a telemetry-on render FAILS CLOSED when this is empty
    # (the Rust services enforce the same invariant at startup). e.g. "production".
    environment: ""

# -------------------------------------------------------------------------- #
# Routing plane (subchart) — deploys the control plane only (its edge is disabled;
# this umbrella runs the combined one). The routing store (Postgres) and optional
# L2 (Redis) are EXTERNAL. Set images.*, postgres.* (external), redis.* (external,
# optional), pools.* here.
# -------------------------------------------------------------------------- #
routing-plane:
  edge:
    enabled: false        # umbrella owns the combined edge
  # postgres:
  #   existingSecret: routing-pg     # or postgres.url
  # redis:
  #   enabled: false                 # optional external L2

# -------------------------------------------------------------------------- #
# Identity plane (subchart) — deploys authz-admin + membership-sync (its edge is
# disabled; this umbrella runs the combined one). The durable store (PostgreSQL)
# is EXTERNAL. Set images.*, oidc.*, postgres.* (external), authzAdmin.*, backend here.
# -------------------------------------------------------------------------- #
identity-plane:
  edge:
    enabled: false        # umbrella owns the combined edge
  # postgres:
  #   existingSecret: identity-pg     # or postgres.url
  # The membership-sync worker needs a READ-ONLY connection to the routing plane's
  # DB (LISTEN routing_membership_changes + SELECT routing.memberships). Point it at
  # the routing subchart's pg Secret (default name <release>-routing-plane-pg), or
  # set membershipSync.enabled: false to skip it.
  # routingPg:
  #   existingSecret: <release>-routing-plane-pg    # or routingPg.url

# -------------------------------------------------------------------------- #
# The combined tenant-first edge (RFC C17). Filter order:
#   strip client x-workspace-* / x-user-*     (C3)
#   -> tenant-router ext_proc  (host -> workspace -> x-route-pool; reject unknown C18)
#   -> jwt_authn               (verify the bearer credential against ZITADEL, C1)
#   -> identity ext_proc       (inject x-user-* from the verified subject, C2)
#   -> router                  (forward to the pool the routing decision chose)
# Images, ZITADEL config, pools and cache sizing are taken from the subchart
# blocks above; only edge-level concerns live here.
# -------------------------------------------------------------------------- #
edge:
  replicas: 2
  # ext_proc behaviour for BOTH processors (fail-closed: a routing failure must not
  # default a route, and enrichment fail-open must never weaken auth — RFC C10/C17).
  failureModeAllow: false
  extProcTimeout: "5s"
  # Routes listed here skip the identity ext_proc (fail-open, no enrichment) so
  # they survive a sidecar outage (C10). This is ENRICHMENT-only and orthogonal to
  # auth: a publicPaths route is still tenant-routed, and whether it requires a
  # credential is decided ONLY by the per-route auth gate (the tenant's auth_routes
  # policy -> x-auth-required). To make a path anonymous-accessible, set it public
  # in auth_routes; listing it here alone does NOT open it. Use for tenant-scoped
  # public assets that need no user context. Default: none.
  publicPaths: []
  resources:
    envoy:
      requests: { cpu: "100m", memory: "128Mi" }
      limits: { cpu: "1", memory: "256Mi" }
    tenantRouter:
      requests: { cpu: "100m", memory: "128Mi" }
      limits: { cpu: "1", memory: "512Mi" }
    identitySidecar:
      requests: { cpu: "100m", memory: "256Mi" }
      limits: { cpu: "1", memory: "1Gi" }
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  # hot-path-rps-optimization: Envoy worker-thread count. 0 = auto (one worker per core,
  # Envoy's default). Set it to the edge container's CPU limit (see resources.limits.envoy)
  # so the worker pool matches its allotment instead of the node's full core count.
  concurrency: 0
  # ------------------------------------------------------------------------ #
  # N6 edge-rooted tracing. The edge is the SOLE root of trace context: client
  # traceparent/tracestate are stripped before the tracing decision (early
  # header mutation), the edge head-samples at `samplingPercent`, and injects
  # W3C trace context toward the backend pools. Export is OTLP/gRPC to
  # `collectorHost:collectorPort` — the SINGLE telemetry egress (an OTel
  # Collector; only its config may know the trace store). Like Prometheus in
  # these charts (ServiceMonitors -> external operator), the collector and the
  # trace store (e.g. Tempo) are EXTERNAL — point at your monitoring
  # namespace's collector. Fail-open: an unreachable collector never affects
  # request handling. Disabled by default ONLY because the endpoint is
  # deployment-specific — a topology that can trace, should (running without
  # tracing is a deployment gap, not a supported variant).
  # ------------------------------------------------------------------------ #
  tracing:
    enabled: false
    # OTLP/gRPC endpoint of your OTel Collector.
    collectorHost: "otel-collector.monitoring.svc.cluster.local"
    collectorPort: 4317
    # Head-sampling rate in whole percent (0-100). 100 = trace every request.
    samplingPercent: 100
    serviceName: "nexus-edge"
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Routing keys on the host, so pass through every host you serve (or a wildcard).
    hosts:
      - "*.example.com"
    tls:
      enabled: true
      secretName: "edge-platform-tls"

# -------------------------------------------------------------------------- #
# Origin enforcement (edge-origin-trust). The x-workspace-*/x-user-*/
# x-identity-contract header family is unforgeable ONLY because the pool
# backends are reachable exclusively through this edge — the stamp itself is an
# unsigned drift signal, NOT an authentication boundary. This umbrella always
# renders the identity-enriched edge, so an explicit origin-enforcement choice
# is REQUIRED: rendering with neither option set FAILS (fail closed).
#
# BREAKING (vs. earlier chart versions, which rendered without any origin
# control): set exactly one of the two options below.
# -------------------------------------------------------------------------- #
originEnforcement:
  networkPolicy:
    # Ship a NetworkPolicy restricting the pool backend pods' ingress to the
    # combined edge pods (same pattern as the routing-plane control-plane
    # policy). Requires the backends to run in THIS namespace and a CNI that
    # enforces NetworkPolicy — the direct-to-backend e2e probe verifies it does.
    enabled: false
    # matchLabels of the pool backend pods the policy protects. REQUIRED when
    # enabled (an empty selector would select every pod in the namespace).
    backendSelector: {}
    # Backend ports the edge is allowed to reach (union across pools).
    backendPorts: [80]
    # Additional ingress peers (e.g. kubelet probe CIDRs on CNIs that police
    # node-origin traffic).
    extraAllowFrom: []
  # Explicit assertion that the invariant is enforced OUTSIDE this chart (the
  # backends live in another namespace/cluster/network you police). An
  # acknowledgment the chart records, not a control it ships.
  external: false

# -------------------------------------------------------------------------- #
# Monitoring — nexus-authored SLO alert rules for the COMBINED edge (Envoy) this
# umbrella owns. Enable the per-plane Rust-service rules on the subcharts:
#   identity-plane.metrics.prometheusRule.enabled=true
#   routing-plane.metrics.prometheusRule.enabled=true
# and this block for the edge. Consumed by the Prometheus Operator / VM operator/vmalert.
# -------------------------------------------------------------------------- #
metrics:
  prometheusRule:
    enabled: false
    labels: {}
    thresholds:
      edge5xxRatio: 0.02            # edge 5xx / all responses over 5m (Envoy, scraped)
      edgeP99Milliseconds: 500      # edge downstream request p99 (Envoy rq_time is ms)

# Store connection overrides for the combined edge. Empty => derived from the
# subchart release names (the normal case). Set these only if a subchart points at
# an external store via an existingSecret whose name the umbrella can't derive.
compose:
  # Secret + key the tenant-router reads ROUTING_PG_URL from. Default: the routing
  # subchart's existingSecret, else its chart-managed <release>-routing-plane-pg.
  routingPgSecret: ""        # default: <release>-routing-plane-pg
  routingPgSecretKey: ""     # default: url
  # OPTIONAL pooled read endpoint (ROUTING_PG_READ_URL). Default: derived from the
  # routing subchart's postgres.read* (empty => router reads over the direct URL).
  routingPgReadSecret: ""    # default: <release>-routing-plane-pg-read
  routingPgReadSecretKey: "" # default: url
  # Secret + key the identity sidecar reads PROFILE_PG_URL from. Default: the
  # identity subchart's existingSecret, else its chart-managed
  # <release>-identity-plane-pg.
  identityPgSecret: ""       # default: <release>-identity-plane-pg
  identityPgSecretKey: ""    # default: url
  # REDIS_URL the tenant-router dials. Default: routing-plane.redis.url when
  # enabled, else empty (L1-only).
  redisUrl: ""

# Pod hardening for the combined edge containers.
podSecurityContext:
  runAsNonRoot: true
  # Matches the non-root UID baked into the first-party images (Dockerfile
  # `USER 10001`); the Envoy image also runs fine as an arbitrary non-root UID.
  runAsUser: 10001
  runAsGroup: 10001
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}
