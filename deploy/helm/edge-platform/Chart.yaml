apiVersion: v2
name: edge-platform
description: >-
  Edge Resolution Platform — the tenant-first COMPOSITION of both planes on one
  static Envoy edge (see ../../../INFO.md C17). An umbrella over the
  identity-plane and routing-plane charts: each subchart contributes its data
  plane (stores, control plane, sync/reconcile) with its own edge DISABLED, and
  THIS chart owns the single combined edge — Envoy + tenant-router + identity
  sidecar, co-located per-pod — running the ordered chain
  strip → tenant resolve (C18) → verify credential (C1) → enrich (C2) → forward.
  Stores (PostgreSQL, optional Redis) and ZITADEL are external.
type: application
# Chart (package) version — bump on template changes; independent of appVersion.
# 0.4.1: appVersion 0.0.7 -> 0.0.8 — ships the 0.0.8 first-party images on the combined
# edge, carrying the tenant-router resolve KEEP-WARM release (N16 fix #2, ends the ~1/min
# request-path cold miss). Subchart pins tracked to routing-plane 0.3.1 / identity-plane
# 0.2.1. No umbrella template change; keep-warm is automatic (no new config). Chart
# version bumped so a consumer re-vendoring by version picks up the new appVersion.
# 0.4.0: ship the customer-domain TLS front tier (infra N12) under frontTier.* — a
# front-tier Deployment/Service on :443/:80 (Caddy/CertMagic on-demand TLS), a dedicated
# in-cluster ask Service exposing tenant-router :9300, and opt-in PROXY-protocol
# acceptance at both the front tier and the edge listener (edge.proxyProtocol). All
# default-off, so an existing release is unaffected until frontTier.enabled=true. This is
# a FEATURE ADD over 0.3.0 (new templates), so it forces a minor bump — a consumer that
# vendored 0.3.0 (admin-auth, no front tier) must re-vendor 0.4.0 to get the front tier.
# 0.3.0: pull in the subcharts' fail-closed admin-auth postures (named-token pepper +
# legacy migration) via passthrough — no umbrella template change. BREAKING inherited
# from the subcharts: a token-only control-plane/authz-admin config now also requires
# the plane's legacyTokenOk=true. Set the postures under routing-plane.controlPlane.auth.*
# and identity-plane.authzAdmin.* .
# 0.2.1: wire identity-contract signing into the COMBINED edge (infra N11) — the
# co-located identity sidecar now mints + publishes JWKS on :9210 like the standalone
# edge when identity-plane.sidecar.signing.enabled. No image change (appVersion 0.0.7).
version: 0.4.1
# The first-party image release this umbrella deploys. It is the DEFAULT tag for the
# combined edge's images (operators can override via global.image.tag), so it MUST
# equal the tag the images are published under — keep it in lockstep with the release.
appVersion: "0.0.8"
keywords:
  - identity
  - routing
  - envoy
  - ext_proc
  - composition
maintainers:
  - name: edge-platform
dependencies:
  - name: routing-plane
    version: "0.3.1"
    repository: "file://../routing-plane"
  - name: identity-plane
    version: "0.2.1"
    repository: "file://../identity-plane"
