apiVersion: v2
name: edge-platform
description: >-
  Edge Resolution Platform — the tenant-first COMPOSITION of both planes on one
  static Envoy edge (see ../../../INFO.md C17). An umbrella over the
  identity-plane and routing-plane charts: each subchart contributes its data
  plane (stores, control plane, sync/reconcile) with its own edge DISABLED, and
  THIS chart owns the single combined edge — Envoy + tenant-router + identity
  sidecar, co-located per-pod — running the ordered chain
  strip → tenant resolve (C18) → verify credential (C1) → enrich (C2) → forward.
  Stores (PostgreSQL, optional Redis) and ZITADEL are external.
type: application
# Chart (package) version — bump on template changes; independent of appVersion.
# 0.2.1: wire identity-contract signing into the COMBINED edge (infra N11) — the
# co-located identity sidecar now mints + publishes JWKS on :9210 like the standalone
# edge when identity-plane.sidecar.signing.enabled. No image change (appVersion 0.0.7).
version: 0.2.1
# The first-party image release this umbrella deploys. It is the DEFAULT tag for the
# combined edge's images (operators can override via global.image.tag), so it MUST
# equal the tag the images are published under — keep it in lockstep with the release.
appVersion: "0.0.7"
keywords:
  - identity
  - routing
  - envoy
  - ext_proc
  - composition
maintainers:
  - name: edge-platform
dependencies:
  - name: routing-plane
    version: "0.2.0"
    repository: "file://../routing-plane"
  - name: identity-plane
    version: "0.1.0"
    repository: "file://../identity-plane"
