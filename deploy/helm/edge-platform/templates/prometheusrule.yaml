{{- if eq .Values.monitoring.delivery "operator" -}}
# operator-form delivery (monitoring.delivery=operator): nexus-authored SLO rules for the
# COMBINED edge this umbrella owns (Envoy — the tenant-first data plane), as a
# PrometheusRule CR consumed by the Prometheus Operator OR the VictoriaMetrics
# operator/vmalert. The rule bodies come from the shared "edge-platform.edgeSloGroups"
# helper, so the files-form ConfigMap (monitoring-rules-files.yaml) ships byte-identical
# content. Envoy admin stats are SCRAPED, so these are collector-independent. The per-plane
# Rust-service rules (identity + routing) are shipped by the subcharts; enable them with
# identity-plane.monitoring.delivery / routing-plane.monitoring.delivery. Requires that operator's CRD.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "edge-platform.fullname" . }}-edge-slo
  labels:
    {{- include "edge-platform.labels" . | nindent 4 }}
    {{- with .Values.monitoring.operator.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- include "edge-platform.edgeSloGroups" . | nindent 2 }}
{{- end }}
