{{- /*
Combined TENANT-FIRST Envoy edge (RFC C17). Parameterized from the subchart
values: ZITADEL config + sidecar cache from identity-plane; pools from
routing-plane. Mirrors the verified ../../kind/full-stack/manifests/edge.yaml.

Filter order is load-bearing:
  header_mutation  strip client x-workspace-* and x-user-*        (C3)
    tenant-router ext_proc   host -> workspace -> x-route-pool; reject unknown (C18)
    jwt_authn                verify the bearer credential                    (C1)
    identity ext_proc        inject x-user-* and x-workspace-id from verified sub (C2)
    router                   forward to the pool the decision chose
*/ -}}
{{- $iv := index .Values "identity-plane" -}}
{{- $rv := index .Values "routing-plane" -}}
{{- $u := $iv.zitadel.internalUrl | trimPrefix "http://" | trimPrefix "https://" | trimSuffix "/" -}}
{{- $zHost := $u -}}
{{- $zPort := "8080" -}}
{{- if contains ":" $u -}}
{{- $zHost = first (splitList ":" $u) -}}
{{- $zPort = last (splitList ":" $u) -}}
{{- end -}}
{{- if not (hasKey $rv.pools "application") -}}
{{- fail "routing-plane.pools.application is required: it is the default route target." -}}
{{- end -}}
{{- /* edge-trust-anchor-integrity: the JWKS fetch is the root of ALL token
verification — refuse to render an edge whose trust anchor would travel an
unprotected channel nobody has vouched for (fail closed, not silently open). */ -}}
{{- if and (not $iv.zitadel.jwksTls.enabled) (not $iv.zitadel.jwksPlaintextTrustedPath) -}}
{{- fail "the edge fetches its JWT trust anchor (JWKS) but no transport-integrity choice is set — an on-path attacker substituting signing keys is a FULL auth bypass (edge-trust-anchor-integrity). Set identity-plane.zitadel.jwksTls.enabled=true to fetch over TLS with server-cert verification (preferred), or identity-plane.zitadel.jwksPlaintextTrustedPath=true to explicitly assert the edge→ZITADEL path is trusted (loopback / assessed in-cluster hop). Rendering without either would silently trust unauthenticated keys." -}}
{{- end -}}
{{- $jwksScheme := ternary "https" "http" $iv.zitadel.jwksTls.enabled -}}
{{- $jwksSni := $iv.zitadel.jwksTls.sni | default $zHost -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edge-platform.fullname" . }}-edge-envoy
  labels:
    {{- include "edge-platform.labels" . | nindent 4 }}
    {{- include "edge-platform.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }

    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address: { address: 0.0.0.0, port_value: 10000 }
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: edge
                    # Canonicalize :path BEFORE the tenant-router ext_proc, the auth
                    # gate and routing read it — else an encoded/dot-segment path can
                    # read as one route to the gate (public) and another to the
                    # backend (protected): auth-gate path confusion. RFC 3986 dot
                    # removal + merge slashes + unescape %2F so all stages agree.
                    normalize_path: true
                    merge_slashes: true
                    path_with_escaped_slashes_action: UNESCAPE_AND_FORWARD
                    # JSON access log (audit trail): method/path/status/host/tenant
                    # and the per-route gate decision. Deliberately NO Authorization
                    # header and NO x-user-* (PII/secret hygiene). response_flags
                    # shows WHY a request was rejected (e.g. jwt_authn 401).
                    access_log:
                      - name: envoy.access_loggers.stdout
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                          log_format:
                            json_format:
                              start_time: "%START_TIME%"
                              method: "%REQ(:METHOD)%"
                              path: "%REQ(:PATH)%"
                              protocol: "%PROTOCOL%"
                              response_code: "%RESPONSE_CODE%"
                              response_flags: "%RESPONSE_FLAGS%"
                              duration_ms: "%DURATION%"
                              authority: "%REQ(:AUTHORITY)%"
                              upstream_host: "%UPSTREAM_HOST%"
                              route_pool: "%REQ(X-ROUTE-POOL)%"
                              workspace_id: "%REQ(X-WORKSPACE-ID)%"
                              auth_required: "%REQ(X-AUTH-REQUIRED)%"
                              user_agent: "%REQ(USER-AGENT)%"
                              request_id: "%REQ(X-REQUEST-ID)%"
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: edge
                          domains: ["*"]
                          routes:
                            {{- range .Values.edge.publicPaths }}
                            # EXPLICITLY designated non-enriched route
                            # (identity-workspace-authz): tenant-routed +
                            # authenticated, but identity enrichment disabled
                            # (fail-open, C10) — reaches the backend unstamped BY
                            # DESIGN. Rendered from the ONE edge.publicPaths
                            # allowlist, so designation and edge behavior cannot
                            # drift; any path NOT listed keeps enrichment
                            # (fail-closed default).
                            - match: { prefix: {{ . | quote }} }
                              route: { cluster: pool_application }
                              typed_per_filter_config:
                                envoy.filters.http.ext_proc:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                                  disabled: true
                            {{- end }}
                            {{- range $name, $pool := $rv.pools }}
                            - match:
                                prefix: "/"
                                headers: [{ name: x-route-pool, string_match: { exact: {{ $name | quote }} } }]
                              route: { cluster: pool_{{ $name }} }
                            {{- end }}
                            - match: { prefix: "/" }
                              route: { cluster: pool_application }
                    http_filters:
                      # FIRST: strip client-supplied trusted headers (RFC C3).
                      - name: envoy.filters.http.header_mutation
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.header_mutation.v3.HeaderMutation
                          mutations:
                            request_mutations:
                              - remove: "x-workspace-id"
                              - remove: "x-workspace-plan"
                              - remove: "x-workspace-features"
                              - remove: "x-route-pool"
                              - remove: "x-routed-by"
                              # Edge geo (x-geo-*) normalized + injected by
                              # tenant-router; strip client copies (C3).
                              - remove: "x-geo-source"
                              - remove: "x-geo-country"
                              - remove: "x-geo-continent"
                              - remove: "x-geo-region"
                              - remove: "x-geo-city"
                              - remove: "x-geo-postal-code"
                              - remove: "x-geo-timezone"
                              - remove: "x-geo-latitude"
                              - remove: "x-geo-longitude"
                              - remove: "x-geo-client-ip"
                              # Request-context normalized + injected by
                              # tenant-router; strip client copies (C3).
                              - remove: "x-locale"
                              - remove: "x-lang"
                              - remove: "x-currency"
                              - remove: "x-privacy-gpc"
                              - remove: "x-privacy-dnt"
                              - remove: "x-device-type"
                              - remove: "x-user-id"
                              - remove: "x-user-org"
                              - remove: "x-user-roles"
                              - remove: "x-user-roles-source"
                              - remove: "x-user-entitlements"
                              - remove: "x-user-suspended"
                              - remove: "x-user-enriched-by"
                              # Workspace-scoped acting identity (nexus-owned tenancy):
                              # authored authoritatively by the identity sidecar after a
                              # live membership check — strip client copies (C3).
                              # `x-requested-workspace` stays an allowed non-auth hint.
                              - remove: "x-user-type"
                              - remove: "x-user-role"
                              # Trusted auth-state from the identity sidecar; strip
                              # client copies so is-anonymous is unforgeable (C3).
                              - remove: "x-auth-anonymous"
                              - remove: "x-auth-method"
                              # Per-route auth gate (RFC N4): tenant-router emits it,
                              # jwt_authn branches on it — a client copy must never
                              # survive to forge the gate (C3).
                              - remove: "x-auth-required"
                              # Versioned identity-contract stamp: the identity sidecar
                              # authors it as a DRIFT/version signal for the
                              # x-workspace-*/x-user-* header shape — NOT proof of edge
                              # origin (that guarantee is edge-origin-trust's origin
                              # enforcement). Strip any client copy so a version cannot
                              # be forged (C3, same rule as x-auth-required/x-workspace-id).
                              - remove: "x-identity-contract"
                      # Tenant routing (C14/C15/C18) — runs BEFORE auth so
                      # verification may be tenant-scoped (C17).
                      - name: tenant-router.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc: { cluster_name: tenant_router }
                          failure_mode_allow: {{ .Values.edge.failureModeAllow }}
                          message_timeout: {{ .Values.edge.extProcTimeout }}
                          processing_mode:
                            request_header_mode: SEND
                            response_header_mode: SKIP
                            request_body_mode: NONE
                            response_body_mode: NONE
                            request_trailer_mode: SKIP
                            response_trailer_mode: SKIP
                      # Verify the bearer credential (C1).
                      - name: envoy.filters.http.jwt_authn
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                          providers:
                            zitadel:
                              issuer: {{ $iv.zitadel.issuer | quote }}
                              remote_jwks:
                                # SECURITY: the JWKS gates ALL token verification —
                                # a network MITM that substitutes keys is a full
                                # auth bypass (edge-trust-anchor-integrity). The
                                # scheme follows identity-plane.zitadel.jwksTls; the
                                # actual protection is the `transport_socket` on the
                                # `zitadel_jwks` cluster below (trusted CA + SNI +
                                # SAN match). A render guard refuses plaintext
                                # without an explicit trusted-path assertion.
                                http_uri:
                                  uri: "{{ $jwksScheme }}://{{ include "edge-platform.jwksHost" . }}{{ $iv.zitadel.jwksPath }}"
                                  cluster: zitadel_jwks
                                  timeout: 5s
                                cache_duration: { seconds: {{ $iv.zitadel.jwksCacheSeconds }} }
                              payload_in_metadata: verified
                              forward: true
                          # Per-route auth gate (RFC N4). jwt_authn runs AFTER the
                          # tenant-router ext_proc (C17), branching on the
                          # x-auth-required it set from the (domain, path) policy.
                          # INVERTED fail-safe polarity, first match wins:
                          #  - "false" -> allow_missing (public: missing token OK,
                          #    invalid token still 401s — NOT allow_missing_or_failed)
                          #  - "true" OR ABSENT -> catch-all demands a credential, so
                          #    the gate stays fail-CLOSED if the signal is ever lost.
                          # Relies on the header_mutation strip above for unforgeability.
                          rules:
                            - match:
                                prefix: "/"
                                headers: [{ name: x-auth-required, string_match: { exact: "false" } }]
                              requires: { allow_missing: {} }
                            - match: { prefix: "/" }
                              requires: { provider_name: zitadel }
                      # Enrich from the verified subject (C2).
                      - name: envoy.filters.http.ext_proc
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                          grpc_service:
                            envoy_grpc: { cluster_name: identity_sidecar }
                          failure_mode_allow: {{ .Values.edge.failureModeAllow }}
                          message_timeout: {{ .Values.edge.extProcTimeout }}
                          processing_mode:
                            request_header_mode: SEND
                            response_header_mode: SKIP
                            request_body_mode: NONE
                            response_body_mode: NONE
                            request_trailer_mode: SKIP
                            response_trailer_mode: SKIP
                          metadata_options:
                            forwarding_namespaces:
                              untyped: ["envoy.filters.http.jwt_authn"]
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: tenant_router
          type: STATIC
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: tenant_router
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: 127.0.0.1, port_value: 50052 }
        - name: identity_sidecar
          type: STATIC
          lb_policy: ROUND_ROBIN
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options: {}
          load_assignment:
            cluster_name: identity_sidecar
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: 127.0.0.1, port_value: 50051 }
        - name: zitadel_jwks
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: zitadel_jwks
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: {{ $zHost | quote }}, port_value: {{ $zPort }} }
          {{- if $iv.zitadel.jwksTls.enabled }}
          # edge-trust-anchor-integrity: authenticate the key source and protect
          # the JWKS response against on-path substitution — verify the server
          # chain against the trusted CA AND pin the presented SAN, so a valid
          # cert for the wrong host cannot serve keys either.
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              sni: {{ $jwksSni | quote }}
              common_tls_context:
                validation_context:
                  trusted_ca:
                    filename: {{ $iv.zitadel.jwksTls.caFile | quote }}
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher: { exact: {{ $jwksSni | quote }} }
          {{- end }}
        {{- range $name, $pool := $rv.pools }}
        - name: pool_{{ $name }}
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: pool_{{ $name }}
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: {{ $pool.host | quote }}, port_value: {{ $pool.port }} }
        {{- end }}
