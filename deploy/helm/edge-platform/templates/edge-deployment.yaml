{{- $iv := index .Values "identity-plane" -}}
{{- $rv := index .Values "routing-plane" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edge-platform.fullname" . }}-edge
  labels:
    {{- include "edge-platform.labels" . | nindent 4 }}
    {{- include "edge-platform.selectorLabels" (dict "ctx" . "component" "edge") | nindent 4 }}
spec:
  {{- if not .Values.edge.autoscaling.enabled }}
  replicas: {{ .Values.edge.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "edge-platform.selectorLabels" (dict "ctx" . "component" "edge") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "edge-platform.labels" . | nindent 8 }}
        {{- include "edge-platform.selectorLabels" (dict "ctx" . "component" "edge") | nindent 8 }}
      annotations:
        checksum/envoy-config: {{ include (print $.Template.BasePath "/edge-configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        # ---- Tenant router (routing plane): ext_proc :50052 (loopback) ----
        - name: tenant-router
          image: {{ include "edge-platform.image" (dict "repo" $rv.images.tenantRouter.repository "tag" $rv.images.tenantRouter.tag "ctx" .) }}
          imagePullPolicy: {{ $rv.images.tenantRouter.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: ROUTING_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "edge-platform.routingPgSecret" . }}
                  key: {{ include "edge-platform.routingPgSecretKey" . }}
            {{- if eq (include "edge-platform.hasRoutingPgRead" .) "true" }}
            # OPTIONAL pooled read endpoint (cache-miss reads only). The LISTEN
            # invalidation feed stays on ROUTING_PG_URL (direct) — see deploy README.
            - name: ROUTING_PG_READ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "edge-platform.routingPgReadSecret" . }}
                  key: {{ include "edge-platform.routingPgReadSecretKey" . }}
            {{- end }}
            {{- $redis := include "edge-platform.redisUrl" . }}
            {{- if $redis }}
            - name: REDIS_URL
              value: {{ $redis | quote }}
            {{- end }}
            - name: ROUTING_CACHE_CAPACITY
              value: {{ $rv.router.cacheCapacity | quote }}
            - name: ROUTING_CACHE_TTL
              value: {{ $rv.router.cacheTtlSeconds | quote }}
            - name: ROUTING_L2_TTL
              value: {{ $rv.router.l2TtlSeconds | quote }}
            - name: RUST_LOG
              value: {{ $rv.router.rustLog | quote }}
            - name: LOG_FORMAT
              value: {{ $rv.router.logFormat | quote }}
            {{- if and $.Values.global $.Values.global.telemetry $.Values.global.telemetry.otlpEndpoint }}
            # first-party-telemetry: the combined edge's Rust containers push OTLP to
            # the umbrella-wide collector (global.telemetry.otlpEndpoint). Unset => off.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.global.telemetry.otlpEndpoint | quote }}
            # first-party-telemetry: deployment.environment.name is a REQUIRED invariant
            # when export is on (per-environment SLOs); render fails closed if unset.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "edge-platform.otelResourceAttributes" $ | quote }}
            {{- end }}
          ports:
            - { name: rt-ext-proc, containerPort: 50052 }
            - { name: rt-debug, containerPort: 9300 }
            - { name: rt-metrics, containerPort: 9302 }
          readinessProbe:
            httpGet: { path: /healthz, port: rt-debug }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket: { port: rt-ext-proc }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.edge.resources.tenantRouter | nindent 12 }}
        # ---- Identity sidecar (identity plane): ext_proc :50051 (loopback) ----
        - name: identity-sidecar
          image: {{ include "edge-platform.image" (dict "repo" $iv.images.sidecar.repository "tag" $iv.images.sidecar.tag "ctx" .) }}
          imagePullPolicy: {{ $iv.images.sidecar.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: PROFILE_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "edge-platform.identityPgSecret" . }}
                  key: {{ include "edge-platform.identityPgSecretKey" . }}
            - name: CACHE_TTL_SECONDS
              value: {{ $iv.sidecar.cacheTtlSeconds | quote }}
            - name: READINESS_DELAY_SECONDS
              value: {{ $iv.sidecar.readinessDelaySeconds | quote }}
            - name: RUST_LOG
              value: {{ $iv.sidecar.rustLog | quote }}
            - name: LOG_FORMAT
              value: {{ $iv.sidecar.logFormat | quote }}
            {{- if and $.Values.global $.Values.global.telemetry $.Values.global.telemetry.otlpEndpoint }}
            # first-party-telemetry: the combined edge's Rust containers push OTLP to
            # the umbrella-wide collector (global.telemetry.otlpEndpoint). Unset => off.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.global.telemetry.otlpEndpoint | quote }}
            # first-party-telemetry: deployment.environment.name is a REQUIRED invariant
            # when export is on (per-environment SLOs); render fails closed if unset.
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "edge-platform.otelResourceAttributes" $ | quote }}
            {{- end }}
            # adopt-cedar-policy-gate: the L2 authorization policy set is DATA, mounted
            # from the identity-policy ConfigMap. A malformed/unvalidatable set fails
            # closed (gated routes 403). Unset would fall back to the embedded default.
            - name: POLICY_DIR
              value: /etc/nexus/policy
            {{- if $iv.sidecar.signing.enabled }}
            # identity-contract-signing: the COMBINED edge mints + publishes exactly like the
            # standalone identity edge (shared identity-plane.signingEnv template — infra N11:
            # a co-located edge without this serves UNSIGNED). fullname points at the identity
            # subchart's resources so the BAO token + break-glass material are the SAME Secrets
            # its signing.yaml renders.
            {{- include "identity-plane.signingEnv" (dict "signing" $iv.sidecar.signing "fullname" (include "edge-platform.identityFullname" .)) | nindent 12 }}
            {{- end }}
          ports:
            - { name: id-ext-proc, containerPort: 50051 }
            - { name: id-profile, containerPort: 9200 }
            - { name: id-metrics, containerPort: 9202 }
            {{- if $iv.sidecar.signing.enabled }}
            # identity-contract-signing: the PUBLIC JWKS (boxes fetch it to verify the signed
            # contract) — exposed on the Service too. See edge-service.yaml.
            - { name: id-jwks, containerPort: 9210 }
            {{- end }}
          readinessProbe:
            httpGet: { path: /healthz, port: id-profile }
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket: { port: id-ext-proc }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.edge.resources.identitySidecar | nindent 12 }}
          volumeMounts:
            # adopt-cedar-policy-gate: the L2 policy-as-data set (POLICY_DIR above).
            - { name: identity-policy, mountPath: /etc/nexus/policy, readOnly: true }
            {{- if and $iv.sidecar.signing.enabled $iv.sidecar.signing.kid }}
            # identity-contract-signing break-glass key material only (pure-Transit mounts
            # nothing here — the key lives in OpenBao and the JWKS is generated).
            - { name: signing-key, mountPath: /etc/nexus/signing-key, readOnly: true }
            - { name: signing-jwks, mountPath: /etc/nexus/signing-jwks, readOnly: true }
            {{- end }}
        # ---- Envoy edge (the combined tenant-first chain) ----
        - name: envoy
          image: {{ include "edge-platform.image" (dict "repo" $rv.images.envoy.repository "tag" $rv.images.envoy.tag "ctx" .) }}
          imagePullPolicy: {{ $rv.images.envoy.pullPolicy }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          # hot-path-rps-optimization: --concurrency sizes Envoy's worker pool. 0 = auto
          # (one per core); pin it (edge.concurrency) to the edge's CPU limit when co-located.
          args: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info", "--concurrency", {{ .Values.edge.concurrency | default 0 | quote }}]
          ports:
            - { name: http, containerPort: 10000 }
            - { name: admin, containerPort: 9901 }
          readinessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.edge.resources.envoy | nindent 12 }}
          volumeMounts:
            - { name: envoy-config, mountPath: /etc/envoy, readOnly: true }
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: envoy-config
          configMap:
            name: {{ include "edge-platform.fullname" . }}-edge-envoy
        # adopt-cedar-policy-gate: the identity sidecar's L2 authorization policy set.
        - name: identity-policy
          configMap:
            name: {{ include "edge-platform.fullname" . }}-identity-policy
        {{- if and $iv.sidecar.signing.enabled $iv.sidecar.signing.kid }}
        # identity-contract-signing break-glass material, rendered by the identity-plane
        # subchart's signing.yaml as <release>-identity-plane-signing-{key,jwks}. Pure-Transit
        # mode has none — the key stays in OpenBao and the JWKS is generated.
        - name: signing-key
          secret:
            secretName: {{ $iv.sidecar.signing.existingSecret | default (printf "%s-signing-key" (include "edge-platform.identityFullname" .)) }}
        - name: signing-jwks
          configMap:
            name: {{ printf "%s-signing-jwks" (include "edge-platform.identityFullname" .) }}
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
