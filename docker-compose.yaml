# Minimal, self-contained ZITADEL testing lab.
#
# This is deliberately NOT the official "latest" compose (Traefik + Login-v2 +
# Redis + OTEL). That stack bootstraps only a limited IAM_LOGIN_CLIENT service
# user, which cannot provision projects/apps/users. For an API-driven discovery
# lab we want the opposite: a single instance on :8080 plus a full-permission
# admin machine user whose PAT is written to a file the probe can read.
#
# Insecure on purpose (TLS disabled, well-known masterkey, weak passwords).
# Local end-to-end testing only — never expose this.

name: zitadel-lab

services:
  zitadel:
    # PINNED (not :latest): this file is the reference topology the e2e release
    # gate runs against, so it must boot deterministically — the 42/42 e2e pass
    # was verified on this version, and a floating tag broke the CI boot
    # (v4.15.3 died mid-init where v4.12.2 initializes cleanly). Bump
    # deliberately, re-running the gate.
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION:-v4.12.2}
    container_name: zitadel-lab
    restart: unless-stopped
    # start-from-init runs DB setup + instance init, then serves the API.
    # The masterkey default keeps a CLEAN CHECKOUT bootable (`docker compose up`
    # with no .env — the reference-topology contract); it is a documented lab
    # credential like the rest of this deliberately-insecure file.
    command: 'start-from-init --masterkey "${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}" --tlsMode disabled'
    environment:
      # --- external addressing -------------------------------------------------
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-8080}
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      # Use the bundled login (v1) so the lab is self-contained without the
      # separate Next.js login-v2 container.
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"

      # --- database ------------------------------------------------------------
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable

      # --- first-instance bootstrap (applied once, at init) --------------------
      # Default human admin for the console UI:
      #   login name: zitadel-admin@zitadel.localhost   password: Password1!
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: zitadel-admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Password1!"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      # Full-permission admin machine user; its PAT is written to the mounted file.
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: "Admin Service Account"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/zitadel-admin-sa.pat
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ZITADEL_EXTERNALPORT:-8080}:8080"
    volumes:
      # PAT for the admin service account lands here for the probe to read.
      - ./machinekey:/machinekey:rw
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # --- identity store + sync pipeline ----------------------------------------
  # The identity store is a nexus-OWNED database (`identitydb`) on the SAME
  # Postgres server ZITADEL uses (the `postgres` service below), under a dedicated
  # `identity` schema — the identity-plane twin of the routing plane's `routing`
  # database/schema (RFC decision 14; identity-data-residency: nexus owns its data
  # in its own database, not inside ZITADEL's `zitadel` DB). Freshness is the RFC C4
  # change feed implemented as a `seq`-cursor over Postgres LISTEN/NOTIFY (channel
  # `identity_changes`); no replica set, no second database technology. The
  # writers (authz-admin, membership-sync) create the schema idempotently on startup.

  # Nexus-native authorization authoring surface (nexus-native-authorization).
  # The SINGLE source of record for roles/entitlements/suspension: it authors them
  # into the identity Profile store via the AuthzAuthoring port, and the sidecar
  # picks the change up over the identity change feed within seconds. The OIDC
  # provider (ZITADEL) is NEVER an authorization source — it only answers "who am I".
  # Auth-gated by IDENTITY_ADMIN_TOKEN (lab dev credential; production parity with
  # the control-plane's CONTROL_AUTH_TOKEN). Bootstrap: set AUTHZ_BOOTSTRAP_ADMIN_SUB
  # to a subject `sub` to seed the first admin when the store has none.
  authz-admin:
    build:
      context: ./identity-rs
      target: authz-admin
    container_name: zitadel-lab-authz-admin
    restart: unless-stopped
    environment:
      PROFILE_PG_URL: postgres://postgres:postgres@postgres:5432/identitydb
      # Lab dev credential (this file is the deliberately-insecure loopback lab —
      # same posture as the control-plane token). Override beyond loopback.
      IDENTITY_ADMIN_TOKEN: ${IDENTITY_ADMIN_TOKEN:-zitadel-lab-dev-token}
      # Seed the first administrator from an empty store (idempotent break-glass).
      # Empty => no bootstrap seed; author the first grants via the admin API.
      AUTHZ_ADMIN_ROLE: ${AUTHZ_ADMIN_ROLE:-admin}
      AUTHZ_BOOTSTRAP_ADMIN_SUB: ${AUTHZ_BOOTSTRAP_ADMIN_SUB:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment.name=lab
    ports:
      # Host 9303 → container 9300 (the app binds + healthchecks 9300 internally).
      # The lab tenant-router already publishes host 9300 for its debug API, so the
      # authoring API is mapped to a distinct host port to avoid the collision.
      - "9303:9300"   # admin authoring API + /healthz (container :9300)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9300/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  # Projects routing-plane membership changes into the identity Profile store: it
  # LISTENs on the routing `routing_membership_changes` NOTIFY channel, re-reads the
  # source of record, and read-merge-writes Profile.memberships (the sidecar then
  # refreshes via the identity change feed). In this lab both planes share one
  # Postgres, so ROUTING_PG_RO_URL points at the same server; in prod it is a
  # separate, read-only routing connection.
  membership-sync:
    build:
      context: ./identity-rs
      target: membership-sync
    container_name: zitadel-lab-membership-sync
    restart: unless-stopped
    environment:
      PROFILE_PG_URL: postgres://postgres:postgres@postgres:5432/identitydb
      ROUTING_PG_RO_URL: postgres://postgres:postgres@postgres:5432/routing
      MEMBERSHIP_BACKSTOP_INTERVAL: "30"   # ~600 in prod; short here to observe
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment.name=lab
    depends_on:
      postgres:
        condition: service_healthy

  # --- edge path: Envoy (tenant routing -> jwt_authn -> enrichment) -> pools --
  # Backend pools are a SMALL, FINITE set (RFC C15 / decision 13). The routing
  # plane selects one via x-route-pool; the data plane forwards. In the lab the
  # finite pools collapse onto two whoami instances (application/checkout/assets
  # -> backend, api -> backend-api) — the pool-SELECTION mechanism is what's
  # demonstrated, not per-tenant clusters.
  # edge-origin-trust: the pool backends consume the trusted x-workspace-*/
  # x-user-*/x-identity-contract header family, so they live ONLY on the
  # internal `edge-backend` network, shared exclusively with the edge. No other
  # container (and no published port) can deliver a request bearing forged
  # trusted headers to them — the lab twin of the Helm charts' backend-origin
  # NetworkPolicy. The e2e suite probes this with a direct-to-backend request
  # from the default network and expects refusal.
  backend:
    image: traefik/whoami:latest
    container_name: zitadel-lab-backend
    command: ["--port", "80", "--name", "backend-application"]
    restart: unless-stopped
    networks:
      - edge-backend

  backend-api:
    image: traefik/whoami:latest
    container_name: zitadel-lab-backend-api
    command: ["--port", "80", "--name", "backend-api"]
    restart: unless-stopped
    networks:
      - edge-backend

  # --- routing plane: tenant resolution (host -> tenant -> pool) --------------
  # The routing-plane twin of the identity sidecar: same Resolution Engine
  # pattern (bounded L1 cache -> optional shared L2 -> authoritative store,
  # coalesced miss-loads) over a different key/value. Authoritative store is the
  # lab's existing Postgres (a dedicated `routing` schema; RFC decision 14);
  # freshness is control-plane LISTEN/NOTIFY invalidation (C16); Redis is the
  # OPTIONAL shared L2 (decision 9).
  redis:
    image: redis:7-alpine
    container_name: zitadel-lab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: ./routing-rs
      target: control-plane
    container_name: zitadel-lab-control-plane
    restart: unless-stopped
    environment:
      ROUTING_PG_URL: postgres://postgres:postgres@postgres:5432/routing
      # C16 fail-closed guard, satisfied WITH AUTH ENABLED — production parity,
      # NOT CONTROL_AUTH_DISABLED: the e2e release gate runs against this stack,
      # and validating against an auth-disabled control plane would give false
      # confidence. The default is a documented lab credential (this file is the
      # deliberately-insecure loopback lab — same posture as Password1! above);
      # override via the CONTROL_AUTH_TOKEN env for anything beyond loopback.
      CONTROL_AUTH_TOKEN: ${CONTROL_AUTH_TOKEN:-zitadel-lab-dev-token}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment.name=lab
    ports:
      - "9400:9400"   # admin API (domains/tenants) + healthz
      - "9401:9401"   # ops: /metrics + /healthz (scraped by Prometheus)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9400/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  tenant-router:
    build:
      context: ./routing-rs
      target: tenant-router
    container_name: zitadel-lab-tenant-router
    restart: unless-stopped
    environment:
      ROUTING_PG_URL: postgres://postgres:postgres@postgres:5432/routing
      REDIS_URL: redis://redis:6379
      ROUTING_CACHE_TTL: ${ROUTER_CACHE_TTL:-600}
      # first-party-telemetry: the ONE telemetry address (OTLP/gRPC to the collector).
      # Unset would disable export and log to stdout exactly as before.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment.name=lab
    ports:
      - "9300:9300"   # resolve debug API + healthz
      - "9302:9302"   # metrics
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9300/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-plane:
        condition: service_healthy

  # One-shot: seed a baseline tenant + verified domains via the control plane so
  # the lab is end-to-end without manual steps (RFC C13). Crucially it verifies
  # `localhost` -> tenant `acme`, so the identity-plane demos (Host: localhost)
  # keep working now that tenant routing runs first (C17) and rejects unknown
  # hosts (C18). Also seeds wildcard + an unverified domain for the routing demos.
  routing-seed:
    image: curlimages/curl:latest
    container_name: zitadel-lab-routing-seed
    restart: "no"
    environment:
      # Same lab default as the control-plane service — the admin API now runs
      # with auth ENABLED (production parity), so the seed must present it.
      CONTROL_AUTH_TOKEN: ${CONTROL_AUTH_TOKEN:-zitadel-lab-dev-token}
    depends_on:
      control-plane:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - >-
        until curl -sf http://control-plane:9400/healthz >/dev/null; do echo 'waiting for control-plane'; sleep 2; done;
        H='-H content-type:application/json';
        A="authorization: Bearer $$CONTROL_AUTH_TOKEN";
        curl -sf $$H -H "$$A" -X POST http://control-plane:9400/tenants -d '{"tenant_id":"acme","plan":"pro","target_pool":"application","features":["beta"]}';
        curl -sf $$H -H "$$A" -X POST http://control-plane:9400/tenants -d '{"tenant_id":"globex","plan":"enterprise","target_pool":"api"}';
        curl -sf $$H -H "$$A" -X POST http://control-plane:9400/domains -d '{"domain":"localhost","tenant_id":"acme","verified":true}';
        curl -sf $$H -H "$$A" -X POST http://control-plane:9400/domains -d '{"domain":"app.acme.test","tenant_id":"acme","verified":true}';
        curl -sf $$H -H "$$A" -X POST http://control-plane:9400/domains -d '{"domain":"acme.test","tenant_id":"acme","wildcard":true,"verified":true}';
        curl -sf $$H -H "$$A" -X POST http://control-plane:9400/domains -d '{"domain":"api.globex.test","tenant_id":"globex","verified":true}';
        curl -sf $$H -H "$$A" -X POST http://control-plane:9400/domains -d '{"domain":"unverified.test","tenant_id":"acme","verified":false}';
        echo; echo 'routing seed complete'

  # One-shot lab companion to routing-seed: the control plane (correctly,
  # fail-closed) NEVER honors an inline `verified:true` — routing verification
  # is granted only by the DNS ownership-proof flow (declare → TXT → verify),
  # which `localhost`/`*.test` can never pass. The lab therefore flips its
  # fixture domains verified DIRECTLY in the store (the same trust position as
  # the proof system's own writer) and emits the invalidation NOTIFY the
  # control plane would have, so resolvers converge. `unverified.test` stays
  # unverified on purpose (the negative fixture for C18).
  routing-verify-seed:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: zitadel-lab-routing-verify-seed
    restart: "no"
    environment:
      PGPASSWORD: postgres
    depends_on:
      routing-seed:
        condition: service_completed_successfully
    entrypoint:
      - sh
      - -c
      - >-
        psql -h postgres -U postgres -d routing -v ON_ERROR_STOP=1 -c
        "UPDATE routing.domains SET verified = true
           WHERE domain IN ('localhost','app.acme.test','acme.test','api.globex.test');
         SELECT pg_notify('routing_invalidations', domain)
           FROM routing.domains
          WHERE domain IN ('localhost','app.acme.test','acme.test','api.globex.test');";
        echo 'routing verify seed complete'

  # Identity sidecar (Rust: tonic + envoy-types + sqlx/Postgres + moka). The one
  # Envoy calls. Built from the identity-rs workspace (shares the core crate with
  # authz-admin + membership-sync — one canonical Profile + authz ports). Cache is
  # kept fresh by the seq-cursor LISTEN/NOTIFY change feed (RFC C4). Read + listen
  # only — never creates schema.
  identity-sidecar-rs:
    build:
      context: ./identity-rs
      target: sidecar
    container_name: zitadel-lab-sidecar-rs
    restart: unless-stopped
    environment:
      PROFILE_PG_URL: postgres://postgres:postgres@postgres:5432/identitydb
      CACHE_TTL_SECONDS: ${SIDECAR_CACHE_TTL:-43200}
      READINESS_DELAY_SECONDS: ${SIDECAR_READINESS_DELAY:-0}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment.name=lab
    ports:
      - "9201:9200"   # sidecar profile API
      - "9202:9202"   # metrics (protobuf/native-histogram exposition)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9200/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  envoy:
    # v1.34 confirmed for N6 tracing: the native OTel tracer
    # (envoy.tracers.opentelemetry), early_header_mutation_extensions, and
    # tracing.spawn_upstream_span are all stable in this line. Bump minor
    # versions deliberately — re-verify span export (the OTel tracer is still
    # flagged work-in-progress upstream; see edge-rooted-tracing design.md).
    image: envoyproxy/envoy:${ENVOY_VERSION:-v1.34.14@sha256:cfc0678bc03cca19cbb031688acb31d510bff501ff97e163026a375fe0515d69}
    container_name: zitadel-lab-envoy
    restart: unless-stopped
    command:
      - -c
      - /etc/envoy/envoy.yaml
      - --log-level
      - info
      # N6 head-sampling knob, env-driven without templating the mounted
      # config: the runtime key tracing.random_sampling overrides the
      # stanza's random_sampling default. Whole percent, 0-100 (an integer
      # runtime value uses legacy percent semantics — verified empirically:
      # 50 => ~50% sampled). 100 = trace everything (lab default).
      - --config-yaml
      - '{"layered_runtime":{"layers":[{"name":"tracing-env","static_layer":{"tracing":{"random_sampling":${TRACE_SAMPLING_PCT:-100}}}}]}}'
    volumes:
      - ./edge/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "10000:10000"   # edge listener
      - "9901:9901"     # envoy admin
    networks:
      # Default network for ZITADEL/sidecar/router/JWKS + the internal
      # edge-backend network — the edge is the ONLY bridge to the backends
      # (edge-origin-trust).
      - default
      - edge-backend
    # Health-gated startup order so a clean `docker compose up` comes up
    # deterministically (the authenticated e2e depends on it): both ext_proc
    # stages and the backends must be serving before the edge accepts traffic.
    depends_on:
      zitadel:
        condition: service_healthy
      identity-sidecar-rs:
        condition: service_healthy
      tenant-router:
        condition: service_healthy
      backend:
        condition: service_started
      backend-api:
        condition: service_started

  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: zitadel-lab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zitadel"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
      # identity-data-residency: create the nexus-owned databases (identitydb,
      # routing) at first init, separate from ZITADEL's `zitadel` database.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro

  # --- observability: Prometheus scrapes all /metrics; Grafana dashboards ------
  prometheus:
    # PINNED (box-telemetry-contract): the native OTLP receiver
    # (--web.enable-otlp-receiver, /api/v1/otlp) is version-gated — stable in
    # the Prometheus 3 line, verified on this LTS version. Bump deliberately,
    # re-running the telemetry smoke checks.
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.5.0}
    container_name: zitadel-lab-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=native-histograms
      # Push-path metrics ingestion (box-telemetry-contract): the collector
      # forwards boxes' OTLP metrics here; scrape jobs are unaffected.
      - --web.enable-otlp-receiver
      # Retention as an OWNED budget (telemetry-cost-controls): metrics are the
      # cheapest signal by volume, so they keep the longest window — an explicit,
      # stated value, not the implicit 15d default. Prometheus reclaims TSDB
      # blocks past this window. Long-term/downsampled metric retention
      # (Mimir/Thanos) is the deferred successor change.
      - --storage.tsdb.retention.time=${PROM_RETENTION:-15d}
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: zitadel-lab-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

  # --- telemetry: boxes/edge --OTLP--> otel-collector --> stores <-- grafana --
  # The collector is the SINGLE telemetry egress point for ALL signals (N6
  # shipped traces; box-telemetry-contract added metrics + logs): producers
  # know only the collector; only the collector's config knows Tempo/
  # Prometheus/Loki. Producers deliberately do NOT depends_on the collector —
  # telemetry is fail-open (an outage must never affect request handling), and
  # the boxes' bring-up-order contract stays flexible.
  otel-collector:
    # CONTRIB distribution, PINNED (telemetry-cost-controls): the metric
    # cardinality guard uses the `transform` processor, which lives in contrib
    # (not core). This is the deliberate core→contrib graduation the
    # box-telemetry-contract design foresaw ("the contrib switch rides a change
    # that needs it") — here, cost control. Image provenance changed on purpose
    # and is pinned; bump deliberately and re-run the cost-ceiling checks.
    image: otel/opentelemetry-collector-contrib:${OTELCOL_VERSION:-0.135.0}
    container_name: zitadel-lab-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/otel-collector.yaml"]
    environment:
      # The ONLY place any store's address enters the system (single-egress
      # rule); the collector config reads these via ${env:...}. Fanning out or
      # swapping a store is an edit here — producers never change.
      TEMPO_OTLP_ENDPOINT: ${TEMPO_OTLP_ENDPOINT:-tempo:4317}
      LOKI_OTLP_ENDPOINT: ${LOKI_OTLP_ENDPOINT:-http://loki:3100/otlp}
      PROMETHEUS_OTLP_ENDPOINT: ${PROMETHEUS_OTLP_ENDPOINT:-http://prometheus:9090/api/v1/otlp}
    volumes:
      - ./monitoring/otel-collector/otel-collector.yaml:/etc/otelcol/otel-collector.yaml:ro
    ports:
      # OTLP on loopback for host-side test payloads and the synthetic-box
      # compliance checks; in-network producers use otel-collector:4317/4318
      # (not published).
      - "127.0.0.1:${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "127.0.0.1:${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      # Collector self-telemetry (cost-ceiling observability): its own pipeline
      # counters — accepted/refused/dropped points, memory_limiter engagement —
      # exposed for Prometheus to scrape (see prometheus.yml). An engaged ceiling
      # is observable here, never a silent gap.
      - "127.0.0.1:${OTEL_COLLECTOR_METRICS_PORT:-8888}:8888"
    depends_on:
      - tempo
      - loki
      - prometheus

  # Object-storage tier (telemetry-cost-controls): SeaweedFS S3 gateway — the
  # clean-checkout stand-in for cloud object storage (S3/GCS in prod). Apache
  # 2.0, production-mature; the drop-in MinIO replacement after MinIO Community
  # Edition was archived (Feb 2026). Written ONLY by the stores (Tempo blocks,
  # Loki chunks) — no producer knows this address. `server -s3` runs
  # master+volume+filer+S3 in one process (single-node lab shape). Prod points
  # Tempo/Loki at real object storage via the SAME env (TELEMETRY_S3_*), no
  # config edit; this emulator is a lab-only service.
  seaweedfs:
    image: chrislusf/seaweedfs:${SEAWEEDFS_VERSION:-3.80}
    container_name: zitadel-lab-seaweedfs
    restart: unless-stopped
    command:
      - server
      - -dir=/data
      - -s3
      - -s3.config=/etc/seaweedfs/s3.json
      - -s3.port=8333
    volumes:
      - ./monitoring/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
      - seaweedfs-data:/data:rw
    ports:
      # S3 endpoint on loopback for operator/debug (aws --endpoint-url); the
      # stores reach it in-network (seaweedfs:8333).
      - "127.0.0.1:${SEAWEEDFS_S3_PORT:-8333}:8333"

  # One-shot: create the per-signal buckets the stores expect (Tempo and Loki do
  # NOT auto-create buckets). Waits for the S3 API, makes the buckets
  # idempotently, exits. Tempo/Loki gate on its success so a clean `docker
  # compose up` comes up deterministically on the object tier. Mirrors the
  # routing-seed one-shot pattern above.
  seaweedfs-seed:
    image: amazon/aws-cli:${AWSCLI_VERSION:-2.17.0}
    container_name: zitadel-lab-seaweedfs-seed
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${TELEMETRY_S3_ACCESS_KEY:-nexuslab}
      AWS_SECRET_ACCESS_KEY: ${TELEMETRY_S3_SECRET_KEY:-nexuslabsecret}
      AWS_REGION: ${TELEMETRY_S3_REGION:-us-east-1}
    depends_on:
      - seaweedfs
    entrypoint:
      - /bin/sh
      - -c
      - >-
        until aws --endpoint-url http://seaweedfs:8333 s3 ls >/dev/null 2>&1; do echo 'waiting for seaweedfs s3'; sleep 2; done;
        aws --endpoint-url http://seaweedfs:8333 s3 mb "s3://${TEMPO_S3_BUCKET:-tempo-traces}" 2>/dev/null || true;
        aws --endpoint-url http://seaweedfs:8333 s3 mb "s3://${LOKI_S3_BUCKET:-loki-chunks}" 2>/dev/null || true;
        echo 'seaweedfs bucket seed complete'

  # Log store (box-telemetry-contract): Loki, written ONLY by the collector
  # (native OTLP), read ONLY by Grafana. PINNED: native OTLP ingestion +
  # structured metadata are version-gated (Loki 3.x) — bump deliberately,
  # re-running the telemetry smoke checks. Storage backend is the object tier
  # above (telemetry-cost-controls); -config.expand-env resolves TELEMETRY_S3_*.
  loki:
    image: grafana/loki:${LOKI_VERSION:-3.5.3}
    container_name: zitadel-lab-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yaml", "-config.expand-env=true"]
    environment:
      TELEMETRY_S3_ENDPOINT: ${TELEMETRY_S3_ENDPOINT:-seaweedfs:8333}
      TELEMETRY_S3_REGION: ${TELEMETRY_S3_REGION:-us-east-1}
      TELEMETRY_S3_ACCESS_KEY: ${TELEMETRY_S3_ACCESS_KEY:-nexuslab}
      TELEMETRY_S3_SECRET_KEY: ${TELEMETRY_S3_SECRET_KEY:-nexuslabsecret}
      TELEMETRY_S3_INSECURE: ${TELEMETRY_S3_INSECURE:-true}
      LOKI_S3_BUCKET: ${LOKI_S3_BUCKET:-loki-chunks}
      LOKI_RETENTION_PERIOD: ${LOKI_RETENTION_PERIOD:-168h}
      # Log volume/noise ceiling (telemetry-cost-controls) — lab-sized defaults;
      # raise for real traffic. See monitoring/loki/loki.yaml limits_config.
      LOKI_INGESTION_RATE_MB: ${LOKI_INGESTION_RATE_MB:-4}
      LOKI_INGESTION_BURST_MB: ${LOKI_INGESTION_BURST_MB:-6}
      LOKI_PER_STREAM_RATE: ${LOKI_PER_STREAM_RATE:-3MB}
      LOKI_PER_STREAM_BURST: ${LOKI_PER_STREAM_BURST:-5MB}
      LOKI_MAX_STREAMS: ${LOKI_MAX_STREAMS:-5000}
      LOKI_MAX_LABEL_NAMES: ${LOKI_MAX_LABEL_NAMES:-15}
      LOKI_MAX_LINE_SIZE: ${LOKI_MAX_LINE_SIZE:-256KB}
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml:ro
      # Local scratch only (WAL/compactor working dir); chunks + index live in
      # object storage now, not this volume.
      - loki-data:/loki:rw
    ports:
      # Query API on loopback for operator/debug queries; Grafana reaches it
      # in-network (loki:3100).
      - "127.0.0.1:${LOKI_HTTP_PORT:-3100}:3100"
    depends_on:
      seaweedfs-seed:
        condition: service_completed_successfully

  tempo:
    image: grafana/tempo:latest
    container_name: zitadel-lab-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml", "-config.expand-env=true"]
    environment:
      TELEMETRY_S3_ENDPOINT: ${TELEMETRY_S3_ENDPOINT:-seaweedfs:8333}
      TELEMETRY_S3_REGION: ${TELEMETRY_S3_REGION:-us-east-1}
      TELEMETRY_S3_ACCESS_KEY: ${TELEMETRY_S3_ACCESS_KEY:-nexuslab}
      TELEMETRY_S3_SECRET_KEY: ${TELEMETRY_S3_SECRET_KEY:-nexuslabsecret}
      TEMPO_S3_BUCKET: ${TEMPO_S3_BUCKET:-tempo-traces}
      TEMPO_BLOCK_RETENTION: ${TEMPO_BLOCK_RETENTION:-48h}
      # Lab: plaintext http to the in-network emulator. Prod over https sets
      # TELEMETRY_S3_INSECURE=false.
      TELEMETRY_S3_INSECURE: ${TELEMETRY_S3_INSECURE:-true}
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      # Local scratch only (WAL); trace blocks live in object storage now.
      - tempo-data:/var/tempo:rw
    ports:
      # Query API on loopback for operator/debug queries; Grafana reaches it
      # in-network (tempo:3200).
      - "127.0.0.1:${TEMPO_HTTP_PORT:-3200}:3200"
    depends_on:
      seaweedfs-seed:
        condition: service_completed_successfully

networks:
  # edge-origin-trust: the internal network that makes "backends accept requests
  # only via the edge" a real, probe-able control in the lab (no host published
  # ports, no default-network path — only the edge bridges in). internal: true
  # additionally blocks any outbound path; whoami needs none.
  edge-backend:
    internal: true

volumes:
  postgres-data:
  tempo-data:
  loki-data:
  # Object-storage tier (telemetry-cost-controls): the emulator's backing store.
  # Lab durability is best-effort (single node); prod relies on the cloud store's
  # durability. No test depends on this surviving a restart.
  seaweedfs-data:
