# Sloth SLO spec — identity-sidecar (change: slo-burn-rate-policy).
#
# Sloth compiles this into SLI recording rules + multi-window multi-burn-rate (MWMB)
# alert rules (design decision: Adopt Sloth). Regenerate with `monitoring/slo/generate.sh`
# and commit the output; NEVER hand-edit the generated rules file.
#
# Objectives, the 100ms latency threshold, and the good/bad classification are the
# SRE-tunable knobs (task 1.3). Per-environment scoping rides on the promoted
# `deployment_environment_name` label.
version: "prometheus/v1"
service: "identity-sidecar"
labels:
  plane: identity
slos:
  - name: "availability"
    objective: 99.9
    description: >-
      Served fraction of identity-sidecar ext_proc enrichments, per deployment
      environment. BAD = result="not_ready" (warming 503) OR result="unavailable_closed"
      (routing store unavailable for an authenticated request -> fail-closed 503). GOOD =
      enrichment success, forbidden (403), not_found (404), and unavailable_open (served
      fail-open) — all correct, served outcomes.
    sli:
      events:
        error_query: sum by (deployment_environment_name) (rate(sidecar_ext_proc_requests_total{result=~"not_ready|unavailable_closed"}[{{.window}}]))
        # Min-sample floor (N15): gate the ratio on >=60 samples in the window so idle
        # traffic can't page on noise. 60 = the repo's existing bar (enrichMinRps 0.2 ≈
        # 60 req/5m), applied per-window via increase(); below it the denominator is empty
        # so the SLI (and every burn-rate alert built on it) yields no series.
        total_query: (sum by (deployment_environment_name) (rate(sidecar_ext_proc_requests_total[{{.window}}]))) and (sum by (deployment_environment_name) (increase(sidecar_ext_proc_requests_total[{{.window}}])) > 60)
    alerting:
      name: IdentitySidecarAvailability
      labels:
        plane: identity
      annotations:
        summary: "Identity-sidecar availability error budget is burning"
      page_alert:
        labels:
          severity: page
      ticket_alert:
        labels:
          severity: ticket
  - name: "latency"
    objective: 99.0
    description: >-
      Fraction of SUCCESSFUL identity-sidecar enrichments (served, non-5xx outcomes)
      completed under 100ms, per deployment environment. Uses the outcome-aware duration
      histogram so warming/fail-closed 503 paths do not count against the latency budget.
    sli:
      events:
        error_query: |
          (
            sum by (deployment_environment_name) (rate(sidecar_ext_proc_duration_seconds_count{result!~"not_ready|unavailable_closed"}[{{.window}}]))
            -
            sum by (deployment_environment_name) (rate(sidecar_ext_proc_duration_seconds_bucket{result!~"not_ready|unavailable_closed",le="0.1"}[{{.window}}]))
          )
        # Min-sample floor (N15): see the availability SLO above. Denominator is the
        # successful-enrichment count, so the floor gates on served-request volume per window.
        total_query: (sum by (deployment_environment_name) (rate(sidecar_ext_proc_duration_seconds_count{result!~"not_ready|unavailable_closed"}[{{.window}}]))) and (sum by (deployment_environment_name) (increase(sidecar_ext_proc_duration_seconds_count{result!~"not_ready|unavailable_closed"}[{{.window}}])) > 60)
    alerting:
      name: IdentitySidecarLatency
      labels:
        plane: identity
      annotations:
        summary: "Identity-sidecar latency error budget is burning"
      page_alert:
        labels:
          severity: page
      ticket_alert:
        labels:
          severity: ticket
