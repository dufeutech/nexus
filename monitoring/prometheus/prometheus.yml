global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Native OTLP ingestion (box-telemetry-contract): boxes PUSH metrics via the
# OTel Collector to /api/v1/otlp — no per-box scrape coordination. Enabled by
# the --web.enable-otlp-receiver flag in the compose service. The scrape jobs
# below (first-party services) are untouched; both paths coexist until the
# first-party services join the contract (Change B).
otlp:
  # OTLP resource attributes to promote to first-class labels so one identity
  # (service name/version/environment) selects a service across signals; the
  # full resource lands in target_info regardless.
  promote_resource_attributes:
    - service.version
    - deployment.environment.name
    - deployment.environment

storage:
  tsdb:
    # Pushed OTLP samples arrive unordered across producers/replicas; a small
    # out-of-order window is the documented companion to the OTLP receiver.
    out_of_order_time_window: 30m

# first-party-telemetry (Change B): the first-party Rust services (tenant-router,
# control-plane, identity-sidecar, authz-admin, membership-sync) NO
# LONGER expose scrape endpoints — they PUSH OTLP metrics through the collector to
# Prometheus's native OTLP receiver (see the `otlp:` block above). Their scrape jobs
# were retired here. Only Envoy (its own /stats) and Prometheus self-scrape remain.
scrape_configs:
  - job_name: envoy
    metrics_path: /stats/prometheus
    static_configs:
      - targets: ["envoy:9901"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Cost-ceiling observability (telemetry-cost-controls): the collector's own
  # self-telemetry (:8888) — accepted/refused/dropped points per processor,
  # memory_limiter engagement, exporter send failures. This is where an engaged
  # egress ceiling is visible: otelcol_processor_refused_metric_points rising =
  # the volume/memory guard is dropping load; a flat metric-series count under a
  # cardinality bomb = the transform guard is collapsing attributes.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # Log-store ceiling observability: Loki reports refused/discarded log volume
  # via loki_discarded_samples_total{reason=...} when limits_config engages — so
  # a bounded log flood is a positive, queryable signal, never a silent gap.
  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
