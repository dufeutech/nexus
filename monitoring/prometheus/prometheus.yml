global:
  scrape_interval: 5s
  evaluation_interval: 5s

# Native OTLP ingestion (box-telemetry-contract): boxes PUSH metrics via the
# OTel Collector to /api/v1/otlp — no per-box scrape coordination. Enabled by
# the --web.enable-otlp-receiver flag in the compose service. The scrape jobs
# below (first-party services) are untouched; both paths coexist until the
# first-party services join the contract (Change B).
otlp:
  # OTLP resource attributes to promote to first-class labels so one identity
  # (service name/version/environment) selects a service across signals; the
  # full resource lands in target_info regardless.
  promote_resource_attributes:
    - service.version
    - deployment.environment.name
    - deployment.environment

storage:
  tsdb:
    # Pushed OTLP samples arrive unordered across producers/replicas; a small
    # out-of-order window is the documented companion to the OTLP receiver.
    out_of_order_time_window: 30m

scrape_configs:
  - job_name: identity-sidecar-rs
    # Prefer protobuf so native histograms are scraped (they don't exist in text).
    scrape_protocols:
      ["PrometheusProto", "OpenMetricsText1.0.0", "PrometheusText0.0.4"]
    static_configs:
      - targets: ["identity-sidecar-rs:9202"]

  - job_name: envoy
    metrics_path: /stats/prometheus
    static_configs:
      - targets: ["envoy:9901"]

  - job_name: sync-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["sync-worker:8080"]

  - job_name: reconciler
    static_configs:
      - targets: ["reconciler:9000"]

  # --- routing plane ---
  - job_name: tenant-router
    static_configs:
      - targets: ["tenant-router:9302"]

  - job_name: control-plane
    metrics_path: /metrics
    # Metrics are on the ops port :9401, kept off the admin API port :9400.
    static_configs:
      - targets: ["control-plane:9401"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
