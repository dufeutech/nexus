# OpenTelemetry Collector — the SINGLE telemetry egress point (N6 traces;
# box-telemetry-contract extends it to ALL signals).
#
# Every telemetry producer (the Envoy edge, any box, Rust services in a later
# phase) exports OTLP — traces, metrics, AND logs — to THIS collector and knows
# nothing else. Only this file knows any store's address, so adding/changing/
# fanning-out destinations (customer SIEM, vendor APM, a second store) is an
# edit HERE — never a producer config change. Do not point any producer
# directly at Tempo, Loki, or Prometheus.
#
# Distribution note: this config runs on the CONTRIB distribution
# (telemetry-cost-controls) — the metric cardinality guard below uses the
# `transform` processor, which is contrib-only (`filter` is in core, but
# collapsing high-cardinality attributes needs `transform`). This is the
# deliberate core→contrib graduation the box-telemetry-contract design foresaw
# ("the contrib switch rides a change that needs it"): here, the cost ceiling.
# The image tag is pinned in compose/helm.
#
# COST CEILING (telemetry-cost-controls): this single egress is where any one
# producer's telemetry cost is bounded — a misbehaving box degrades ITS OWN
# fidelity (its high-cardinality attrs collapse; its excess volume is refused),
# never the shared bill, the stores, or another producer. Enforcement lives here
# and store-side (Loki limits_config); producers are unchanged. The head-sampling
# decision at the edge remains the trace cost ceiling — this config adds no
# stateful trace-buffering / tail-sampling stage (an explicit non-goal).

receivers:
  otlp:
    # ONE receiver for all three signals — the single collection endpoint the
    # box telemetry contract promises producers.
    protocols:
      grpc:
        # Envoy's OTel tracer and SDK gRPC exporters land here (in-network :4317).
        endpoint: 0.0.0.0:4317
      http:
        # OTLP/HTTP for host-side test payloads and http-exporting producers.
        endpoint: 0.0.0.0:4318

  prometheus:
    # The few remaining PULL targets, folded into the single egress (change:
    # victoriametrics-delivery — the operator-independent replacement for the retired
    # standalone Prometheus's scrape jobs): Envoy's admin stats (outside the box
    # contract), the collector's own self-telemetry, and Loki's limit counters.
    # Everything else PUSHES OTLP. These scraped series must NOT pass the cardinality
    # collapse below (they carry Envoy's edge labels the edge rules key on), so they
    # ride a separate pipeline.
    config:
      scrape_configs:
        - job_name: envoy
          metrics_path: /stats/prometheus
          scrape_interval: 5s
          static_configs:
            - targets: ["envoy:9901"]
        - job_name: otel-collector
          scrape_interval: 5s
          static_configs:
            - targets: ["localhost:8888"]
        - job_name: loki
          scrape_interval: 5s
          static_configs:
            - targets: ["loki:3100"]

processors:
  # Self-protection (telemetry-cost-controls): the collector must not OOM under a
  # volume flood — it soft-limits memory, refusing incoming data (and applying
  # back-pressure to producers, who buffer/drop fail-open) rather than dying.
  # Refusals are counted in the collector's self-telemetry (otelcol_processor_*),
  # so an engaged ceiling is observable. MUST be the FIRST processor in every
  # pipeline so it sees data before anything buffers it.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # Metric cardinality guard (telemetry-cost-controls): collapse any metric
  # datapoint's attributes down to an ALLOW-LIST — the identity set + RED labels.
  # A producer that emits an unbounded/high-cardinality attribute (a user id, a
  # raw path, a request id) has that dimension DROPPED here, before Prometheus,
  # so total series stay within budget; other producers are unaffected. The
  # allow-list is the single place this policy lives — start permissive, tighten
  # with evidence (a mistake is a config edit here, never a producer redeploy).
  # `transform`/`keep_keys` is the mature choice over the alpha
  # `cardinality_guardian` processor (see design decision).
  transform/cardinality:
    error_mode: ignore
    # `result`, `op`, `tier` are the LOW-cardinality nexus RED dimensions the
    # first-party dashboards + PrometheusRules key on (ext_proc outcome, admin
    # mutation kind, cache tier — a handful of values each). They MUST stay on the
    # allow-list or `sum by (result)` / an "authz gate 403 spike" rule collapses to a
    # single label-less series. A production collector consuming nexus's shipped rules
    # must keep these too.
    metric_statements:
      - context: datapoint
        statements:
          - >-
            keep_keys(attributes, [
              "service.name", "service.version", "service.namespace",
              "service.instance.id",
              "deployment.environment", "deployment.environment.name",
              "http.request.method", "http.response.status_code",
              "http.route", "rpc.grpc.status_code", "rpc.method",
              "rpc.service", "otel.scope.name", "error.type",
              "result", "op", "tier"
            ])

  # Batch before export — standard back-pressure hygiene for the OTLP exporters.
  batch: {}

exporters:
  otlp/tempo:
    # The ONE place the trace store's address is known (single-egress rule).
    # Set via the compose service env (TEMPO_OTLP_ENDPOINT), not a literal.
    endpoint: ${env:TEMPO_OTLP_ENDPOINT}
    tls:
      # Lab/compose-internal hop; the deliberately-insecure lab posture.
      insecure: true

  otlphttp/loki:
    # Log store: Loki 3.x native OTLP ingestion (Grafana's recommended path —
    # keeps this collector on the core distribution). The exporter appends
    # /v1/logs, so the env value is the base, e.g. http://loki:3100/otlp.
    endpoint: ${env:LOKI_OTLP_ENDPOINT}
    tls:
      insecure: true

  otlphttp/victoriametrics:
    # Metrics store: VictoriaMetrics native OTLP ingestion (push path — a new box
    # needs zero scrape coordination). The exporter appends /v1/metrics, so the env
    # value is the base, e.g. http://victoria-metrics:8428/opentelemetry ->
    # /opentelemetry/v1/metrics (change: victoriametrics-delivery).
    endpoint: ${env:VM_OTLP_ENDPOINT}
    tls:
      insecure: true

service:
  # Cost-ceiling observability (telemetry-cost-controls): the collector exports
  # its OWN pipeline metrics — accepted/refused/dropped points per processor,
  # memory_limiter engagement, exporter send failures — on a Prometheus endpoint
  # (:8888), scraped by Prometheus (see the `otel-collector` job in
  # prometheus.yml). This is what makes an engaged ceiling observable rather than
  # a silent gap: a cardinality collapse shows as flat metric-series growth, a
  # refused flood shows as rising otelcol_processor_refused_* .
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    # Pipelines are independent on purpose: a slow/failed store for one signal
    # never blocks another, and each signal stays fail-open end to end.
    # memory_limiter is FIRST in every pipeline (self-protection before buffering).
    traces:
      receivers: [otlp]
      # No tail-sampling / stateful trace stage here: trace cost stays governed
      # by the edge head-sampling decision (explicit non-goal). memory_limiter +
      # batch only.
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]
    metrics/push:
      # Boxes' OTLP metrics push: cardinality guard sits between the limiter and
      # the batcher: collapse high-cardinality attributes before export to VM.
      receivers: [otlp]
      processors: [memory_limiter, transform/cardinality, batch]
      exporters: [otlphttp/victoriametrics]
    metrics/scrape:
      # Pulled targets (Envoy admin, collector self, Loki): NO cardinality collapse —
      # they carry the low-cardinality Envoy edge labels the edge rules key on.
      receivers: [prometheus]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/victoriametrics]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
