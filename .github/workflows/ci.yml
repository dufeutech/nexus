name: CI

# Lint + test on every push and PR (plus a manual Run workflow button).
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-test:
    name: cargo test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The sidecar's native-histogram metrics need protoc to build; the
          # routing workspace does not (envoy-types ships pre-generated code).
          - { workspace: identity-rs, protoc: true }
          - { workspace: routing-rs,  protoc: false }
    # Throwaway Postgres so the store integration tests actually run — they
    # silently skip when STORE_PG_TEST_URL is unset, which made "integration
    # coverage" skipped-green (production-readiness-gate D6). Both workspaces
    # create their own schema (identity / routing) inside this one database.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nexus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      STORE_PG_TEST_URL: postgres://postgres:postgres@localhost:5432/nexus_test
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        if: ${{ matrix.protoc }}
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace }}

      # --locked: build/test against the committed Cargo.lock so CI is
      # reproducible and fails if the lockfile is stale (it is committed).
      - name: Test
        working-directory: ${{ matrix.workspace }}
        run: cargo test --workspace --all-targets --locked

  clippy:
    name: clippy (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { workspace: identity-rs, protoc: true }
          - { workspace: routing-rs,  protoc: false }
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        if: ${{ matrix.protoc }}
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace }}

      # The workspaces set lint levels to `deny` in [workspace.lints], with a
      # deliberate "burn-down" subset held at `warn`. Plain clippy therefore
      # already fails on any deny-level violation. We intentionally do NOT pass
      # `-D warnings` — that would promote the burn-down warnings to errors and
      # defeat the staged cleanup.
      - name: Clippy
        working-directory: ${{ matrix.workspace }}
        run: cargo clippy --all-targets --locked

  cargo-deny:
    name: cargo-deny (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [identity-rs, routing-rs]
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      # Enforces the root deny.toml: advisories (RUSTSEC), license allow-list,
      # banned crates, and source allow-list. --locked checks the committed lock.
      - name: Deny check
        working-directory: ${{ matrix.workspace }}
        run: cargo deny --locked check

  helm-lint:
    name: helm lint + template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/helm
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      # Each chart is rendered with the minimum required values so lint/template
      # actually exercises the helpers (postgres.url, the pg secret, pools, etc.).
      - name: Lint & render identity-plane
        run: |
          # routingPg.url is required whenever membershipSync is enabled (default) and
          # no existingSecret is set — it feeds the read-only routing DB Secret.
          # jwksTls + originEnforcement are fail-closed guards: rendering an
          # identity-enriched edge requires an explicit choice for each
          # (edge-trust-anchor-integrity / edge-origin-trust).
          ARGS="--set postgres.url=postgres://u:p@h:5432/identity --set zitadel.patSecret.value=dummy --set routingPg.url=postgres://u:p@h:5432/routing \
                --set zitadel.jwksTls.enabled=true \
                --set originEnforcement.networkPolicy.enabled=true --set originEnforcement.networkPolicy.backendSelector.app=backend"
          helm lint identity-plane $ARGS
          helm template rel identity-plane $ARGS >/dev/null

      - name: Lint & render routing-plane
        run: |
          # Render both the plain and the opt-in read-split (ROUTING_PG_READ_URL) paths.
          # controlPlane.auth is fail-closed: a token (or auth.enabled=false) is required.
          BASE="--set postgres.url=postgres://u:p@h:5432/routing --set controlPlane.auth.token=ci-dummy"
          helm lint routing-plane $BASE
          helm template rel routing-plane $BASE >/dev/null
          helm template rel routing-plane $BASE --set postgres.readUrl=postgres://u:p@pgbouncer:6432/routing >/dev/null
          # Exercise the auth-disabled path and the broker-only NetworkPolicy helpers.
          helm template rel routing-plane --set postgres.url=postgres://u:p@h:5432/routing --set controlPlane.auth.enabled=false >/dev/null
          helm template rel routing-plane $BASE --set controlPlane.networkPolicy.enabled=true --set 'controlPlane.networkPolicy.allowFrom[0].podSelector.matchLabels.app=broker' >/dev/null

      - name: Lint & render edge-platform (umbrella)
        run: |
          helm dependency update edge-platform
          ARGS="--set identity-plane.postgres.url=postgres://u:p@h:5432/identity \
                --set identity-plane.zitadel.patSecret.value=dummy \
                --set identity-plane.routingPg.url=postgres://u:p@h:5432/routing \
                --set routing-plane.postgres.url=postgres://u:p@h:5432/routing \
                --set routing-plane.controlPlane.auth.token=ci-dummy \
                --set identity-plane.zitadel.jwksTls.enabled=true \
                --set originEnforcement.networkPolicy.enabled=true --set originEnforcement.networkPolicy.backendSelector.app=backend"
          helm lint edge-platform $ARGS
          helm template rel edge-platform $ARGS >/dev/null

      # Fail-closed guard matrix (production-readiness-gate): asserts that a
      # topology missing an origin-enforcement or JWKS-integrity choice REFUSES
      # to render, that valid renders carry the enforcing config (NetworkPolicy,
      # UpstreamTlsContext + CA + SAN pin), that the publicPaths allowlist is the
      # single source of the non-enriched designation, and that the lab issuer
      # does not drift from the compose default (D7).
      - name: Guard assertions (origin trust + JWKS integrity + designation)
        working-directory: .
        run: bash scripts/helm-guards-test.sh

  # Release gate (production-readiness-gate 6.4): boot the reference topology
  # from a CLEAN checkout (no .env, auth ENABLED — production parity) and run
  # every edge e2e suite against it: the anonymous trust-contract assertions,
  # the N4 per-route auth gate (incl. encoded-traversal), and the
  # authenticated-member positive path (real ZITADEL JWT + seeded membership).
  e2e-gate:
    name: e2e release gate (reference stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Boot the reference stack
        run: |
          # World-writable: ZITADEL (container uid 1000) must WRITE the admin
          # PAT into this bind mount; the runner user is uid 1001, and a 755
          # dir makes ZITADEL's first-instance init die mid-flight — after
          # which start-from-init is not crash-idempotent (AlreadyExists on
          # every restart) and the stack can never come up.
          mkdir -p machinekey && chmod 777 machinekey
          # `|| true`: compose's dependency wait can flag a service whose FIRST
          # start attempt fails even though restart: unless-stopped self-heals it
          # (e.g. an IdP init racing its database). The readiness poll below is
          # the real gate — a served request proves the whole health-gated chain
          # (postgres -> zitadel -> sidecar/router -> seed -> envoy) is up.
          docker compose up -d --build || true
          for i in $(seq 1 90); do
            curl -sf -H 'Host: localhost' http://localhost:10000/ >/dev/null && exit 0
            sleep 5
          done
          echo 'edge never became ready'; docker compose ps -a; exit 1

      - name: Anonymous edge e2e (tenancy trust contract)
        run: sh scripts/tenancy-edge-e2e.sh

      - name: Anonymous edge e2e (N4 per-route auth gate + traversal)
        run: sh scripts/n4-e2e.sh

      - name: Authenticated-member e2e (positive scope path)
        run: sh scripts/tenancy-edge-auth-e2e.sh

      - name: Stack logs (on failure)
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --tail 150
