name: CI

# Lint + test on pushes to main and on every PR (plus a manual Run button).
# Pushes are scoped to main so a branch with an open PR is not built twice (once
# for the branch push, once for the PR) — the pull_request event covers branches.
# A feature branch therefore first gets CI when its PR is opened.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-test:
    name: cargo test (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # The sidecar's native-histogram metrics need protoc to build; the
          # routing workspace does not (envoy-types ships pre-generated code).
          - { workspace: identity-rs, protoc: true }
          - { workspace: routing-rs,  protoc: false }
    # Throwaway Postgres so the store integration tests actually run — they
    # silently skip when STORE_PG_TEST_URL is unset, which made "integration
    # coverage" skipped-green (production-readiness-gate D6). Both workspaces
    # create their own schema (identity / routing) inside this one database.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nexus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      STORE_PG_TEST_URL: postgres://postgres:postgres@localhost:5432/nexus_test
    steps:
      - uses: actions/checkout@v5

      - name: Install protoc
        if: ${{ matrix.protoc }}
        run: |
          # Drop the azure-cli/microsoft apt repos that intermittently fail to fetch on
          # GitHub runners (not needed here — protobuf comes from the ubuntu archive), and
          # retry apt-get update so a transient mirror hiccup doesn't flake the build.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
          for i in 1 2 3; do sudo apt-get update && break || { echo "apt-get update retry $i"; sleep 5; }; done
          sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace }}

      # --locked: build/test against the committed Cargo.lock so CI is
      # reproducible and fails if the lockfile is stale (it is committed).
      - name: Test
        working-directory: ${{ matrix.workspace }}
        run: cargo test --workspace --all-targets --locked

  clippy:
    name: clippy (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { workspace: identity-rs, protoc: true }
          - { workspace: routing-rs,  protoc: false }
    steps:
      - uses: actions/checkout@v5

      - name: Install protoc
        if: ${{ matrix.protoc }}
        run: |
          # Drop the azure-cli/microsoft apt repos that intermittently fail to fetch on
          # GitHub runners (not needed here — protobuf comes from the ubuntu archive), and
          # retry apt-get update so a transient mirror hiccup doesn't flake the build.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* || true
          for i in 1 2 3; do sudo apt-get update && break || { echo "apt-get update retry $i"; sleep 5; }; done
          sudo apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.workspace }}

      # The workspaces set lint levels to `deny` in [workspace.lints], with a
      # deliberate "burn-down" subset held at `warn`. Plain clippy therefore
      # already fails on any deny-level violation. We intentionally do NOT pass
      # `-D warnings` — that would promote the burn-down warnings to errors and
      # defeat the staged cleanup.
      - name: Clippy
        working-directory: ${{ matrix.workspace }}
        run: cargo clippy --all-targets --locked

  cargo-deny:
    name: cargo-deny (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [identity-rs, routing-rs]
    steps:
      - uses: actions/checkout@v5

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      # Enforces the root deny.toml: advisories (RUSTSEC), license allow-list,
      # banned crates, and source allow-list. --locked checks the committed lock.
      - name: Deny check
        working-directory: ${{ matrix.workspace }}
        run: cargo deny --locked check

  helm-lint:
    name: helm lint + template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/helm
    steps:
      - uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      # Each chart is rendered with the minimum required values so lint/template
      # actually exercises the helpers (postgres.url, the pg secret, pools, etc.).
      - name: Lint & render identity-plane
        run: |
          # routingPg.url is required whenever membershipSync is enabled (default) and
          # no existingSecret is set — it feeds the read-only routing DB Secret.
          # jwksTls + originEnforcement are fail-closed guards: rendering an
          # identity-enriched edge requires an explicit choice for each
          # (edge-trust-anchor-integrity / edge-origin-trust).
          ARGS="--set postgres.url=postgres://u:p@h:5432/identity --set authzAdmin.adminToken=ci-dummy --set routingPg.url=postgres://u:p@h:5432/routing \
                --set oidc.jwksTls.enabled=true \
                --set originEnforcement.networkPolicy.enabled=true --set originEnforcement.networkPolicy.backendSelector.app=backend"
          helm lint identity-plane $ARGS
          # Default render exercises the files delivery form (monitoring.delivery=files);
          # this one exercises the operator form (PrometheusRule + PodMonitor + sidecar
          # dashboards). See the monitoring-delivery job for the full 3-mode matrix.
          helm template rel identity-plane $ARGS >/dev/null
          helm template rel identity-plane $ARGS --set monitoring.delivery=operator >/dev/null

      - name: Lint & render routing-plane
        run: |
          # Render both the plain and the opt-in read-split (ROUTING_PG_READ_URL) paths.
          # controlPlane.auth is fail-closed: a token (or auth.enabled=false) is required.
          BASE="--set postgres.url=postgres://u:p@h:5432/routing --set controlPlane.auth.token=ci-dummy"
          helm lint routing-plane $BASE
          helm template rel routing-plane $BASE >/dev/null
          # Operator delivery form (files is the default, rendered above).
          helm template rel routing-plane $BASE --set monitoring.delivery=operator >/dev/null
          helm template rel routing-plane $BASE --set postgres.readUrl=postgres://u:p@pgbouncer:6432/routing >/dev/null
          # Exercise the auth-disabled path and the broker-only NetworkPolicy helpers.
          helm template rel routing-plane --set postgres.url=postgres://u:p@h:5432/routing --set controlPlane.auth.enabled=false >/dev/null
          helm template rel routing-plane $BASE --set controlPlane.networkPolicy.enabled=true --set 'controlPlane.networkPolicy.allowFrom[0].podSelector.matchLabels.app=broker' >/dev/null

      - name: Lint & render edge-platform (umbrella)
        run: |
          helm dependency update edge-platform
          ARGS="--set identity-plane.postgres.url=postgres://u:p@h:5432/identity \
                --set identity-plane.authzAdmin.adminToken=ci-dummy \
                --set identity-plane.routingPg.url=postgres://u:p@h:5432/routing \
                --set routing-plane.postgres.url=postgres://u:p@h:5432/routing \
                --set routing-plane.controlPlane.auth.token=ci-dummy \
                --set identity-plane.oidc.jwksTls.enabled=true \
                --set originEnforcement.networkPolicy.enabled=true --set originEnforcement.networkPolicy.backendSelector.app=backend"
          helm lint edge-platform $ARGS
          helm template rel edge-platform $ARGS >/dev/null
          # Operator delivery form across the umbrella + both subcharts (files is default).
          helm template rel edge-platform $ARGS \
            --set monitoring.delivery=operator \
            --set identity-plane.monitoring.delivery=operator \
            --set routing-plane.monitoring.delivery=operator >/dev/null

      # Fail-closed guard matrix (production-readiness-gate): asserts that a
      # topology missing an origin-enforcement or JWKS-integrity choice REFUSES
      # to render, that valid renders carry the enforcing config (NetworkPolicy,
      # UpstreamTlsContext + CA + SAN pin), that the publicPaths allowlist is the
      # single source of the non-enriched designation, and that the lab issuer
      # does not drift from the compose default (D7).
      - name: Guard assertions (origin trust + JWKS integrity + designation)
        working-directory: .
        run: bash scripts/helm-guards-test.sh

  # portable-monitoring-delivery: the SLO rules are single-sourced (Sloth) and shipped in
  # BOTH delivery forms (operator CRDs and operator-less ConfigMaps) from identical
  # content. This job proves (1) the generated rules are not stale, (2) they are valid
  # PORTABLE PromQL and their burn-rate unit tests pass (promtool), and (3) every chart
  # renders under all three monitoring.delivery values.
  monitoring-delivery:
    name: monitoring delivery (rules + chart matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: SLO rules — regen determinism + promtool (portability + burn tests)
        run: |
          # Regenerating from the Sloth specs must leave a CLEAN diff — a stale rules
          # dir or chart staging fails here (single source of truth).
          ./monitoring/slo/generate.sh
          git diff --exit-code -- monitoring/prometheus/rules deploy/helm/*/files/slo \
            || { echo '::error::SLO rules are stale — run monitoring/slo/generate.sh and commit'; exit 1; }
          # promtool: valid portable PromQL (the portability guard) + burn-rate unit tests.
          ./monitoring/slo/check.sh

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Render every chart under each delivery form
        working-directory: deploy/helm
        run: |
          IDENT="--set postgres.url=postgres://u:p@h:5432/identity --set authzAdmin.adminToken=ci-dummy --set routingPg.url=postgres://u:p@h:5432/routing --set oidc.jwksTls.enabled=true --set originEnforcement.networkPolicy.enabled=true --set originEnforcement.networkPolicy.backendSelector.app=backend"
          ROUTE="--set postgres.url=postgres://u:p@h:5432/routing --set controlPlane.auth.token=ci-dummy"
          helm dependency update edge-platform >/dev/null
          EDGE="--set identity-plane.postgres.url=postgres://u:p@h:5432/identity --set identity-plane.authzAdmin.adminToken=ci-dummy --set identity-plane.routingPg.url=postgres://u:p@h:5432/routing --set routing-plane.postgres.url=postgres://u:p@h:5432/routing --set routing-plane.controlPlane.auth.token=ci-dummy --set identity-plane.oidc.jwksTls.enabled=true --set originEnforcement.networkPolicy.enabled=true --set originEnforcement.networkPolicy.backendSelector.app=backend"
          for mode in files operator otlp-only; do
            echo "== monitoring.delivery=$mode =="
            helm template rel identity-plane $IDENT --set monitoring.delivery=$mode >/dev/null
            helm template rel routing-plane  $ROUTE --set monitoring.delivery=$mode >/dev/null
            helm template rel edge-platform  $EDGE  --set monitoring.delivery=$mode \
              --set identity-plane.monitoring.delivery=$mode \
              --set routing-plane.monitoring.delivery=$mode >/dev/null
          done

  # Release gate (production-readiness-gate 6.4): boot the reference topology
  # from a CLEAN checkout (no .env, auth ENABLED — production parity) and run
  # every edge e2e suite against it: the anonymous trust-contract assertions,
  # the N4 per-route auth gate (incl. encoded-traversal), the authenticated-member
  # positive path (real ZITADEL JWT + seeded membership), and the nexus-native
  # global-authorization path (deny-by-default -> authz-admin grant/revoke/suspend
  # resolved live through the edge).
  e2e-gate:
    name: e2e release gate (reference stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Boot the reference stack
        run: |
          # World-writable: ZITADEL (container uid 1000) must WRITE the admin
          # PAT into this bind mount; the runner user is uid 1001, and a 755
          # dir makes ZITADEL's first-instance init die mid-flight — after
          # which start-from-init is not crash-idempotent (AlreadyExists on
          # every restart) and the stack can never come up.
          mkdir -p machinekey && chmod 777 machinekey
          # identity-contract-signing: enable signing in the reference stack so the
          # member path emits a real signed JWS (verified in the authenticated-member
          # e2e). Reuse the committed throwaway test keypair + matching JWKS (kid
          # test-key-1) as CI signing material, mounted at /etc/nexus/signing.
          cp identity-rs/sidecar/src/testdata/test-ec-p256.pem deploy/compose/signing/key.pem
          cp identity-rs/sidecar/src/testdata/test-jwks.json    deploy/compose/signing/jwks.json
          export SIGNING_KEY_PATH=/etc/nexus/signing/key.pem SIGNING_KID=test-key-1 JWKS_FILE=/etc/nexus/signing/jwks.json
          # `|| true`: compose's dependency wait can flag a service whose FIRST
          # start attempt fails even though restart: unless-stopped self-heals it
          # (e.g. an IdP init racing its database). The readiness poll below is
          # the real gate — a served request proves the whole health-gated chain
          # (postgres -> zitadel -> sidecar/router -> seed -> envoy) is up.
          docker compose up -d --build || true
          for i in $(seq 1 90); do
            curl -sf -H 'Host: localhost' http://localhost:10000/ >/dev/null && exit 0
            sleep 5
          done
          echo 'edge never became ready'; docker compose ps -a; exit 1

      - name: Anonymous edge e2e (tenancy trust contract)
        run: sh scripts/tenancy-edge-e2e.sh

      - name: Anonymous edge e2e (N4 per-route auth gate + traversal)
        run: sh scripts/n4-e2e.sh

      - name: Authenticated-member e2e (positive scope path)
        run: sh scripts/tenancy-edge-auth-e2e.sh

      - name: Global authorization e2e (nexus-native authz)
        run: sh scripts/authz-global-e2e.sh

      - name: Stack logs (on failure)
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --tail 150
