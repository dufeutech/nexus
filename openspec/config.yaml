schema: spec-driven

# ─────────────────────────────────────────────────────────────────────────────
# Project philosophy — injected once into every artifact's instructions.
# This is the single source of truth for HOW we think. Commands stay thin and
# point here instead of restating it (keeps Claude's token use low).
# Full reference: openspec/guidelines.md
# ─────────────────────────────────────────────────────────────────────────────

context: |
  Abstraction layers — keep them separate, never let one leak into another:
    - WHAT  = specs (observable behavior, language-agnostic)
    - HOW   = design (structure, dependency direction, tool choices)
    - DO    = tasks + code (the pinned implementation)
  One canonical design per change. Decide; do not leave competing variants in artifacts.

  Composable core, thin surfaces: behavior lives once, in the core, as small units
  that snap together. Every entry point (CLI, GUI, API) is a thin adapter that only
  translates input and renders output — no business logic, branching, or state of its own.

  Data is not code: content with its own format (SQL/migrations, YAML/TOML/JSON config,
  HTML/templates, schemas, prompts) lives in a file of that format with its native
  extension and is loaded via an adapter — never embedded as a string literal in code.
  See openspec/guidelines.md.

  Single source of truth: every value is defined once and referenced, never duplicated as
  a magic literal. Constants live next to the concept that owns them (no god-module);
  tunable config is centralized in one external file behind a config adapter. Secrets are
  not config — injected at runtime, referenced by key, never committed. See guidelines.md.

  Adopt before build: for any critical concern (correctness-, security-, or
  reliability-sensitive), prefer the hierarchy Rent infra > Adopt OSS > Extend > Fork >
  Build. Self-writing a critical concern is a defect unless no mature option exists.
  Record each such choice with /opsx:decide. See openspec/guidelines.md.

  Document naming: map every doc to a canonical type (RFC, ADR, ADD, TDD, Runbook…).
  Don't invent categories when one exists. RFC lifecycle is draft -> approved only.

rules:
  # WHY + scope. Stays abstract; flags decisions, never makes them.
  proposal:
    - Focus on WHY and scope — observable outcomes, not mechanisms or tools.
    - In Capabilities, name each critical (correctness/security/reliability) concern whose
      realization is a build-vs-adopt decision. Defer the concrete tool to /opsx:decide;
      do NOT pick libraries, frameworks, or vendors here.

  # WHAT — the abstract RFC layer (one file per capability under specs/).
  specs:
    - Describe observable black-box behavior only. One canonical design — no alternatives.
    - Language-, framework-, and vendor-agnostic — no tech names. The WHAT must hold for any stack.
    - Use MUST / SHOULD / MAY. Every requirement is checkable via WHEN/THEN scenarios.
    - Each capability is self-contained, composable, and invocable identically from any surface.

  # HOW — structure and the concrete decisions. Tech names are allowed here (only here).
  design:
    - Define core vs adapters, the inward-only dependency direction, and where composition wiring lives.
    - For every critical concern flagged in the proposal, reference its build-vs-adopt decision
      (from /opsx:decide) with a one-line recommendation. Isolate all external systems behind adapters.
    - Entry points carry no business logic. Concrete tools enter the system only through adapters.
    - Native-format content (SQL/migrations, config, templates, schemas) stays in external files
      of that format, loaded through an adapter — never inlined as string literals. See guidelines.md.

  # DO — implementation steps.
  tasks:
    - Implement each behavior once in the core; keep entry points as thin translators.
    - No business logic, branching, or state outside the core.
    - Keep templates/migrations/config/schemas in external native-format files; load, don't inline.
    - Define each value once: constants beside their owning concept, tunable config centralized
        behind a config adapter. No magic literals, no duplicated values. See guidelines.md.
